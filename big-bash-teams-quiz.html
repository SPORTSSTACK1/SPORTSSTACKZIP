<style>
:root{
  --bg:#04080f;--surface:#080f1c;--surface2:#0d1829;--surface3:#122035;
  --gold:#f5c842;--blue:#2563eb;--blue-light:#3b82f6;
  --green:#22c55e;--green-bg:rgba(34,197,94,.12);--green-border:rgba(34,197,94,.5);
  --red:#ef4444;--red-bg:rgba(239,68,68,.1);--red-border:rgba(239,68,68,.4);
  --text:#e8f0fe;--text-muted:#6b8abf;--text-dim:#4a6890;
  --border:#0d2040;--border-bright:#1a3a6a;--radius:10px;--radius-lg:16px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif}
.page{max-width:780px;margin:0 auto;padding:20px 16px 48px}
.site-header{text-align:center;padding-bottom:16px;border-bottom:1px solid var(--border);margin-bottom:20px}
.game-name{font-family:'Barlow Condensed',sans-serif;font-size:clamp(24px,5vw,42px);font-weight:900;letter-spacing:.04em;text-transform:uppercase;color:var(--text);line-height:1}
.game-name .hl{color:var(--gold)}
.game-sub{font-size:12px;color:var(--text-muted);letter-spacing:.08em;text-transform:uppercase;margin-top:5px}
.score-bar{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:16px;flex-wrap:wrap}
.score-pill{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:6px 18px;border-radius:20px;background:var(--surface2);border:1px solid var(--border-bright);color:var(--text-muted)}
.score-pill span{color:var(--gold)}
.timer-pill{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:6px 18px;border-radius:20px;background:var(--surface2);border:1px solid var(--border-bright);color:var(--text-muted)}
.timer-pill span{color:var(--text)}
.input-row{display:flex;gap:8px;margin-bottom:16px;position:relative}
.input-row input{flex:1;font-size:16px;padding:12px 18px;border:1.5px solid var(--border-bright);border-radius:var(--radius);background:var(--surface2);color:var(--text);outline:none;font-family:'Barlow',sans-serif;transition:border-color .15s}
.input-row input:focus{border-color:var(--blue-light);box-shadow:0 0 0 3px rgba(59,130,246,.1)}
.input-row input::placeholder{color:#6b8abf}
.btn{padding:12px 20px;border-radius:50px;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;border:none;background:var(--gold);color:var(--bg);transition:all .2s;flex-shrink:0}
.btn:hover{background:#ffd700;transform:translateY(-1px)}
.btn-give-up{padding:10px 18px;border-radius:50px;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;border:1.5px solid var(--border-bright);background:transparent;color:var(--text-muted);transition:all .2s}
.btn-give-up:hover{border-color:var(--red);color:var(--red)}
.msg{font-size:13px;color:var(--gold);margin-bottom:10px;min-height:18px;text-align:center;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
/* Conference sections */
.conference{margin-bottom:28px}
.conf-title{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--text-muted);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.divs-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.div-block{}
.div-title{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#6b8abf;margin-bottom:5px;padding-left:2px}
.teams-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.team-card{border-radius:var(--radius);padding:8px 10px;border:1px solid var(--border-bright);background:var(--surface2);height:56px;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all .3s;text-align:center}
.team-card.found{background:var(--green-bg);border-color:var(--green-border)}
.team-card.revealed{background:var(--red-bg);border-color:var(--red-border)}
.team-card .t-name{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:800;letter-spacing:.03em;line-height:1.2;color:#86efac;opacity:0;transition:opacity .3s}
.team-card.found .t-name{opacity:1}
.team-card.revealed .t-name{color:#fca5a5;opacity:1}
.team-card .t-blank{font-size:20px;color:#6b8abf;letter-spacing:.15em;font-family:'Barlow Condensed',sans-serif}
.team-card.found .t-blank,.team-card.revealed .t-blank{display:none}
/* Result */
.result-banner{border-radius:var(--radius-lg);padding:1.1rem 1.25rem;text-align:center;margin-top:16px;border:1px solid}
.result-banner.win{border-color:var(--green-border);background:var(--green-bg)}
.result-banner.lose{border-color:var(--red-border);background:var(--red-bg)}
.rb-icon{font-size:36px;margin-bottom:6px}
.rb-title{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:900;letter-spacing:.04em;text-transform:uppercase;margin-bottom:6px}
.result-banner.win .rb-title{color:#86efac}
.result-banner.lose .rb-title{color:#fca5a5}
.rb-sub{font-size:14px;color:var(--text-muted)}
.share-btn{margin-top:12px;display:inline-block;padding:10px 24px;border-radius:50px;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;border:1.5px solid var(--border-bright);background:transparent;color:var(--text);transition:all .2s}
.share-btn:hover{background:rgba(255,255,255,.06)}
nav{position:sticky;top:0;z-index:1000;background:rgba(4,8,15,.95);backdrop-filter:blur(12px);border-bottom:1px solid rgba(13,32,64,.8);padding:0 16px;display:flex;align-items:center;height:52px;gap:10px}
</style>

<body>

<div class="page">
<header class="site-header">
  <div class="game-name">Big Bash <span class="hl">Teams</span></div>
  <div class="game-sub">Name all 8 BBL teams · 3 minutes</div>
</header>

<div class="score-bar">
  <div class="score-pill"><span id="found-count">0</span> / 8 teams</div>
  <div class="timer-pill">⏱ <span id="timer">4:00</span></div>
</div>

<div class="input-row">
  <input type="text" id="guess-input" placeholder="Type a team name or city..." autocomplete="off" spellcheck="false"/>
  <button class="btn" onclick="submitGuess()">Go</button>
</div>
<div class="msg" id="msg"></div>
<div style="display:flex;gap:8px;justify-content:center;margin-bottom:20px">
  <button class="btn-give-up" onclick="giveUp()">Give up &amp; reveal</button>
</div>

<div id="quiz-grid"></div>
<div id="result"></div>
</div>

<script>
const TEAMS = [
  {name:"Adelaide Strikers", aliases:["adelaide strikers","strikers","adelaide"], conf:"Big Bash League"},
  {name:"Brisbane Heat", aliases:["brisbane heat","heat","brisbane"], conf:"Big Bash League"},
  {name:"Hobart Hurricanes", aliases:["hobart hurricanes","hurricanes","hobart"], conf:"Big Bash League"},
  {name:"Melbourne Renegades", aliases:["melbourne renegades","renegades"], conf:"Big Bash League"},
  {name:"Melbourne Stars", aliases:["melbourne stars","stars"], conf:"Big Bash League"},
  {name:"Perth Scorchers", aliases:["perth scorchers","scorchers","perth"], conf:"Big Bash League"},
  {name:"Sydney Sixers", aliases:["sydney sixers","sixers"], conf:"Big Bash League"},
  {name:"Sydney Thunder", aliases:["sydney thunder","thunder"], conf:"Big Bash League"}
];

const GROUPS = ['Big Bash League'];
const SUBS = null;
const GROUP_KEY = "conf"; const SUB_KEY = null;

const found = new Set();
let done = false, timerInterval = null, secondsLeft = 180;

function normalise(s){
  return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9\s]/g,'').trim();
}

function findTeam(val){
  const nv = normalise(val);
  return TEAMS.find(t => normalise(t.name) === nv || t.aliases.some(a => normalise(a) === nv))
      || TEAMS.find(t => normalise(t.name).startsWith(nv) || t.aliases.some(a => normalise(a).startsWith(nv)));
}

function buildGrid(){
  const container = document.getElementById('quiz-grid');
  container.innerHTML = '';
  GROUPS.forEach(grp => {
    const sec = document.createElement('div');
    sec.className = 'conference';
    const ct = document.createElement('div');
    ct.className = 'conf-title';
    ct.textContent = grp;
    sec.appendChild(ct);

    if (SUB_KEY && SUBS) {
      SUBS.forEach(sub => {
        const block = document.createElement('div');
        block.className = 'div-block';
        const dt = document.createElement('div');
        dt.className = 'div-title';
        dt.textContent = sub;
        block.appendChild(dt);
        const grid = document.createElement('div');
        grid.className = 'teams-grid';
        TEAMS.filter(t => t[GROUP_KEY] === grp && t[SUB_KEY] === sub).forEach(t => {
          const card = document.createElement('div');
          card.className = 'team-card';
          card.id = 'card-' + normalise(t.name).replace(/\s/g,'-');
          card.innerHTML = '<div class="t-blank">?????</div><div class="t-name">'+t.name+'</div>';
          grid.appendChild(card);
        });
        block.appendChild(grid);
        sec.appendChild(block);
      });
    } else {
      const grid = document.createElement('div');
      grid.className = 'teams-grid';
      TEAMS.filter(t => t[GROUP_KEY] === grp).forEach(t => {
        const card = document.createElement('div');
        card.className = 'team-card';
        card.id = 'card-' + normalise(t.name).replace(/\s/g,'-');
        card.innerHTML = '<div class="t-blank">?????</div><div class="t-name">'+t.name+'</div>';
        grid.appendChild(card);
      });
      sec.appendChild(grid);
    }
    container.appendChild(sec);
  });
}

function revealCard(team, type){
  const id = 'card-' + normalise(team.name).replace(/\s/g,'-');
  const card = document.getElementById(id);
  if(card) card.classList.add(type);
}

function submitGuess(){
  if(done) return;
  const input = document.getElementById('guess-input');
  const val = input.value.trim();
  if(!val) return;
  const team = findTeam(val);
  input.value = '';
  if(!team){
    document.getElementById('msg').textContent = 'Not found — try a different name';
    setTimeout(()=>document.getElementById('msg').textContent='', 1800);
    return;
  }
  if(found.has(team.name)){
    document.getElementById('msg').textContent = team.name + ' already found!';
    setTimeout(()=>document.getElementById('msg').textContent='', 1600);
    return;
  }
  found.add(team.name);
  revealCard(team, 'found');
  document.getElementById('found-count').textContent = found.size;
  document.getElementById('msg').textContent = '✓ ' + team.name;
  setTimeout(()=>document.getElementById('msg').textContent='', 1400);
  if(found.size === TEAMS.length) endGame(true);
}

document.getElementById('guess-input').addEventListener('keydown', e => {
  if(e.key === 'Enter') submitGuess();
});

function startTimer(){
  timerInterval = setInterval(()=>{
    secondsLeft--;
    const m = Math.floor(secondsLeft / 60);
    const s = secondsLeft % 60;
    document.getElementById('timer').textContent = m + ':' + String(s).padStart(2,'0');
    if(secondsLeft <= 0){ clearInterval(timerInterval); endGame(false); }
  }, 1000);
}

function giveUp(){
  if(done) return;
  clearInterval(timerInterval);
  TEAMS.forEach(t => { if(!found.has(t.name)) revealCard(t,'revealed'); });
  done = true;
  document.querySelector('.input-row').style.display = 'none';
  document.querySelector('.btn-give-up').style.display = 'none';
  showResult(false, true);
}

function endGame(won){
  done = true;
  clearInterval(timerInterval);
  if(!won) TEAMS.forEach(t => { if(!found.has(t.name)) revealCard(t,'revealed'); });
  document.querySelector('.input-row').style.display = 'none';
  document.querySelector('.btn-give-up').style.display = 'none';
  showResult(won, false);
}

function showResult(won, gaveUp){
  const r = document.getElementById('result');
  const perfect = found.size === TEAMS.length;
  let title, icon, sub;
  if(perfect){
    icon = '🏆'; title = 'Perfect Score!'; sub = 'You named all 8 teams!';
  } else if(gaveUp){
    icon = '🏳️'; title = 'Better luck next time'; sub = found.size + ' / 8 teams found.';
  } else {
    icon = '⏱'; title = "Time\'s up!"; sub = found.size + ' / 8 teams found.';
  }
  r.innerHTML = '<div class="result-banner '+(perfect?'win':'lose')+'">'
    +'<div class="rb-icon">'+icon+'</div>'
    +'<div class="rb-title">'+title+'</div>'
    +'<div class="rb-sub">'+sub+'</div>'
    +'<button class="share-btn" onclick="copyResult()">Share result</button></div>';
}

function copyResult(){
  const txt = 'SportsStack — Big Bash Teams\n'+found.size+'/8 teams\nsportsstack.com.au';
  const b = document.querySelector('.share-btn');
  if(navigator.share){navigator.share({text:txt}).catch(()=>{});}else if(navigator.clipboard) navigator.clipboard.writeText(txt).then(()=>{
    b.textContent='Copied!'; setTimeout(()=>b.textContent='Share result',2000);
  });
}

buildGrid();
startTimer();

</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="sportstack-member.js?v=4"></script>
<script src="xp-system.js"></script>
</body>
</html>
