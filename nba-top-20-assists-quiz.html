<style>
:root{
  --bg:#04080f;--surface:#080f1c;--surface2:#0d1829;--surface3:#122035;
  --blue:#2563eb;--blue-light:#3b82f6;
  --gold:#f5c842;
  --green:#22c55e;--green-bg:rgba(34,197,94,.09);--green-border:rgba(34,197,94,.45);
  --red:#ef4444;--red-bg:rgba(239,68,68,.07);--red-border:rgba(239,68,68,.4);
  --text:#e8f0fe;--text-muted:#6b8abf;--text-dim:#1e3355;
  --border:#0d2040;--border-bright:#1a3a6a;
  --radius:10px;--radius-lg:16px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif}
.page{max-width:960px;margin:0 auto;padding:22px 14px 56px}
.site-header{text-align:center;padding-bottom:16px;border-bottom:1px solid var(--border);margin-bottom:18px}
.game-title{font-family:'Barlow Condensed',sans-serif;font-size:clamp(18px,4vw,34px);font-weight:900;letter-spacing:.04em;text-transform:uppercase;line-height:1.1}
.game-title .hl{color:var(--gold)}
.game-subtitle{font-size:12px;color:var(--text-muted);letter-spacing:.1em;text-transform:uppercase;margin-top:5px}
.stats-bar{display:flex;align-items:center;justify-content:space-between;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:11px 20px;margin-bottom:16px;gap:10px;flex-wrap:wrap}
.stat-item{text-align:center;flex:1;min-width:72px}
.stat-val{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:900;line-height:1;color:var(--gold)}
.stat-val.urgent{color:var(--red);animation:pulse .8s infinite}
.stat-val.green{color:var(--green)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.stat-label{font-size:10px;color:var(--text-muted);letter-spacing:.1em;text-transform:uppercase;margin-top:3px}
.stat-divider{width:1px;height:38px;background:var(--border-bright);flex-shrink:0}
.prog-wrap{height:4px;background:rgba(255,255,255,.06);border-radius:99px;margin-bottom:16px;overflow:hidden}
.prog-bar{height:100%;background:linear-gradient(90deg,var(--blue-light),var(--gold));border-radius:99px;transition:width .4s ease}
.input-wrap{position:relative;margin-bottom:16px}
.guess-input{width:100%;font-size:16px;padding:13px 18px;border:1.5px solid var(--border-bright);border-radius:var(--radius);background:var(--surface2);color:var(--text);outline:none;font-family:'Barlow',sans-serif;transition:border-color .15s}
.guess-input:focus{border-color:var(--blue-light);box-shadow:0 0 0 3px rgba(59,130,246,.1)}
.guess-input::placeholder{color:var(--text-dim)}
.guess-input:disabled{opacity:.4;cursor:not-allowed}
.suggestions{position:absolute;top:100%;left:0;right:0;background:var(--surface2);border:1px solid var(--gold);border-radius:var(--radius);z-index:99;margin-top:3px;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,.45)}
.suggestion-label{font-size:11px;color:var(--gold);padding:7px 14px 3px;letter-spacing:.08em;text-transform:uppercase;font-weight:700;border-bottom:1px solid var(--border)}
.suggestion-item{padding:10px 14px;font-size:14px;color:var(--text);cursor:pointer;display:flex;align-items:center;gap:10px;transition:background .12s}
.suggestion-item:hover{background:var(--surface3)}
.sug-badge{font-size:10px;color:var(--gold);background:rgba(245,200,66,.1);border:1px solid rgba(245,200,66,.25);border-radius:4px;padding:2px 7px;font-weight:700;flex-shrink:0}
.team-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:9px}
@media(max-width:640px){.team-grid{grid-template-columns:repeat(3,1fr);gap:7px}}
@media(max-width:400px){.team-grid{grid-template-columns:repeat(2,1fr);gap:6px}}
.team-card{aspect-ratio:1/1;border-radius:var(--radius);border:1.5px solid var(--border-bright);background:var(--surface2);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:8px 6px;transition:all .35s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden;cursor:default}
.team-card::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(59,130,246,.06),transparent 70%);pointer-events:none}
.card-rank{font-family:'Barlow Condensed',sans-serif;font-size:clamp(16px,3vw,24px);font-weight:900;color:var(--text-dim);line-height:1;margin-bottom:3px}
.card-ast-hidden{font-size:clamp(10px,1.6vw,12px);color:var(--text-dim);letter-spacing:.06em;margin-bottom:5px}
.card-trophy{font-size:clamp(18px,3.5vw,26px);margin-bottom:3px;opacity:.18}
.card-dots{display:flex;gap:3px;justify-content:center;margin-top:4px}
.card-dot{width:5px;height:5px;border-radius:50%;background:var(--text-dim)}
.team-card.found{background:var(--green-bg);border-color:var(--green-border);box-shadow:0 0 16px rgba(34,197,94,.12)}
.team-card.found::before{background:radial-gradient(ellipse at 50% 0%,rgba(34,197,94,.08),transparent 70%)}
.card-name-found{font-family:'Barlow Condensed',sans-serif;font-size:clamp(10px,1.9vw,15px);font-weight:800;color:#86efac;letter-spacing:.03em;line-height:1.2;margin-bottom:2px}
.card-detail-found{font-size:clamp(8px,1.3vw,10px);color:#4ade80;letter-spacing:.06em;margin-bottom:2px}
.card-ast-found{font-family:'Barlow Condensed',sans-serif;font-size:clamp(13px,2.5vw,20px);font-weight:900;color:var(--gold);line-height:1;margin-bottom:1px}
.card-ast-label{font-size:clamp(7px,1.1vw,9px);color:#4ade80;letter-spacing:.08em;text-transform:uppercase}
.card-trophy-found{font-size:clamp(13px,2.3vw,17px);margin-bottom:3px}
.team-card.revealed{background:var(--red-bg);border-color:var(--red-border)}
.card-name-revealed{font-family:'Barlow Condensed',sans-serif;font-size:clamp(10px,1.9vw,15px);font-weight:800;color:var(--red);letter-spacing:.03em;line-height:1.2;margin-bottom:2px}
.card-detail-revealed{font-size:clamp(8px,1.3vw,10px);color:rgba(239,68,68,.7);letter-spacing:.06em;margin-bottom:2px}
.card-ast-revealed{font-family:'Barlow Condensed',sans-serif;font-size:clamp(13px,2.5vw,20px);font-weight:900;color:rgba(239,68,68,.8);line-height:1;margin-bottom:1px}
.card-ast-label-rev{font-size:clamp(7px,1.1vw,9px);color:rgba(239,68,68,.6);letter-spacing:.08em;text-transform:uppercase}
.modal-backdrop{position:fixed;inset:0;background:rgba(4,8,15,.85);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:999;opacity:0;pointer-events:none;transition:opacity .3s}
.modal-backdrop.show{opacity:1;pointer-events:all}
.modal{background:var(--surface2);border:1px solid var(--border-bright);border-radius:var(--radius-lg);padding:32px 28px;max-width:420px;width:90%;text-align:center}
.modal.win{border-color:var(--green-border);background:rgba(34,197,94,.05)}
.modal.lose{border-color:var(--red-border);background:var(--red-bg)}
.modal-icon{font-size:48px;margin-bottom:12px}
.modal-title{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:900;letter-spacing:.04em;text-transform:uppercase;margin-bottom:8px}
.modal.win .modal-title{color:#86efac}
.modal.lose .modal-title{color:#fca5a5}
.modal-score{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;color:var(--gold);margin-bottom:12px}
.modal-msg{font-size:15px;color:var(--text-muted);line-height:1.65;margin-bottom:20px}
.modal-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.modal-btn{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;padding:12px 28px;border-radius:50px;cursor:pointer;border:none;transition:all .2s}
.modal-btn.primary{background:var(--gold);color:var(--bg)}
.modal-btn.primary:hover{background:#ffd700;transform:translateY(-1px)}
.modal-btn.secondary{background:transparent;color:var(--text);border:1.5px solid var(--border-bright)}
.modal-btn.secondary:hover{background:rgba(255,255,255,.06)}
nav{position:sticky;top:0;z-index:1000;background:rgba(4,8,15,.95);backdrop-filter:blur(12px);border-bottom:1px solid rgba(13,32,64,.8);padding:0 16px;display:flex;align-items:center;height:52px;gap:10px}
</style>

<body>
<div class="page">
  <header class="site-header">
    <div class="game-title">NBA All-Time <span class="hl">Top 20 Assisters</span></div>
    <div class="game-subtitle">Name the 20 players with the most career assists in NBA history · regular season · 5 minutes</div>
  </header>
  <div class="stats-bar">
    <div class="stat-item"><div class="stat-val green" id="found-count">0</div><div class="stat-label">Found</div></div>
    <div class="stat-divider"></div>
    <div class="stat-item"><div class="stat-val" id="remain-count">20</div><div class="stat-label">Remaining</div></div>
    <div class="stat-divider"></div>
    <div class="stat-item"><div class="stat-val" id="timer-display">5:00</div><div class="stat-label">Time Left</div></div>
  </div>
  <div class="prog-wrap"><div class="prog-bar" id="prog-bar" style="width:0%"></div></div>
  <div class="input-wrap">
    <input class="guess-input" id="guess-input" type="text" placeholder="Type a name and press Enter…" autocomplete="off"/>
    <div class="suggestions" id="suggestions" style="display:none"></div>
  </div>
  <div class="team-grid" id="team-grid"></div>
</div>

<div class="modal-backdrop" id="modal-backdrop">
  <div class="modal" id="modal">
    <div class="modal-icon" id="modal-icon"></div>
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-score" id="modal-score"></div>
    <div class="modal-msg" id="modal-msg"></div>
    <div class="modal-btns">
      <button class="modal-btn primary" onclick="resetQuiz()">Play Again</button>
      <button class="modal-btn secondary" onclick="closeModal()">See Results</button>
    </div>
  </div>
</div>

<script>
// accepted[] rules: last name ✓ | full name ✓ | iconic/unique first names & nicknames ✓
// Generic first names (jason, steve, mark, gary, andre, etc.) intentionally excluded.
// Assists totals from Wikipedia, accurate as of March 2026.
const PLAYERS = [
  {
    id:1, rank:1, name:"John Stockton", ast:15806, nat:"USA", mainClub:"Utah Jazz",
    accepted:["stockton","john stockton"]
    // "John" too generic
  },
  {
    id:2, rank:2, name:"Chris Paul", ast:12552, nat:"USA", mainClub:"New Orleans / LA Clippers",
    accepted:["paul","chris paul","cp3","cp"]
    // CP3 is iconic
  },
  {
    id:3, rank:3, name:"Jason Kidd", ast:12091, nat:"USA", mainClub:"NJ Nets / Dallas",
    accepted:["kidd","jason kidd"]
    // "Jason" too generic
  },
  {
    id:4, rank:4, name:"LeBron James", ast:11872, nat:"USA", mainClub:"Lakers / Cavaliers",
    accepted:["james","lebron james","lebron","lbj","king james","bron"]
    // "LeBron" is globally unique
  },
  {
    id:5, rank:5, name:"Steve Nash", ast:10335, nat:"Canada", mainClub:"Phoenix Suns / Dallas",
    accepted:["nash","steve nash"]
    // "Steve" too generic
  },
  {
    id:6, rank:6, name:"Mark Jackson", ast:10334, nat:"USA", mainClub:"NY Knicks / Indiana",
    accepted:["jackson","mark jackson"]
    // "Mark" too generic; "Jackson" shared but he is the famous assists Jackson
  },
  {
    id:7, rank:7, name:"Russell Westbrook", ast:10280, nat:"USA", mainClub:"OKC Thunder",
    accepted:["westbrook","russell westbrook","russ","brodie"]
    // "Russell" too generic
  },
  {
    id:8, rank:8, name:"Magic Johnson", ast:10141, nat:"USA", mainClub:"LA Lakers",
    accepted:["johnson","magic johnson","magic","earvin johnson","earvin"]
    // "Magic" is globally iconic and unique
  },
  {
    id:9, rank:9, name:"Oscar Robertson", ast:9887, nat:"USA", mainClub:"Cincinnati Royals / Bucks",
    accepted:["robertson","oscar robertson","oscar","big o","the big o"]
    // "Oscar" is distinctive in NBA history
  },
  {
    id:10, rank:10, name:"Isiah Thomas", ast:9061, nat:"USA", mainClub:"Detroit Pistons",
    accepted:["thomas","isiah thomas","isaiah thomas","zeke"]
    // Both spellings accepted; "zeke" is his well-known nickname
  },
  {
    id:11, rank:11, name:"Gary Payton", ast:8966, nat:"USA", mainClub:"Seattle SuperSonics",
    accepted:["payton","gary payton","the glove","glove"]
    // "Gary" too generic
  },
  {
    id:12, rank:12, name:"James Harden", ast:8730, nat:"USA", mainClub:"Houston Rockets",
    accepted:["harden","james harden","the beard","beard"]
    // "James" too generic
  },
  {
    id:13, rank:13, name:"Andre Miller", ast:8524, nat:"USA", mainClub:"Cleveland / Denver",
    accepted:["miller","andre miller"]
    // "Andre" not iconic enough as standalone
  },
  {
    id:14, rank:14, name:"Rod Strickland", ast:7987, nat:"USA", mainClub:"Portland / Washington",
    accepted:["strickland","rod strickland"]
    // "Rod" too generic
  },
  {
    id:15, rank:15, name:"Rajon Rondo", ast:7584, nat:"USA", mainClub:"Boston Celtics",
    accepted:["rondo","rajon rondo","rondo show"]
    // "Rajon" unusual but not a globally iconic solo name
  },
  {
    id:16, rank:16, name:"Maurice Cheeks", ast:7392, nat:"USA", mainClub:"Philadelphia 76ers",
    accepted:["cheeks","maurice cheeks","mo cheeks"]
    // "Mo Cheeks" is well known
  },
  {
    id:17, rank:17, name:"Lenny Wilkens", ast:7211, nat:"USA", mainClub:"St. Louis Hawks / Seattle",
    accepted:["wilkens","lenny wilkens"]
    // "Lenny" too generic
  },
  {
    id:18, rank:18, name:"Terry Porter", ast:7160, nat:"USA", mainClub:"Portland Trail Blazers",
    accepted:["porter","terry porter"]
    // "Terry" too generic
  },
  {
    id:19, rank:19, name:"Kyle Lowry", ast:7107, nat:"USA", mainClub:"Toronto Raptors",
    accepted:["lowry","kyle lowry"]
    // "Kyle" too generic
  },
  {
    id:20, rank:20, name:"Tim Hardaway", ast:7095, nat:"USA", mainClub:"Golden State Warriors",
    accepted:["hardaway","tim hardaway","timmy hardaway"]
    // "Tim" too generic; "Hardaway" is distinct
  },
];

const TOTAL = PLAYERS.length;
const TOTAL_SECS = 300;
let secsLeft = TOTAL_SECS, timer = null, found = new Set(), gameActive = false;

function norm(s){
  return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9\s]/g,'').trim();
}
function levenshtein(a, b){
  const m=a.length, n=b.length;
  const dp=Array.from({length:m+1},(_,i)=>Array.from({length:n+1},(_,j)=>i===0?j:j===0?i:0));
  for(let i=1;i<=m;i++) for(let j=1;j<=n;j++)
    dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[m][n];
}
function isExactMatch(val, p){
  const nv = norm(val);
  return p.accepted.map(norm).some(a => a === nv);
}
function getFuzzySuggestions(val){
  if(val.length < 2) return [];
  const nv = norm(val);
  const results = [];
  for(const p of PLAYERS){
    if(found.has(p.id)) continue;
    const minDist = Math.min(...p.accepted.map(a => levenshtein(nv, norm(a))));
    if(minDist >= 1 && minDist <= 2) results.push({p, dist: minDist});
  }
  return results.sort((a,b) => a.dist - b.dist).slice(0,1).map(r => r.p);
}

function rankLabel(r){
  if(r===1) return '1st'; if(r===2) return '2nd'; if(r===3) return '3rd';
  return r+'th';
}
function fmt(n){ return n.toLocaleString(); }

function cardInner(p, state){
  if(state==='found'){
    return `<div class="card-trophy-found">🎯</div>
      <div class="card-name-found">${p.name}</div>
      <div class="card-detail-found">${p.nat} · ${p.mainClub}</div>
      <div class="card-ast-found">${fmt(p.ast)}</div>
      <div class="card-ast-label">career assists</div>`;
  }
  if(state==='revealed'){
    return `<div class="card-trophy" style="opacity:.28;font-size:clamp(13px,2.3vw,17px)">🎯</div>
      <div class="card-name-revealed">${p.name}</div>
      <div class="card-detail-revealed">${p.nat} · ${p.mainClub}</div>
      <div class="card-ast-revealed">${fmt(p.ast)}</div>
      <div class="card-ast-label-rev">career assists</div>`;
  }
  return `<div class="card-trophy">🎯</div>
    <div class="card-rank">${rankLabel(p.rank)}</div>
    <div class="card-ast-hidden">${fmt(p.ast)} assists</div>
    <div class="card-dots"><span class="card-dot"></span><span class="card-dot"></span><span class="card-dot"></span></div>`;
}

function renderGrid(){
  const grid = document.getElementById('team-grid');
  grid.innerHTML = '';
  for(const p of PLAYERS){
    const isFound = found.has(p.id);
    const card = document.createElement('div');
    card.className = 'team-card' + (isFound ? ' found' : '');
    card.id = 'card-' + p.id;
    card.innerHTML = cardInner(p, isFound ? 'found' : 'hidden');
    grid.appendChild(card);
  }
}
function revealCard(p){
  const card = document.getElementById('card-' + p.id);
  if(!card) return;
  card.className = 'team-card found';
  card.innerHTML = cardInner(p, 'found');
}
function revealAllMissed(){
  for(const p of PLAYERS){
    if(!found.has(p.id)){
      const card = document.getElementById('card-' + p.id);
      if(!card) continue;
      card.className = 'team-card revealed';
      card.innerHTML = cardInner(p, 'revealed');
    }
  }
}

function updateHUD(){
  document.getElementById('found-count').textContent = found.size;
  document.getElementById('remain-count').textContent = TOTAL - found.size;
  document.getElementById('prog-bar').style.width = (found.size / TOTAL * 100) + '%';
  const m = Math.floor(secsLeft/60), s = secsLeft % 60;
  const el = document.getElementById('timer-display');
  el.textContent = m + ':' + String(s).padStart(2,'0');
  el.className = 'stat-val' + (secsLeft <= 30 ? ' urgent' : '');
}

function hideSuggestions(){ document.getElementById('suggestions').style.display = 'none'; }
function showSuggestions(matches){
  const box = document.getElementById('suggestions');
  if(!matches.length){ hideSuggestions(); return; }
  box.innerHTML = '<div class="suggestion-label">Did you mean…</div>';
  matches.forEach(p => {
    const item = document.createElement('div');
    item.className = 'suggestion-item';
    item.innerHTML = `<span>${p.name}</span><span class="sug-badge">${fmt(p.ast)} assists</span>`;
    item.onmousedown = e => { e.preventDefault(); acceptSuggestion(p); };
    box.appendChild(item);
  });
  box.style.display = 'block';
}
function acceptSuggestion(p){
  hideSuggestions();
  document.getElementById('guess-input').value = '';
  if(!found.has(p.id) && gameActive){ found.add(p.id); revealCard(p); updateHUD(); checkWin(); }
}

function startTimer(){
  clearInterval(timer);
  timer = setInterval(() => { secsLeft--; updateHUD(); if(secsLeft <= 0){ clearInterval(timer); timeUp(); } }, 1000);
}
function timeUp(){
  gameActive = false;
  document.getElementById('guess-input').disabled = true;
  hideSuggestions(); revealAllMissed(); showModal(false);
}
function checkWin(){
  if(found.size === TOTAL){ clearInterval(timer); gameActive = false; document.getElementById('guess-input').disabled = true; showModal(true); }
}
function showModal(won){
  const elapsed = TOTAL_SECS - secsLeft;
  const mins = Math.floor(elapsed/60), secs = elapsed % 60;
  const timeStr = mins > 0 ? mins+' minute'+(mins!==1?'s':'')+' and '+secs+' second'+(secs!==1?'s':'') : secs+' second'+(secs!==1?'s':'');
  const modal = document.getElementById('modal');
  modal.className = 'modal ' + (won ? 'win' : 'lose');
  document.getElementById('modal-icon').textContent = won ? '🎉' : '⏰';
  document.getElementById('modal-title').textContent = won ? 'Quiz Complete!' : "Time's Up!";
  document.getElementById('modal-score').textContent = found.size + ' / ' + TOTAL + ' found';
  document.getElementById('modal-msg').innerHTML = won
    ? 'Congratulations — you completed the quiz in <strong>'+timeStr+'</strong>!<br>You named every player in the NBA all-time top 20 assists list!'
    : 'Better luck next time!<br>You found <strong>'+found.size+'</strong> of '+TOTAL+' players. Missing names are shown in <span style="color:var(--red)">red</span>.';
  document.getElementById('modal-backdrop').classList.add('show');
}
function closeModal(){ document.getElementById('modal-backdrop').classList.remove('show'); }
function resetQuiz(){
  closeModal(); clearInterval(timer);
  found.clear(); secsLeft = TOTAL_SECS; gameActive = true;
  document.getElementById('guess-input').disabled = false;
  document.getElementById('guess-input').value = '';
  hideSuggestions(); renderGrid(); updateHUD(); startTimer();
  document.getElementById('guess-input').focus();
}

const inputEl = document.getElementById('guess-input');
inputEl.addEventListener('keydown', e => {
  if(e.key === 'Enter'){
    const val = inputEl.value.trim(); if(!val || !gameActive) return;
    hideSuggestions();
    let matched = null;
    for(const p of PLAYERS){ if(!found.has(p.id) && isExactMatch(val, p)){ matched = p; break; } }
    if(matched){ found.add(matched.id); revealCard(matched); inputEl.value = ''; updateHUD(); checkWin(); }
    else{
      const sugs = getFuzzySuggestions(val);
      if(sugs.length) showSuggestions(sugs);
      else{ inputEl.style.borderColor='var(--red)'; setTimeout(()=>inputEl.style.borderColor='',600); }
    }
  } else if(e.key === 'Escape') hideSuggestions();
});
inputEl.addEventListener('input', () => { hideSuggestions(); });
document.addEventListener('click', e => { if(!e.target.closest('.input-wrap')) hideSuggestions(); });

renderGrid(); updateHUD(); gameActive = true; startTimer();
</script>

</body>
