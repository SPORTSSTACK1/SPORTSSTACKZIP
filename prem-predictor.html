<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Prem Predictor 2026–27 — SportsStack</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,700;0,900;1,900&family=Barlow:wght@400;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#04080f;--surface:#080f1c;--s2:#0d1a2e;--border:#0d2040;--gold:#f5c842;--text:#e8f0fe;--muted:#3a5a7a;--red:#ef4444;--green:#22c55e;--blue:#3b82f6;--purple:#8b5cf6}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh;padding-bottom:100px}
nav{position:sticky;top:0;z-index:100;background:rgba(4,8,15,.97);border-bottom:1px solid var(--border);padding:0 16px;height:52px;display:flex;align-items:center;justify-content:space-between}
.nav-logo{text-decoration:none;display:block;flex-shrink:0}
.nav-links a{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;padding:6px 12px;border-radius:6px;text-decoration:none;border:1px solid var(--border);color:var(--text);background:var(--s2);margin-left:6px}
.nav-links a.gold{background:var(--gold);color:var(--bg);border-color:var(--gold)}

.page-head{padding:22px 16px 10px;text-align:center}
.page-head h1{font-family:'Barlow Condensed',sans-serif;font-size:clamp(26px,5vw,46px);font-weight:900;font-style:italic;color:var(--gold);line-height:1}
.page-head p{color:var(--muted);font-size:13px;margin-top:5px}

/* Progress + Hint */
.top-strip{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;max-width:700px;margin:0 auto 6px}
.progress-pill{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;color:var(--muted)}
.progress-pill span{color:var(--gold)}
.hint-text{font-size:12px;color:var(--muted);font-style:italic}

/* Locked banner */
.locked-banner{background:rgba(245,200,66,.08);border:1px solid rgba(245,200,66,.25);border-radius:8px;padding:10px 16px;text-align:center;font-size:13px;color:var(--gold);max-width:700px;margin:0 auto 10px}

/* Table wrapper */
.table-wrap{max-width:700px;margin:0 auto;padding:0 12px}

/* Zone legend */
.legend{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;padding:0 4px}
.legend-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--muted)}
.legend-dot{width:10px;height:10px;border-radius:50%}

/* Position row */
.pred-row{display:grid;grid-template-columns:36px 6px 1fr auto;align-items:center;gap:6px;margin-bottom:4px}
.pos-num{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:900;color:var(--muted);text-align:right}
.zone-bar{width:6px;height:44px;border-radius:3px;flex-shrink:0}
.zone-cl{background:#3b82f6}
.zone-el{background:#f97316}
.zone-conf{background:#22c55e}
.zone-mid{background:rgba(255,255,255,.08)}
.zone-rel{background:#ef4444}

/* Team card */
.team-card{display:flex;align-items:center;background:var(--surface);border:1.5px solid var(--border);border-radius:9px;padding:0 12px;height:44px;cursor:pointer;transition:background .12s,border-color .12s,transform .1s;user-select:none;-webkit-user-select:none}
.team-card:hover{background:var(--s2);border-color:var(--muted)}
.team-card.selected{background:rgba(245,200,66,.15);border-color:var(--gold);transform:scale(1.01)}
.team-card.selected .team-name{color:var(--gold)}
.team-card.empty{border-style:dashed;border-color:rgba(255,255,255,.12);cursor:default}
.team-name{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;flex:1}
.team-zone-label{font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;margin-left:6px;text-transform:uppercase;letter-spacing:.07em}
.label-cl{background:rgba(59,130,246,.15);color:#60a5fa}
.label-el{background:rgba(249,115,22,.15);color:#fb923c}
.label-conf{background:rgba(34,197,94,.15);color:#4ade80}
.label-rel{background:rgba(239,68,68,.15);color:#fca5a5}

/* Arrows */
.arrows{display:flex;flex-direction:column;gap:2px}
.arr-btn{background:none;border:1px solid var(--border);border-radius:4px;color:var(--muted);cursor:pointer;font-size:11px;padding:2px 6px;line-height:1;transition:background .1s}
.arr-btn:hover{background:var(--s2);color:var(--text)}

/* Zone dividers */
.zone-divider{height:1px;background:var(--border);margin:6px 0;max-width:700px;margin-left:auto;margin-right:auto}
.zone-label-row{text-align:center;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;padding:2px 0 6px}

/* Fixed bottom bar */
.bottom-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(4,8,15,.97);border-top:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;z-index:50}
.btn-next{background:var(--gold);color:var(--bg);border:none;border-radius:10px;padding:12px 32px;font-family:'Barlow Condensed',sans-serif;font-size:19px;font-weight:900;cursor:pointer;transition:opacity .15s}
.btn-next:disabled{opacity:.35;cursor:default}
.btn-save{background:var(--s2);color:var(--text);border:1px solid var(--border);border-radius:10px;padding:12px 22px;font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;cursor:pointer}
.save-msg{font-size:12px;color:var(--muted);text-align:right}
.save-msg.ok{color:var(--green)}

/* Auth banner */
.auth-banner{max-width:700px;margin:12px auto;background:var(--surface);border:1.5px solid rgba(245,200,66,.25);border-radius:10px;padding:14px;text-align:center}
.auth-banner h3{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:900;color:var(--gold);margin-bottom:6px}
.auth-banner p{font-size:13px;color:var(--muted);margin-bottom:10px}
.btn-auth{background:var(--gold);color:var(--bg);border:none;border-radius:7px;padding:9px 22px;font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:900;cursor:pointer}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo"><img src="LOGO.jpeg" alt="SportsStack" width="48" height="48" style="display:block;border-radius:8px"/></a>
  <div class="nav-links">
    <a href="prem-leaderboard.html" class="gold">Leaderboard</a>
    <a href="prem-bonus.html">Awards →</a>
  </div>
</nav>

<div class="page-head">
  <h1>⚽ Prem Predictor 2026–27</h1>
  <p>Tap a team to select it, then tap another to swap — arrange all 20 teams in your predicted order</p>
</div>

<div id="auth-banner-wrap"></div>
<div id="locked-wrap"></div>

<div class="top-strip">
  <div class="progress-pill">Placed: <span id="placed-count">0</span> / 20</div>
  <div class="hint-text" id="hint-text">Tap a team to select it</div>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#3b82f6"></div>Champions League</div>
  <div class="legend-item"><div class="legend-dot" style="background:#f97316"></div>Europa League</div>
  <div class="legend-item"><div class="legend-dot" style="background:#22c55e"></div>Conference League</div>
  <div class="legend-item"><div class="legend-dot" style="background:#ef4444"></div>Relegation</div>
</div>

<div class="table-wrap" id="table-wrap">
  <!-- Rows generated by JS -->
</div>

<div class="bottom-bar">
  <div>
    <button class="btn-save" id="btn-save" onclick="savePicks()">💾 Save</button>
    <div class="save-msg" id="save-msg"></div>
  </div>
  <button class="btn-next" id="btn-next" onclick="goNext()" disabled>Awards & Save →</button>
</div>

<script src="sportstack-member.js?v=4"></script>
<script>
const SS_URL='https://syntfyfsyjiuowclarpf.supabase.co';
const SS_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN5bnRmeWZzeWppdW93Y2xhcnBmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzODgwNzgsImV4cCI6MjA5NTk2NDA3OH0.jQVBQo7tnv1RBEnCdzZCIvx8vVjsaXWRfZ3VNm1__Ig';

// 2026-27 Premier League teams (alphabetical default order)
const DEFAULT_TEAMS = [
  'Arsenal','Aston Villa','Bournemouth','Brentford','Brighton',
  'Chelsea','Coventry City','Crystal Palace','Everton','Fulham',
  'Hull City','Ipswich Town','Leeds United','Liverpool',
  'Manchester City','Manchester United','Newcastle United',
  'Nottingham Forest','Sunderland','Tottenham Hotspur'
];

// Zone config (position → zone)
function getZone(pos){
  if(pos<=5)  return {cls:'cl',  label:'UCL',  bar:'zone-cl'};
  if(pos<=7)  return {cls:'el',  label:'UEL',  bar:'zone-el'};
  if(pos===8) return {cls:'conf',label:'UECL', bar:'zone-conf'};
  if(pos<=17) return {cls:'mid', label:'',     bar:'zone-mid'};
  return            {cls:'rel',  label:'REL',  bar:'zone-rel'};
}

let order = [...DEFAULT_TEAMS]; // current predicted table
let selected = null;            // index of selected position (0-based)
let isLocked = false;
let currentUser = null;
let accessToken = null;

async function init(){
  await loadConfig();
  await loadSession();
  buildTable();
  updateProgress();
}

async function loadConfig(){
  try{
    const r=await fetch(`${SS_URL}/rest/v1/prem_config?id=eq.1&select=*`,{headers:{'apikey':SS_KEY,'Authorization':'Bearer '+SS_KEY}});
    const d=await r.json();
    if(d.length&&d[0].teams&&d[0].teams.length){
      // Update teams list from config
      const configTeams=d[0].teams;
      order=configTeams.slice();
    }
    if(d.length&&d[0].is_locked){
      isLocked=true;
      document.getElementById('locked-wrap').innerHTML=
        '<div class="locked-banner" style="max-width:700px;margin:0 auto 10px">🔒 Predictions are locked — the 2026-27 season has started</div>';
    }
    if(d.length&&d[0].lock_date){
      const ld=new Date(d[0].lock_date);
      const now=new Date();
      if(ld>now){
        const days=Math.ceil((ld-now)/86400000);
        document.querySelector('.page-head p').textContent=
          `Predictions lock in ${days} day${days!==1?'s':''} — before the season kicks off`;
      }
    }
  }catch(e){}
}

async function loadSession(){
  try{
    const keys=Object.keys(localStorage).filter(k=>k.includes('supabase')&&k.includes('auth'));
    if(!keys.length){showAuthBanner();return;}
    const s=JSON.parse(localStorage.getItem(keys[0]));
    currentUser=s?.user||s?.session?.user;
    accessToken=s?.access_token||s?.session?.access_token;
    if(!currentUser){showAuthBanner();return;}
    // Load existing picks
    const r=await fetch(`${SS_URL}/rest/v1/prem_table_picks?user_id=eq.${currentUser.id}&select=*`,
      {headers:{'apikey':SS_KEY,'Authorization':'Bearer '+accessToken}});
    const d=await r.json();
    if(d.length&&d[0].table_order&&d[0].table_order.length===20){
      order=d[0].table_order.slice();
      if(d[0].locked) isLocked=true;
    }
  }catch(e){showAuthBanner();}
}

function showAuthBanner(){
  document.getElementById('auth-banner-wrap').innerHTML=
    '<div class="auth-banner"><h3>Sign in to save your prediction</h3>'+
    '<p>Free to join — save your table prediction and compete on the leaderboard</p>'+
    '<button class="btn-auth" onclick="document.dispatchEvent(new CustomEvent(\'ss:showSignIn\'))">Sign In / Join Free</button></div>';
}

function buildTable(){
  const wrap=document.getElementById('table-wrap');
  wrap.innerHTML='';
  order.forEach((team,i)=>{
    const pos=i+1;
    const zone=getZone(pos);
    // Zone divider labels
    if(pos===1)  addDivider(wrap,'Champions League (Top 5)');
    if(pos===6)  addDivider(wrap,'Europa League');
    if(pos===8)  addDivider(wrap,'Conference League');
    if(pos===9)  addDivider(wrap,'');
    if(pos===18) addDivider(wrap,'Relegation Zone');
    const row=document.createElement('div');
    row.className='pred-row';
    row.id='row-'+i;
    const isSelected=(selected===i);
    row.innerHTML=
      `<div class="pos-num">${pos}</div>`+
      `<div class="zone-bar ${zone.bar}"></div>`+
      `<div class="team-card${isSelected?' selected':''}${!team?' empty':''}" onclick="tapTeam(${i})"`+
      ` id="tc-${i}">`+
      `<span class="team-name">${team||'— pick a team'}</span>`+
      (zone.label?`<span class="team-zone-label label-${zone.cls}">${zone.label}</span>`:'')+
      `</div>`+
      `<div class="arrows">`+
      `<button class="arr-btn" onclick="moveUp(${i})" ${isLocked||i===0?'disabled':''}>▲</button>`+
      `<button class="arr-btn" onclick="moveDown(${i})" ${isLocked||i===19?'disabled':''}>▼</button>`+
      `</div>`;
    wrap.appendChild(row);
  });
}

function addDivider(wrap, label){
  const d=document.createElement('div');
  d.className='zone-divider';
  wrap.appendChild(d);
  if(label){
    const l=document.createElement('div');
    l.className='zone-label-row';
    l.textContent=label;
    wrap.appendChild(l);
  }
}

function tapTeam(idx){
  if(isLocked) return;
  if(selected===null){
    selected=idx;
    document.getElementById('hint-text').textContent='Now tap the position you want to swap with';
  } else if(selected===idx){
    selected=null;
    document.getElementById('hint-text').textContent='Tap a team to select it';
  } else {
    // Swap
    const tmp=order[selected];
    order[selected]=order[idx];
    order[idx]=tmp;
    selected=null;
    document.getElementById('hint-text').textContent='Tap a team to select it';
  }
  buildTable();
  updateProgress();
}

function moveUp(idx){
  if(isLocked||idx===0) return;
  const tmp=order[idx-1];order[idx-1]=order[idx];order[idx]=tmp;
  selected=null;buildTable();updateProgress();
}
function moveDown(idx){
  if(isLocked||idx===19) return;
  const tmp=order[idx+1];order[idx+1]=order[idx];order[idx]=tmp;
  selected=null;buildTable();updateProgress();
}

function updateProgress(){
  const placed=order.filter(t=>t&&t.trim()).length;
  document.getElementById('placed-count').textContent=placed;
  const btn=document.getElementById('btn-next');
  if(btn) btn.disabled=(placed<20||!currentUser);
}

async function savePicks(){
  if(!currentUser){setMsg('Sign in to save','');return;}
  setMsg('Saving…','');
  try{
    const body=JSON.stringify({user_id:currentUser.id,table_order:order,updated_at:new Date().toISOString()});
    const r=await fetch(`${SS_URL}/rest/v1/prem_table_picks`,{
      method:'POST',headers:{'apikey':SS_KEY,'Authorization':'Bearer '+accessToken,
        'Content-Type':'application/json','Prefer':'resolution=merge-duplicates'},
      body});
    r.ok?setMsg('✓ Saved!','ok'):setMsg('Error — try again','');
  }catch(e){setMsg('Error — try again','');}
}

function goNext(){
  // Save current state to sessionStorage so bonus page can read it
  sessionStorage.setItem('prem_table',JSON.stringify(order));
  savePicks().then(()=>window.location.href='prem-bonus.html');
}

function setMsg(msg,cls){
  const el=document.getElementById('save-msg');
  el.textContent=msg;el.className='save-msg'+(cls?' '+cls:'');
}

init();
</script>
</body>
</html>
