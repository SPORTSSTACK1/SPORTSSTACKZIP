:root{
  --bg:#1B2334;--surface:#242E44;--surface2:#2A3550;--line:#2E3A54;--line-2:#3B4869;

*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--ink);font-family:'Sora',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased}
nav{position:sticky;top:0;z-index:1000;background:rgba(27,35,52,.94);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:56px}
nav img{border-radius:8px}
.btn-lb{font:700 11px/1 'Sora',sans-serif;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);text-decoration:none;padding:8px 14px;border:1px solid var(--gold-deep);border-radius:6px}

.game-wrap{max-width:620px;margin:0 auto;padding:34px 18px 70px}
.all-sports-badge{font:700 9.5px/1 'Sora',sans-serif;letter-spacing:.24em;text-transform:uppercase;color:var(--gold-dim);display:flex;align-items:center;gap:10px;margin-bottom:14px}
.all-sports-badge:before{content:"";width:24px;height:1px;background:var(--gold-deep)}
.game-title{font-family:'Fraunces',Georgia,serif;font-weight:600;font-size:clamp(42px,10vw,68px);line-height:.92;letter-spacing:-.03em;color:var(--ink);margin-bottom:8px}
.game-title em,.game-title i{font-style:italic;font-weight:400;color:var(--gold)}
.game-sub{font-family:'Fraunces',Georgia,serif;font-style:italic;font-size:14.5px;color:var(--mute);margin-bottom:24px}

.score-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;border-bottom:1px solid var(--line);padding-bottom:12px}
.score-pill{font-family:'Fraunces',Georgia,serif;font-weight:600;font-size:19px;color:var(--gold);letter-spacing:-.01em}
.score-pill small{color:var(--mute-2);font-weight:400;font-size:12px;font-family:'Sora',sans-serif}
.hint-count{font:700 10px/1 'Sora',sans-serif;letter-spacing:.18em;text-transform:uppercase;color:var(--mute)}

/* Signature: the dossier — six numbered files, opened one at a time */
.hints-area{margin-bottom:18px}
.hint-card{background:var(--surface);border:1px solid var(--line-2);border-radius:8px;padding:14px 16px 14px 52px;margin-bottom:8px;position:relative;transition:border-color .25s,background .25s}
.hint-card .hint-num{position:absolute;left:16px;top:13px;font-family:'Fraunces',Georgia,serif;font-weight:600;font-style:italic;font-size:17px;color:var(--gold-dim);width:24px}
.hint-card.active{border-left:2px solid var(--gold)}
.hint-card.active .hint-text{font-family:'Fraunces',Georgia,serif;font-size:15.5px;line-height:1.55;color:var(--ink);font-weight:400}
.hint-card.active .hint-text:before{content:"\201C";color:var(--gold-dim);margin-right:1px}
.hint-card.active .hint-text:after{content:"\201D";color:var(--gold-dim);margin-left:1px}
.hint-card.locked{opacity:.5}
.hint-card.locked .hint-num{color:var(--mute-2)}
.hint-locked-text{font:500 12px/1.4 'Sora',sans-serif;color:var(--mute-2);letter-spacing:.04em}
.hint-card.just-opened{animation:fileOpen .35s ease both}
@keyframes fileOpen{from{opacity:.3;transform:translateY(-3px)}to{opacity:1;transform:none}}

.btn-reveal{width:100%;padding:13px;background:transparent;border:1px solid var(--line-2);border-radius:8px;font:700 11.5px/1 'Sora',sans-serif;letter-spacing:.14em;text-transform:uppercase;color:var(--mute);cursor:pointer;transition:border-color .15s,color .15s;margin-bottom:14px}
.btn-reveal:hover{border-color:var(--gold);color:var(--gold)}
.wrong-list{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.wrong-pill{font:500 12px/1 'Sora',sans-serif;background:var(--red-bg);border:1px solid rgba(248,113,113,.3);color:var(--red);border-radius:14px;padding:5px 12px}
.msg{min-height:18px;font-family:'Fraunces',Georgia,serif;font-style:italic;font-size:13.5px;color:var(--mute);margin-bottom:8px}
.input-wrap{position:relative;margin-bottom:10px}
.guess-input{width:100%;padding:14px 16px;background:var(--surface);border:1px solid var(--line-2);border-radius:8px;color:var(--ink);font-size:15px;font-family:'Sora',sans-serif;outline:none;transition:border-color .15s}
.guess-input:focus{border-color:var(--gold)}
.dd-box{position:absolute;left:0;right:0;top:calc(100% + 4px);background:var(--surface2);border:1px solid var(--line-2);border-radius:8px;overflow:hidden;z-index:40;max-height:220px;overflow-y:auto}
.dd-item{padding:11px 16px;font-size:14px;cursor:pointer;font-family:'Sora',sans-serif}
.dd-item:hover,.dd-item.hl{background:var(--surface);color:var(--gold)}
.btn-guess{width:100%;padding:15px;background:var(--gold);border:none;border-radius:8px;font:800 12px/1 'Sora',sans-serif;letter-spacing:.18em;text-transform:uppercase;color:#151C2B;cursor:pointer;transition:background .15s}
.btn-guess:hover{background:#FCE28A}

.result-banner{border-radius:10px;padding:26px 22px;margin-top:18px;text-align:left;background:var(--surface);border:1px solid var(--line-2);border-top:3px solid var(--gold)}
.result-banner.lost{border-top-color:var(--red)}
.result-kicker{font:700 9.5px/1 'Sora',sans-serif;letter-spacing:.24em;text-transform:uppercase;color:var(--gold-dim);margin-bottom:12px}
.result-banner.lost .result-kicker{color:var(--red)}
.result-name{font-family:'Fraunces',Georgia,serif;font-weight:600;font-size:clamp(26px,6vw,36px);letter-spacing:-.02em;color:var(--ink);line-height:1.05;margin-bottom:4px}
.result-nat{font-family:'Fraunces',Georgia,serif;font-style:italic;font-size:14px;color:var(--mute);margin-bottom:14px}
.result-blocks{font-size:19px;letter-spacing:2px;margin-bottom:8px}
.result-score{font-family:'Fraunces',Georgia,serif;font-weight:600;font-style:italic;font-size:19px;color:var(--gold);margin-bottom:6px}
.streak-line{font:600 12.5px/1.5 'Sora',sans-serif;color:var(--gold);margin-bottom:16px;min-height:16px}
.btn-share{display:inline-block;padding:14px 28px;background:var(--gold);border:none;border-radius:6px;font:800 11px/1 'Sora',sans-serif;letter-spacing:.18em;text-transform:uppercase;color:#151C2B;cursor:pointer;transition:background .15s}
.btn-share:hover{background:#FCE28A}
.sport-cat{font:700 9.5px/1 'Sora',sans-serif;letter-spacing:.2em;text-transform:uppercase;color:var(--mute);border:1px solid var(--line-2);border-radius:12px;padding:5px 12px;display:inline-block}
button:focus-visible,a:focus-visible,input:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>

ty rivals in a league match in 2011.","I became my club's all-time leading scorer, surpassing a record that had stood for decades.","I later managed clubs in the United States and the Championship.","I am the all-time top scorer for both Manchester United and the England national team."]},{"name":"Didier Drogba","sport":"Football","nat":"Ivorian","hints":["I was born in Abidjan but spent much of my childhood in France with an uncle who was a professional player.","I was still playing semi-professional football at age 21 — a late developer by elite standards.","I scored a header in the final seconds of a European final to force extra time after my team had been minutes from defeat.","I reportedly used a post-match speech to broker a ceasefire in my home country's civil war.","I scored 44 goals against so-called top-four opposition in England — more than any other player.","I am an Ivorian striker and Chelsea's second all-time scorer, known above all for his big-game impact."]},{"name":"Zlatan Ibrahimović","sport":"Football","nat":"Swedish","hints":["I grew up in the Rosengård district of Malmö — one of Sweden's most deprived immigrant neighbourhoods.","I was nearly sold by a club after refusing to trial for the manager — 'Zlatan does not do auditions.'","I won league titles in five different countries — the Netherlands, Italy, Spain, France, and England.","I scored a bicycle kick from 30 yards that was voted Goal of the Tournament at a major international competition.","I came out of international retirement aged 39 and scored twice on my comeback appearance.","I am a Swedish striker famous for referring to himself in the third person and a career across Europe's biggest clubs."]},{"name":"Paolo Maldini","sport":"Football","nat":"Italian","hints":["My father captained the same club I would later captain — the only father-and-son captains of the same major European club.","I made my debut at age 16 and did not leave the club for 25 years.","I played 902 competitive matches for a single club — a record for a European defender at one team.","I reached the European Cup final six times and won it five times.","I never received a single red card in over 900 professional appearances.","I am an Italian defender who spent his entire 25-year career at AC Milan."]},{"name":"Gianluigi Buffon","sport":"Football","nat":"Italian","hints":["I set the record for the longest consecutive minutes without conceding a goal in Italy's top division — 974 minutes.","I was purchased by my club for a then-world-record transfer fee for a goalkeeper.","I won my country's greatest team prize with a squad that had been stripped of a previous title due to match-fixing.","I won nine league titles with a single Italian club and made 176 international appearances — a record.","I continued playing professional football at the highest level well into my 40s.","I am an Italian goalkeeper considered one of the greatest of all time, who spent most of his career at Juventus."]},{"name":"Luka Modrić","sport":"Football","nat":"Croatian","hints":["I spent part of my early childhood as a refugee, displaced during the Croatian War of Independence in the 1990s.","I struggled so profoundly in my first season at an English club that supporters voted me their worst signing of the decade.","I voted the sport's world player of the year in 2018 — ending a ten-year period of dominance by two other players.","I led my country to the World Cup final in 2018 and the semi-finals in 2022.","I won five of the sport's biggest club prizes with a Spanish club after leaving England.","I am a Croatian midfielder who won the FIFA World Player of the Year award in 2018 and has played for Real Madrid for over a decade."]},{"name":"Marco van Basten","sport":"Football","nat":"Dutch","hints":["I was considered a slow, unathletic striker early in my career — coaches doubted whether I could compete at the highest level.","My career was ended prematurely by a severe ankle injury at the age of 28 — I pics.","I am a British marathon runner who held the women's marathon world record for over 16 years."]},{"name":"Jackie Joyner-Kersee","sport":"Athletics","nat":"American","hints":["I was named after Jacqueline Kennedy because my grandmother believed I would be the 'first lady of something.'","My older sister-in-law was also one of the most famous athletes of the same era and competed at the same Games.","I set the heptathlon world record in 1988 with 7,291 points — a record that still stands.","I won Olympic gold in both the long jump and the heptathlon across two different Games.","I have been described by multiple publications as the greatest female athlete in history.","I am an American multi-event athlete who holds the all-time heptathlon world record and won multiple Olympic gold medals."]},{"name":"Michael Phelps","sport":"Swimming","nat":"American","hints":["I was diagnosed with ADHD at age 9 and a teacher told my mother I would never be able to focus on anything.","My wingspan is three inches longer than my height, and my legs are proportionally shorter than average.","I won eight gold medals at a single Olympic Games — breaking a 36-year-old record set by a compatriot.","I have won 28 Olympic medals in total — more than any other athlete in Olympic history.","I publicly addressed my mental health struggles during and after my career, becoming a prominent advocate.","I am an American swimmer who holds the all-time record for Olympic medals with 28, including 23 gold."]},{"name":"Mark Spitz","sport":"Swimming","nat":"American","hints":["I boasted before the 1968 Olympics that I would win six gold medals — I won none in individual events.","I came back four years later and won seven gold medals — every one accompanied by a world record.","I competed at the Munich Games under the shadow of a terrorist attack — competition continued after a brief pause.","I was famous for wearing a thick moustache in competition — when asked by a Soviet official if it helped, I 11, as the sport's all-time leading scorer.","I am an Indian batsman nicknamed 'The Little Master' and the all-time leading scorer in both Test and ODI cricket."]},{"name":"Don Bradman","sport":"Cricket","nat":"Australian","hints":["I grew up in rural New South Wales and taught myself to bat by hitting a golf ball against a water tank with a cricket stump.","I was so dominant that England devised a specific tactical plan — bodyline bowling — specifically designed to stop me.","I was dismissed for zero in my final innings, denying me a career batting average of exactly 100.","My batting average of 99.94 is the greatest statistical outlier in any major team sport in history.","I was knighted for services to cricket.","I am an Australian batsman with a Test average of 99.94 — the greatest statistical achievement in any sport."]},{"name":"Brian Lara","sport":"Cricket","nat":"Trinidadian","hints":["I grew up in Santa Cruz, Trinidad, one of eleven children, coached by a former international player.","I set the record for the highest individual first-class score — 501 not out — in a county match in 1994.","I set the Test record with 375 not out, then saw it broken by a South African — before reclaiming it with 400 not out.","I twice carried an outgunned team on my shoulders, scoring over 500 runs in a single series virtually alone.","I am a left-handed batsman recognised by a distinctive sideways stance.","I am a Trinidadian cricketer who holds the record for the highest individual innings in Test cricket — 400 not out."]},{"name":"Shane Warne","sport":"Cricket","nat":"Australian","hints":["My first ball in an Ashes Test moved so far that it became known simply as 'The Ball of the Century.'","I was banned for one year after testing positive for a diuretic — which I claimed I took on my mother's advice.","I was ranked the second greatest Test cricketer of all time — behind only Don Bradman — in a poll of writers.","I took 708 Test wickets — the second-highest total in history.","I was famous for developing deliveries — the flipper, the zooter, the slider — that bamboozled experienced batsmen.","I am an Australian leg-spin bowler who took 708 Test wickets before his sudden death in 2022."]},{"name":"Garfield Sobers","sport":"Cricket","nat":"Barbadian","hints":["I was born with a deformity on both hands — extra fingers — which were surgically removed as a child.","I set the then-world record for the highest individual Test score — 365 not out — at the age of 21.","I hit six sixes in a single over in 1968 — the first time it had been achieved in first-class cricket.","I am considered the greatest cricket all-rounder in history — able to bat, bowl both fast and spin, and field brilliantly.","I was knighted by the Queen for services to cricket.","I am a Barbadian cricketer considered the greatest all-rounder of all time, who hit six sixes in an over in 1968."]},{"name":"Ian Botham","sport":"Cricket","nat":"English","hints":["I was rejected by a county club as a teenager — the same club that would later try to sign me.","I was player of the match in multiple 1981 Ashes Tests, scoring 149 not out at Headingley and taking 5 for 1 at Edgbaston.","I walked from John o'Groats to Land's End for charity in 1985, raising money for a children's disease.","I took 383 Test wickets and scored over 5,000 Test runs — making me England's greatest all-rounder.","I was found guilty of bringing the sport into disrepute after admitting to cannabis use in New Zealand.","I am an English cricketer nicknamed 'Beefy' whose 1981 Ashes performance is simply known as 'Botham's Ashes.'"]},{"name":"Imran Khan","sport":"Cricket","nat":"Pakistani","hints":["I was educated at Aitchison College and Worcester Royal Grammar School before studying at Oxford University.","I was an underwhelming fast bowler in my early career before a complete technical overhaul made me world-class.","I built a cancer hospital in Pakistan largely through personal fundraising, naming it after his mother.","I captained my country to their only World Cup victory, aged 39, scoring an unbeaten half-century in the final.","I later entered politics and served as Prime Minister until a vote of no-confidence in 2022.","I am a Pakistani cricket all-rounder who captained his country to the 1992 World Cup and became Prime Minister."]},{"name":"Jonah Lomu","sport":"Rugby Union","nat":"New Zealand","hints":["I was of Tongan heritage, grew up in a tough area of South Auckland, and was discovered playing sevens at school.","I was diagnosed with nephrotic syndrome — a serious kidney condition — and played at the highest level for years while managing the disease.","I ran through four international defenders in a World Cup semi-final, treating them as obstacles.","I was 6'5\", over 18 stone, and could run 100 metres in under 11 seconds — an impossible combination for my era.","I am the first player generally credited as a true global rugby union superstar.","I am a New Zealand winger whose combination of size and pace transformed the sport, first revealed to the world in 1995."]},{"name":"Richie McCaw","sport":"Rugby Union","nat":"New Zealand","hints":["I grew up on a farm in Kurow, a small South Island town, and flew a light aircraft in my spare time.","I won the Rugby World Player of the Year award three times and was almost undetectable at the breakdown.","I captained my team to back-to-back World Cup victories in 2011 and 2015.","I made 148 Test appearances — the most in All Blacks history at the time of my retirement.","I am the most capped and most successful captain in the history of international rugby.","I am a New Zealand flanker who captained the All Blacks to consecutive World Cup victories."]},{"name":"Jonny Wilkinson","sport":"Rugby Union","nat":"English","hints":["My unusual pre-kick routine — clasping my hands together and focusing on a spot between them — became the most imitated in the sport.","I spent the equivalent of four full years of my career on the ile, Alabama and learned to hit by swinging a broomstick at bottle caps in my yard.","I received death threats and thousands of pieces of hate mail as I closed in on a white player's home run record.","I broke the all-time home run record in April 1974, surpassing a number that had stood for nearly four decades.","I was considered more of a consistent hitter than a pure power hitter for most of my career.","I held the career home run record from 1974 until 2007.","I am an American baseball player nicknamed 'Hammerin' Hank' who held the all-time home run record from 1974 to 2007."]},{"name":"Derek Jeter","sport":"Baseball","nat":"American","hints":["I told my parents at age six I was going to play for the New York Yankees — then joined their organisation straight out of high school.","I made a relay throw in the 2001 playoffs that required a level of awareness coaches say cannot be taught.","I hit a home run after midnight during the 2001 World Series — in extra innings of a game that had started the night before.","I spent my entire 20-year career with a single team, serving as captain for the final 14 years.","I retired as the New York Yankees' all-time hit leader.","I am an American shortstop who served as captain of the New York Yankees for his entire 20-year career."]},{"name":"Mickey Mantle","sport":"Baseball","nat":"American","hints":["I grew up in Commerce, Oklahoma, where my father and grandfather worked in the lead and zinc mines.","I hit what was measured as the longest home run in history — 565 feet — in 1953.","I was a switch-hitter who could hit home runs from both sides of the plate.","I played through bone injuries and operations for most of my career.","I won the Triple Crown in 1956 — leading the league in home runs, batting average, and runs batted in.","I am an American baseball player who wore number 7 for the New York Yankees."]},{"name":"Wayne Gretzky","sport":"Ice Hockey","nat":"Canadian","hints":["My father built a backyard rink in Brantford, Ontario and I would skate for hours after school, in the dark.","I was traded by a team I had helped win four championships — in a deal treated as a national tragedy in Canada.","I have more career assists than any other player has career points — the most extraordinary statistical dominance in team sport.","I won four championships in five years with an Alberta team before moving to California.","No other player has scored 200 points in a single season — I did it four times.","I am a Canadian ice hockey centre nicknamed 'The Great One' who holds virtually every offensive record in the sport's history."]},{"name":"Mario Lemieux","sport":"Ice Hockey","nat":"Canadian","hints":["I scored on my very first shift, on my very first shot, in my very first professional game in 1984.","I was the first player-owner in the sport's history, buying the franchise I played for out of bankruptcy.","I overcame Hodgkin's lymphoma during my playing career — continuing to compete and winning a scoring title during treatment.","My nickname — 'Le Magnifique' — was given to me by French-Canadian fans.","I am widely considered the only player of my era with the skill to rival the greatest of all time.","I am a Canadian ice hockey centre nicknamed 'Le Magnifique' who overcame cancer to win two championships with the Pittsburgh Penguins."]},{"name":"Bobby Orr","sport":"Ice Hockey","nat":"Canadian","hints":["I was signed by a professional franchise at age 12 — the youngest player in history to be contracted by an NHL team.","I won the award for best defenceman eight consecutive times — a record unlikely ever to be broken.","I completely transformed the defenceman role, regularly leading the entire league in scoring from the blue line.","I scored the most iconic goal in championship history — leaping through the air after my overtime winner in 1970.","I suffered from knee injuries and was forced to retire at just 30.","I am a Canadian defenceman who won two championships with the Boston Bruins named 'Il Leone' who won the 1992 World Championship with Williams."]},{"name":"Bill Russell","sport":"Basketball","nat":"American","hints":["I grew up in Monroe, Louisiana during segregation and moved to Oakland as a teenager.","I became the first Black head coach in major American professional sport — managing while still playing.","I was so dominant defensively that historians identify my arrival as the moment the game's tactical approach permanently changed.","I won 11 championships in 13 seasons — the greatest dynasty in American professional sport history.","My rivalry with a player who scored 100 points in a single game defined an entire era.","I am an American basketball player who won 11 NBA championships with the Boston Celtics in 13 seasons."]},{"name":"Oscar Robertson","sport":"Basketball","nat":"American","hints":["I grew up in Indianapolis and was such a dominant college player I was nicknamed 'The Big O' before turning professional.","I averaged a triple-double — over 10 in points, rebounds, and assists — for an entire season in 1961-62.","That feat was not repeated for 55 years.","I fought the governing body's draft rules in the courts — a legal battle that fundamentally changed player rights in professional sport.","I won one championship in 1971 alongside a younger centre who became the all-time scoring leader.","I am an American basketball player nicknamed 'The Big O' who averaged a triple-double for an entire season."]},{"name":"Dawn Fraser","sport":"Swimming","nat":"Australian","hints":["I grew up in Balmain, a working-class suburb of Sydney, one of eight children who taught myself to swim in the harbour.","I was suspended from competition for 10 years after stealing a flag from the Olympic Village at the 1964 Tokyo Games.","I was the first woman in history to swim 100 metres in under one minute.","I won the 100m freestyle Olympic gold at three consecutive Games — a feat never repeated.","I am considered by many historians to be Australia's greatest ever Olympian.","I am an Australian swimmer who won the 100m freestyle gold at three consecutive Olympics."]},{"name":"Cathy Freeman","sport":"Athletics","nat":"Australian","hints":["I carried two flags after winning at the 1994 Commonwealth Games — one representing national identity, one the indigenous people.","I was chosen to light the Olympic cauldron at an opening ceremony.","I carried the weight of reconciliation between two peoples on my shoulders at the biggest moment of my career.","I wore a distinctive silver full-body racing suit — one of the most distinctive uniforms in Olympic history.","I won the 400m gold in front of a home crowd of 110,000 in Sydney in 2000.","I am an Australian sprinter of Aboriginal descent who won the 400m at the Sydney 2000 Olympics."]},{"name":"Wasim Akram","sport":"Cricket","nat":"Pakistani","hints":["I was discovered playing a scratch game of cricket in Lahore at age 15 by a former Test player.","I could swing an older ball in directions that defied conventional physics — an ability that scientists have never fully explained.","I took 414 Test wickets with a left arm that generated extraordinary pace and movement.","I was the first bowler in history to take 500 wickets in the limited-overs format.","I played alongside Imran Khan in the 1992 World Cup and is considered the greatest left-arm pace bowler of all time.","I am a Pakistani left-arm fast bowler considered the greatest of his type in cricket history."]},{"name":"Glenn McGrath","sport":"Cricket","nat":"Australian","hints":["I grew up in Narromine, a small rural town in New South Wales, considered tall and ungainly as a junior.","I was famous for publicly predicting exact Test match scorelines — and being right with alarming frequency.","My bowling average of 21.64 across 124 Tests is among the best ever recorded by a pace bowler.","I set public targets before Ashes series — and delivered on most of them.","I took 563 Test wickets — the most by a fast bowler at the time of my retirement.","I am an Australian fast bowler who took 563 Test wickets and is considered the most accurate pace bowler of the modern era."]},{"name":"Jon Jones","sport":"MMA","nat":"American","hints":["I became the youngest champion in the largest MMA promotion's history at age 23.","I was stripped of my title and suspended multiple times due to failed drug tests and legal issues.","I held the light heavyweight championship for over 11 years across multiple reigns.","I moved up in weight and won the heavyweight championship in 2023 — becoming a two-division world champion.","I am considered by many — including the promotion's owner — to be the greatest mixed martial artist of all time.","I am an American mixed martial artist widely considered the greatest in the sport's history."]},{"name":"Alberto Tomba","sport":"Skiing","nat":"Italian","hints":["I grew up in the hills outside Bologna — an unusual background, as Italy's ski talent traditionally came from the mountains.","My parents were not skiers — my success was considered an accident of talent rather than upbringing.","I won three Olympic gold medals in technical events at the 1988 and 1992 Winter Games.","I was as famous for my off-slope lifestyle as for my skiing — a flamboyant personality at odds with the sport's austere culture.","I won 50 World Cup races and redefined the athleticism required for technical alpine events.","I am an Italian alpine skier nicknamed 'La Bomba' who won three Olympic gold medals."]},{"name":"Kelly Slater","sport":"Surfing","nat":"American","hints":["I grew up in Cocoa Beach, Florida and was sponsored by a surfwear brand at age 14.","I am simultaneously the youngest and the oldest world champion in the sport's history.","I have won 11 world titles — more than double the next most successful competitor.","I designed an artificial wave pool considered the most perfect wave ever created for surfing.","I won my first world title at 20 and my last at 39.","I am an American surfer who has won 11 World Surf League Championships."]},{"name":"Valentina Vezzali","sport":"Fencing","nat":"Italian","hints":["I come from Jesi in central Italy — a small city that has produced a disproportionate number of world champions in my sport.","My discipline requires lightning reflexes and the ability to score touches on a target area measured in centimetres.","I won three consecutive Olympic gold medals in individual competition in the same weapon.","I hold more Olympic gold medals in my sport than any other competitor in history.","I became a member of the Italian parliament after retiring from competition.","I am an Italian fencer who won the Olympic individual foil title at three consecutive Games."]}];

function getDailySeed(){
  // Days since epoch — small integer that changes by exactly 1 each day
  const d=new Date();
  const utc=Date.UTC(d.getFullYear(),d.getMonth(),d.getDate());
  return Math.floor(utc/86400000);
}
function mulberry32(seed){
  return function(){
    seed|=0; seed=seed+0x6D2B79F5|0;
    var t=Math.imul(seed^seed>>>15,1|seed);
    t=t+Math.imul(t^t>>>7,61|t)^t;
    return((t^t>>>14)>>>0)/4294967296;
  };
}
const rng=mulberry32(getDailySeed());
const todayIdx=Math.floor(rng()*ATHLETES.length);
const TARGET=ATHLETES[todayIdx];

let hintsRevealed=1,wrongGuesses=[],done=false,ddItems=[],ddHighlight=-1,score=12;

function norm(s){return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();}

function renderHints(){
  const area=document.getElementById('hints-area');
  area.innerHTML='';
  for(let i=0;i<6;i++){
    const div=document.createElement('div');
    if(i<hintsRevealed){
      div.className='hint-card active'+(i===hintsRevealed-1&&i>0?' just-opened':'');
      div.innerHTML=`<div class="hint-num">${i+1}</div><div class="hint-text">${TARGET.hints[i]}</div>`;
    } else {
      div.className='hint-card locked';
      div.innerHTML=`<div class="hint-num">${i+1}</div><div class="hint-locked-text">Unopened</div>`;
    }
    area.appendChild(div);
  }
  document.getElementById('hint-count').textContent=`Clue ${hintsRevealed} of 6`;
  document.getElementById('score-val').textContent=score;
  const btn=document.getElementById('btn-reveal');
  btn.disabled=hintsRevealed>=6||done;
}

function revealNext(){
  if(hintsRevealed>=6||done) return;
  hintsRevealed++;
  score=Math.max(2,score-2);
  renderHints();
}

function getMatches(val){
  if(!val||val.length<2) return [];
  const n=norm(val);
  return ATHLETES.filter(a=>norm(a.name).includes(n)||norm(a.name.split(' ').pop()).startsWith(n)).slice(0,8);
}

const input=document.getElementById('guess-input');
const dd=document.getElementById('dd-box');

input.addEventListener('input',function(){
  const matches=getMatches(input.value);
  ddItems=matches;
  ddHighlight=-1;
  if(matches.length){
    dd.innerHTML=matches.map((a,i)=>`<div class="dd-item" data-i="${i}"><span>${a.name}</span><span class="dd-sport">${a.sport}</span></div>`).join('');
    dd.style.display='block';
    dd.querySelectorAll('.dd-item').forEach(el=>el.addEventListener('mousedown',ev=>{
      ev.preventDefault();
      input.value=ddItems[+el.dataset.i].name;
      dd.style.display='none';
    }));
  } else {
    dd.style.display='none';
  }
});

input.addEventListener('keydown',function(e){
  if(e.key==='ArrowDown'){e.preventDefault();ddHighlight=Math.min(ddHighlight+1,ddItems.length-1);updateDDHighlight();}
  else if(e.key==='ArrowUp'){e.preventDefault();ddHighlight=Math.max(ddHighlight-1,0);updateDDHighlight();}
  else if(e.key==='Enter'){
    if(ddHighlight>=0&&ddItems[ddHighlight]){input.value=ddItems[ddHighlight].name;dd.style.display='none';}
    submitGuess();
  }
  else if(e.key==='Escape') dd.style.display='none';
});

function updateDDHighlight(){
  dd.querySelectorAll('.dd-item').forEach((el,i)=>el.classList.toggle('active',i===ddHighlight));
}

function submitGuess(){
  if(done) return;
  dd.style.display='none';
  const val=input.value.trim();
  if(!val) return;
  input.value='';
  const msg=document.getElementById('msg');
  
  if(norm(val)===norm(TARGET.name)){
    done=true;
    document.getElementById('controls').style.display='none';
    showResult(true);
  } else {
    wrongGuesses.push(val);
    msg.textContent='Not '+val+'. Try again.';
    setTimeout(()=>msg.textContent='',2500);
    const wl=document.getElementById('wrong-list');
    wl.innerHTML=wrongGuesses.map(w=>`<span class="wrong-pill">✗ ${w}</span>`).join('');
    // Auto-reveal if 3 wrong guesses per hint level
    if(wrongGuesses.length>=hintsRevealed*2&&hintsRevealed<6){
      revealNext();
      msg.textContent='A clue opened itself after those misses.';
    }
  }
}


function ymdW(d){ return d.toISOString().slice(0,10); }
function updateStreakW(){
  try{
    var today = ymdW(new Date());
    var last = localStorage.getItem('whoami-streak-last');
    var cur = parseInt(localStorage.getItem('whoami-streak-count')||'0',10) || 0;
    if(last === today) return getStreakW();
    var y = new Date(); y.setDate(y.getDate()-1);
    cur = (last === ymdW(y)) ? cur + 1 : 1;
    localStorage.setItem('whoami-streak-count', String(cur));
    localStorage.setItem('whoami-streak-last', today);
    return cur;
  }catch(e){ return 0; }
}
function getStreakW(){
  try{
    var last = localStorage.getItem('whoami-streak-last');
    if(!last) return 0;
    var today = ymdW(new Date());
    var y = new Date(); y.setDate(y.getDate()-1);
    if(last === today || last === ymdW(y)) return parseInt(localStorage.getItem('whoami-streak-count')||'0',10)||0;
    return 0;
  }catch(e){ return 0; }
}

function showResult(won){
  const hintsUsed=hintsRevealed;
  const finalScore=won?score:0;
  const area=document.getElementById('result-area');
  document.getElementById('controls').style.display='none';

  // Lock today + streak
  try{ localStorage.setItem('whoami-daily-'+ymdW(new Date()), JSON.stringify({won:won,hints:hintsUsed,score:finalScore})); }catch(e){}
  var st = updateStreakW();

  const blocks=Array(6).fill(0).map((_,k)=>k<hintsUsed?'\uD83D\uDFE9':'\u2B1C').join('');
  const line = won
    ? ['Got it from a single clue. Ridiculous.','Two clues. Seriously sharp.','Three clues in. Solid.',
       'Four clues. Got there.','Five clues. Cutting it fine.','All six clues. A win is a win.'][hintsUsed-1]
    : 'Nobody gets them all.';
  const streakLine = st>1 ? ('\uD83D\uDD25 '+st+'-day streak. Come back tomorrow to keep it alive.')
                          : 'Come back tomorrow for a new one.';

  area.innerHTML=`
  <div class="result-banner ${won?'won':'lost'}">
    <div class="result-kicker">${won?'Solved':'Not today'} \u00B7 ${TARGET.sport}</div>
    <div class="result-name">${TARGET.name}</div>
    <div class="result-nat">${TARGET.nat}</div>
    <div class="result-blocks">${blocks}</div>
    <div class="result-score">${won?finalScore+' points \u2014 '+line:line}</div>
    <div class="streak-line">${streakLine}</div>
    <button class="btn-share" onclick="shareResult(${won},${hintsUsed},${finalScore})">Copy my score</button>
  </div>`;

  if(typeof saveResult==='function'){
    saveResult('who-am-i','Who Am I?',won?finalScore:0,12,won);
  }
}

function shareResult(won,hints,pts){
  const blocks=Array(6).fill(0).map((_,k)=>k<hints?'\uD83D\uDFE9':'\u2B1C').join('');
  const st=getStreakW();
  const streakLine = st>1 ? ('\uD83D\uDD25 '+st+' day streak\n') : '';
  const text='Who Am I? \u2014 Daily '+ymdW(new Date())+'\n\n'
    + blocks+'\n'
    + (won ? pts+'/12 in '+hints+' clue'+(hints>1?'s':'') : 'Beat me: 0/12')+'\n'
    + streakLine
    + '\nPlay: sportsstack.com.au/who-am-i-quiz.html';
  const btn=document.querySelector('.btn-share');
  const done=()=>{ if(btn){const o=btn.textContent;btn.textContent='Copied \u2713';setTimeout(()=>btn.textContent=o,2000);} };
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(done).catch(()=>{ if(navigator.share) navigator.share({text:text}).catch(()=>{}); });
  } else if(navigator.share){ navigator.share({text:text}).catch(()=>{}); }
}

renderHints();

// Already played today? Show the result state instead of a replayable game.
(function(){
  try{
    var saved = localStorage.getItem('whoami-daily-'+ymdW(new Date()));
    if(!saved) return;
    var r = JSON.parse(saved);
    hintsRevealed = r.hints || 6;
    score = r.score || 0;
    done = true;
    renderHints();
    showResultFromSave(r);
  }catch(e){}
})();

function showResultFromSave(r){
  const area=document.getElementById('result-area');
  document.getElementById('controls').style.display='none';
  var st = getStreakW();
  const blocks=Array(6).fill(0).map((_,k)=>k<(r.hints||6)?'\uD83D\uDFE9':'\u2B1C').join('');
  const streakLine = st>1 ? ('\uD83D\uDD25 '+st+'-day streak. Come back tomorrow to keep it alive.') : 'Come back tomorrow for a new one.';
  area.innerHTML=`
  <div class="result-banner ${r.won?'won':'lost'}">
    <div class="result-kicker">Already played today \u00B7 ${TARGET.sport}</div>
    <div class="result-name">${TARGET.name}</div>
    <div class="result-nat">${TARGET.nat}</div>
    <div class="result-blocks">${blocks}</div>
    <div class="result-score">${r.won ? r.score+'/12 today' : '0/12 today'}</div>
    <div class="streak-line">${streakLine}</div>
    <button class="btn-share" onclick="shareResult(${r.won?'true':'false'},${r.hints||6},${r.score||0})">Copy my score</button>
  </div>`;
}
</script>
