<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#04080f;--surface:#080f1c;--surface2:#0d1829;--gold:#f5c842;--text:#e8f0fe;--text-muted:#6b8abf;--text-dim:#1e3355;--border:#0d2040;--border-bright:#1a3a6a;--green:#22c55e;--red:#ef4444;--radius:10px}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif}
.page{max-width:680px;margin:0 auto;padding:20px 14px 60px}
.game-header{text-align:center;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.game-title{font-family:'Barlow Condensed',sans-serif;font-size:clamp(22px,5vw,36px);font-weight:900;letter-spacing:.04em;text-transform:uppercase}
.game-title .hl{color:var(--gold)}
.game-subtitle{font-size:12px;color:var(--text-muted);letter-spacing:.08em;text-transform:uppercase;margin-top:5px}
.hud{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.hud-pill{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:6px 16px;border-radius:20px;background:var(--surface2);border:1px solid var(--border-bright);color:var(--text-muted)}
.hud-pill span{color:var(--gold)}.timer-pill.urgent span{color:var(--red)!important}
.input-wrap{position:relative;margin-bottom:14px}
.guess-input{width:100%;font-family:'Barlow Condensed',sans-serif;font-size:clamp(16px,3.5vw,22px);font-weight:700;padding:12px 16px;border:2px solid var(--border-bright);border-radius:12px;background:var(--surface2);color:var(--text);outline:none;text-align:center;letter-spacing:.04em;transition:border-color .2s,background .2s}
.guess-input:focus{border-color:#3b82f6}
.guess-input.wrong{border-color:var(--red);background:rgba(239,68,68,.08)}
.tower{display:flex;flex-direction:column;gap:6px}
.rank-row{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);transition:all .3s}
.rank-row.found{background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.4)}
.rank-row.revealed{background:rgba(239,68,68,.07);border-color:rgba(239,68,68,.3)}
.rank-num{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;color:var(--text-dim);width:32px;text-align:center;flex-shrink:0}
.rank-row.found .rank-num,.rank-row.revealed .rank-num{color:var(--gold)}
.rank-row:nth-child(1) .rank-num{color:#ffd700;font-size:26px}
.rank-row:nth-child(2) .rank-num{color:#c0c0c0;font-size:24px}
.rank-row:nth-child(3) .rank-num{color:#cd7f32;font-size:23px}
.rank-info{flex:1;min-width:0}
.rank-name{font-family:'Barlow Condensed',sans-serif;font-size:clamp(14px,3vw,18px);font-weight:800;letter-spacing:.04em;min-height:22px;display:flex;align-items:center;gap:6px}
.rank-flag{font-size:16px;opacity:0;transition:opacity .5s;flex-shrink:0}
.rank-flag.visible{opacity:1}
.rank-stat{font-size:12px;color:var(--text-muted);margin-top:2px}
.rank-bar-wrap{width:80px;height:4px;background:var(--border);border-radius:2px;overflow:hidden;flex-shrink:0}
.rank-bar{height:100%;background:linear-gradient(90deg,#3b82f6,var(--gold));border-radius:2px;transition:width .6s ease}
.rank-val{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:900;color:var(--gold);width:68px;text-align:right;flex-shrink:0}
.result-banner{border-radius:14px;padding:20px;text-align:center;margin-top:18px;border:1px solid}
.result-banner.win{border-color:rgba(34,197,94,.4);background:rgba(34,197,94,.08)}
.result-banner.lose{border-color:rgba(239,68,68,.4);background:rgba(239,68,68,.06)}
.rb-icon{font-size:36px;margin-bottom:8px}
.rb-title{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:900;letter-spacing:.04em;text-transform:uppercase;margin-bottom:6px}
.result-banner.win .rb-title{color:#86efac}.result-banner.lose .rb-title{color:#fca5a5}
.rb-sub{font-size:14px;color:var(--text-muted);margin-bottom:14px}
.share-btn{padding:10px 24px;border-radius:50px;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;border:1.5px solid var(--border-bright);background:transparent;color:var(--text);transition:all .2s}
.share-btn:hover{background:rgba(255,255,255,.06)}

.team-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:12px}
.dm-card{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 6px;text-align:center;transition:.3s}
.dm-card.found{background:#0f3a1f;border-color:#22c55e}
.dm-card.revealed{background:rgba(239,68,68,.07);border-color:rgba(239,68,68,.3)}
.dm-year{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:900;color:var(--gold)}
.dm-name{font-size:11px;font-weight:600;color:var(--text);margin-top:4px;min-height:14px}
.dm-unk{font-size:20px;color:var(--text-dim);margin-top:4px}

.team-grid{margin-top:12px}
.input-wrap{margin-top:8px}
.result-banner{margin-top:12px}

<body>
<div class="page">
  <header class="game-header">
    <div class="game-title">NRL <span class="hl">Dally M Medal Winners Since 2000</span></div>
    <div class="game-subtitle">Name every Dally M Medal winner since 2000 · 5 minutes</div>
  </header>
  <div class="hud">
    <div class="hud-pill"><span id="remain-count">25</span> remaining</div>
    <div class="hud-pill timer-pill" id="timer-pill">⏱ <span id="timer">5:00</span></div>
    <div class="hud-pill"><span id="score">0</span> / 25</div>
  </div>
  <div class="input-wrap">
    <input id="guess-input" class="guess-input" type="text" placeholder="Type a name…" autocomplete="off" spellcheck="false"/>
  </div>
  <div id="msg" style="text-align:center;font-size:13px;color:var(--gold);min-height:20px;margin-bottom:8px;font-family:'Barlow Condensed',sans-serif;letter-spacing:.06em;font-weight:700"></div>
  <button class="btn-give-up" id="give-up-btn" onclick="giveUp()" style="display:block;margin:0 auto 16px;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;background:transparent;color:var(--text-muted);border:1px solid var(--border-bright);padding:8px 20px;border-radius:8px;cursor:pointer;transition:all .2s" onmouseover="this.style.borderColor='#ef4444';this.style.color='#ef4444'" onmouseout="this.style.borderColor='';this.style.color=''">Give Up &amp; Reveal</button>
  <div id="card-grid" class="team-grid" style="grid-template-columns:repeat(5,1fr)"></div>
  <div id="result"></div>
</div>
<script>
const ENTRIES = [
  {rank:1,name:"Trent Barrett",accepted:["barrett","trent barrett"],stat:2000,statDisp:"2000",flag:""},
  {rank:2,name:"Preston Campbell",accepted:["campbell","preston campbell"],stat:2001,statDisp:"2001",flag:""},
  {rank:3,name:"Andrew Johns",accepted:["johns","andrew johns"],stat:2002,statDisp:"2002",flag:""},
  {rank:4,name:"Danny Buderus",accepted:["buderus","danny buderus"],stat:2004,statDisp:"2004",flag:""},
  {rank:5,name:"Johnathan Thurston",accepted:["thurston","johnathan thurston","jt"],stat:2005,statDisp:"2005",flag:""},
  {rank:6,name:"Cameron Smith",accepted:["smith","cameron smith"],stat:2006,statDisp:"2006",flag:""},
  {rank:7,name:"Johnathan Thurston",accepted:["thurston","johnathan thurston","jt"],stat:2007,statDisp:"2007",flag:""},
  {rank:8,name:"Matt Orford",accepted:["orford","matt orford"],stat:2008,statDisp:"2008",flag:""},
  {rank:9,name:"Jarryd Hayne",accepted:["hayne","jarryd hayne"],stat:2009,statDisp:"2009",flag:""},
  {rank:10,name:"Todd Carney",accepted:["carney","todd carney"],stat:2010,statDisp:"2010",flag:""},
  {rank:11,name:"Billy Slater",accepted:["slater","billy slater"],stat:2011,statDisp:"2011",flag:""},
  {rank:12,name:"Ben Barba",accepted:["barba","ben barba"],stat:2012,statDisp:"2012",flag:""},
  {rank:13,name:"Cooper Cronk",accepted:["cronk","cooper cronk"],stat:2013,statDisp:"2013",flag:""},
  {rank:14,name:"Jarryd Hayne",accepted:["hayne","jarryd hayne"],stat:2014,statDisp:"2014",flag:""},
  {rank:15,name:"Johnathan Thurston",accepted:["thurston","johnathan thurston","jt"],stat:2015,statDisp:"2015",flag:""},
  {rank:16,name:"Cooper Cronk",accepted:["cronk","cooper cronk"],stat:2016,statDisp:"2016",flag:""},
  {rank:17,name:"Cameron Smith",accepted:["smith","cameron smith"],stat:2017,statDisp:"2017",flag:""},
  {rank:18,name:"Roger Tuivasa-Sheck",accepted:["tuivasa-sheck","roger tuivasa-sheck","rts"],stat:2018,statDisp:"2018",flag:""},
  {rank:19,name:"James Tedesco",accepted:["tedesco","james tedesco"],stat:2019,statDisp:"2019",flag:""},
  {rank:20,name:"Jack Wighton",accepted:["wighton","jack wighton"],stat:2020,statDisp:"2020",flag:""},
  {rank:21,name:"Tom Trbojevic",accepted:["trbojevic","tom trbojevic","tommy trbojevic"],stat:2021,statDisp:"2021",flag:""},
  {rank:22,name:"Nicho Hynes",accepted:["hynes","nicho hynes"],stat:2022,statDisp:"2022",flag:""},
  {rank:23,name:"Kalyn Ponga",accepted:["ponga","kalyn ponga"],stat:2023,statDisp:"2023",flag:""},
  {rank:24,name:"Jahrome Hughes",accepted:["hughes","jahrome hughes"],stat:2024,statDisp:"2024",flag:""},
  {rank:25,name:"James Tedesco",accepted:["tedesco","james tedesco"],stat:2025,statDisp:"2025",flag:""}
];
const TOTAL = ENTRIES.length;
const TOTAL_SECS = 300;
let secsLeft = TOTAL_SECS, timerInterval = null, foundIds = new Set(), gameActive = false, hintShown = false;

function norm(s){ return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9\s]/g,'').trim(); }
function levenshtein(a,b){
  const m=a.length,n=b.length;
  if(!m)return n;if(!n)return m;
  const dp=Array.from({length:m+1},(_,i)=>Array.from({length:n+1},(_,j)=>j===0?i:i===0?j:0));
  for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[m][n];
}

function showMsg(txt,dur=2000){
  const el=document.getElementById('msg');
  el.textContent=txt;
  clearTimeout(el._t);
  el._t=setTimeout(()=>el.textContent='',dur);
}

function revealRow(rank){
  const e=ENTRIES.find(x=>x.rank===rank);
  if(!e||foundIds.has(rank))return;
  foundIds.add(rank);
  const card=document.getElementById('row-'+rank);
  if(card)card.classList.add('found');
  const unk=document.getElementById('unk-'+rank);
  if(unk)unk.style.display='none';
  const rn=document.getElementById('rname-'+rank);
  if(rn)rn.textContent=e.name;
}


  // Fill ALL rows that match the same player name
  function fillAllMatching(acceptedArr) {
    ENTRIES.forEach(e => {
      if (foundIds.has(e.rank)) return;
      if (e.accepted.some(a => acceptedArr.includes(a))) {
        revealRow(e.rank);
      }
    });
  }


function hideSugg(){}

function showSugg(){}

function buildGrid(){
  const grid=document.getElementById('card-grid');
  if(!grid)return;
  grid.innerHTML=ENTRIES.map(e=>`
    <div class="dm-card" id="row-${e.rank}">
      <div class="dm-year">${e.statDisp}</div>
      <div class="dm-unk" id="unk-${e.rank}">?</div>
      <div class="dm-name" id="rname-${e.rank}"></div>
    </div>`).join('');
}

function updateHUD(){
  document.getElementById('remain-count').textContent=TOTAL-foundIds.size;
  document.getElementById('score').textContent=foundIds.size;

  var _tm=document.getElementById('timer');if(_tm){var _m=Math.floor(secsLeft/60),_s=secsLeft%60;_tm.textContent=_m+':'+(_s<10?'0':'')+_s;}
}

function tryGuess(val){
  if(!gameActive||!val.trim())return;
  const nv=norm(val);
  // Exact match
  for(const e of ENTRIES){
    if(foundIds.has(e.rank))continue;
    if(e.accepted.some(a=>norm(a)===nv)){
      fillAllMatching(e.accepted);
      updateHUD();
      document.getElementById('guess-input').value='';
      hideSugg();
      if(foundIds.size===TOTAL)endGame(true);
      return;
    }
  }
  hideSugg();
}

function startTimer(){
  gameActive=true;
  timerInterval=setInterval(()=>{
    secsLeft--;
    const m=Math.floor(secsLeft/60),s=secsLeft%60;
    document.getElementById('timer').textContent=m+':'+String(s).padStart(2,'0');
    if(secsLeft<=30)document.getElementById('timer-pill').classList.add('urgent');
    
    if(secsLeft<=0){clearInterval(timerInterval);endGame(false);}
  },1000);
}


function giveUp(){
  if(!gameActive)return;
  clearInterval(timerInterval);
  gameActive=false;
  const btn=document.getElementById('give-up-btn');
  if(btn)btn.style.display='none';
  endGame(false);
}
function endGame(won){
  gameActive=false;clearInterval(timerInterval);hideSugg();
  if(!won){
    ENTRIES.forEach(e=>{
      if(!foundIds.has(e.rank)){
        const card=document.getElementById('row-'+e.rank);
        if(card)card.classList.add('revealed');
        const unk=document.getElementById('unk-'+e.rank);
        if(unk)unk.style.display='none';
        const rn=document.getElementById('rname-'+e.rank);
        if(rn)rn.textContent=e.name;
      }
    });
  }
  const won_emoji = '🏆';
  const lose_emoji = '⏱';
  document.getElementById('result').innerHTML=
    `<div class="result-banner ${won?'win':'lose'}">
      <div class="rb-icon">${won?won_emoji:lose_emoji}</div>
      <div class="rb-title">${won?'Perfect!':"Time's Up!"}</div>
      <div class="rb-sub">${foundIds.size} / ${TOTAL} named</div>
      <button class="share-btn" onclick="copyResult()">Share result</button>
    </div>`;
}

function copyResult(){
  const txt='SportsStack — NRL Dally M Medal Winners Since 2000\n'+foundIds.size+'/'+TOTAL+'\nsportsstack.com.au';
  navigator.share?(navigator.share({text:txt}).catch(()=>{}),undefined):navigator.clipboard&&navigator.clipboard.writeText(txt).then(()=>{
    const b=document.querySelector('.share-btn');b.textContent='Copied!';
    setTimeout(()=>b.textContent='Share result',2000);
  });
}

const inp=document.getElementById('guess-input');
inp.addEventListener('input',e=>{if(gameActive)tryGuess(e.target.value);});
inp.addEventListener('keydown',e=>{if(e.key==='Enter'){tryGuess(e.target.value);} if(e.key==='Escape')hideSugg();});
document.addEventListener('click',e=>{if(!e.target.closest('.input-wrap'))hideSugg();});
buildGrid();
gameActive=true;startTimer();
</script>
