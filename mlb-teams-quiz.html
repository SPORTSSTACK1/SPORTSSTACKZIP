<style>
:root{
  --bg:#04080f;--surface:#080f1c;--surface2:#0d1829;--surface3:#122035;
  --blue:#2563eb;--blue-light:#3b82f6;
  --gold:#f5c842;
  --green:#22c55e;--green-bg:rgba(34,197,94,.09);--green-border:rgba(34,197,94,.45);
  --red:#ef4444;--red-bg:rgba(239,68,68,.07);--red-border:rgba(239,68,68,.4);
  --text:#e8f0fe;--text-muted:#6b8abf;--text-dim:#4a6890;
  --border:#0d2040;--border-bright:#1a3a6a;
  --radius:10px;--radius-lg:16px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif}
.page{max-width:980px;margin:0 auto;padding:22px 14px 56px}
.site-header{text-align:center;padding-bottom:16px;border-bottom:1px solid var(--border);margin-bottom:18px}
.game-title{font-family:'Barlow Condensed',sans-serif;font-size:clamp(18px,4vw,34px);font-weight:900;letter-spacing:.04em;text-transform:uppercase;line-height:1.1}
.game-title .hl{color:var(--gold)}
.game-subtitle{font-size:12px;color:var(--text-muted);letter-spacing:.1em;text-transform:uppercase;margin-top:5px}
.stats-bar{display:flex;align-items:center;justify-content:space-between;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:11px 20px;margin-bottom:16px;gap:10px;flex-wrap:wrap}
.stat-item{text-align:center;flex:1;min-width:72px}
.stat-val{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:900;line-height:1;color:var(--gold)}
.stat-val.urgent{color:var(--red);animation:pulse .8s infinite}
.stat-val.green{color:var(--green)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.stat-label{font-size:10px;color:var(--text-muted);letter-spacing:.1em;text-transform:uppercase;margin-top:3px}
.stat-divider{width:1px;height:38px;background:var(--border-bright);flex-shrink:0}
.prog-wrap{height:4px;background:rgba(255,255,255,.06);border-radius:99px;margin-bottom:16px;overflow:hidden}
.prog-bar{height:100%;background:linear-gradient(90deg,var(--blue-light),var(--gold));border-radius:99px;transition:width .4s ease}
.input-wrap{position:relative;margin-bottom:16px}
.guess-input{width:100%;font-size:16px;padding:13px 18px;border:1.5px solid var(--border-bright);border-radius:var(--radius);background:var(--surface2);color:var(--text);outline:none;font-family:'Barlow',sans-serif;transition:border-color .15s}
.guess-input:focus{border-color:var(--blue-light);box-shadow:0 0 0 3px rgba(59,130,246,.1)}
.guess-input::placeholder{color:#6b8abf}
.guess-input:disabled{opacity:.4;cursor:not-allowed}
.suggestions{position:absolute;top:100%;left:0;right:0;background:var(--surface2);border:1px solid var(--gold);border-radius:var(--radius);z-index:99;margin-top:3px;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,.45)}
.suggestion-label{font-size:11px;color:var(--gold);padding:7px 14px 3px;letter-spacing:.08em;text-transform:uppercase;font-weight:700;border-bottom:1px solid var(--border)}
.suggestion-item{padding:10px 14px;font-size:14px;color:var(--text);cursor:pointer;display:flex;align-items:center;gap:10px;transition:background .12s}
.suggestion-item:hover{background:var(--surface3)}
.sug-badge{font-size:10px;color:var(--gold);background:rgba(245,200,66,.1);border:1px solid rgba(245,200,66,.25);border-radius:4px;padding:2px 7px;font-weight:700;flex-shrink:0}
/* 6 columns = 5 rows of 6 for 30 teams */
.team-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:9px}
@media(max-width:680px){.team-grid{grid-template-columns:repeat(3,1fr);gap:7px}}
@media(max-width:400px){.team-grid{grid-template-columns:repeat(2,1fr);gap:6px}}
.team-card{aspect-ratio:1/1;border-radius:var(--radius);border:1.5px solid var(--border-bright);background:var(--surface2);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:7px 5px;transition:all .35s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden;cursor:default}
.team-card::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(59,130,246,.06),transparent 70%);pointer-events:none}
.card-dots{display:flex;gap:3px;justify-content:center}
.card-dot{width:5px;height:5px;border-radius:50%;background:#1a3a6a}
.team-card.found{background:var(--green-bg);border-color:var(--green-border);box-shadow:0 0 16px rgba(34,197,94,.12)}
.team-card.found::before{background:radial-gradient(ellipse at 50% 0%,rgba(34,197,94,.08),transparent 70%)}
.card-name-found{font-family:'Barlow Condensed',sans-serif;font-size:clamp(10px,1.9vw,15px);font-weight:800;color:#86efac;letter-spacing:.03em;line-height:1.2;margin-bottom:2px}
.card-league-found{font-size:clamp(8px,1.3vw,11px);color:#4ade80;letter-spacing:.06em;margin-bottom:1px}
.card-div-found{font-size:clamp(7px,1.1vw,9px);color:#4ade80;letter-spacing:.07em;text-transform:uppercase}
.team-card.revealed{background:var(--red-bg);border-color:var(--red-border)}
.card-name-revealed{font-family:'Barlow Condensed',sans-serif;font-size:clamp(10px,1.9vw,15px);font-weight:800;color:var(--red);letter-spacing:.03em;line-height:1.2;margin-bottom:2px}
.card-league-revealed{font-size:clamp(8px,1.3vw,11px);color:rgba(239,68,68,.7);letter-spacing:.06em;margin-bottom:1px}
.card-div-revealed{font-size:clamp(7px,1.1vw,9px);color:rgba(239,68,68,.6);letter-spacing:.07em;text-transform:uppercase}
.modal-backdrop{position:fixed;inset:0;background:rgba(4,8,15,.85);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:999;opacity:0;pointer-events:none;transition:opacity .3s}
.modal-backdrop.show{opacity:1;pointer-events:all}
.modal{background:var(--surface2);border:1px solid var(--border-bright);border-radius:var(--radius-lg);padding:32px 28px;max-width:420px;width:90%;text-align:center}
.modal.win{border-color:var(--green-border);background:rgba(34,197,94,.05)}
.modal.lose{border-color:var(--red-border);background:var(--red-bg)}
.modal-icon{font-size:48px;margin-bottom:12px}
.modal-title{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:900;letter-spacing:.04em;text-transform:uppercase;margin-bottom:8px}
.modal.win .modal-title{color:#86efac}
.modal.lose .modal-title{color:#fca5a5}
.modal-score{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;color:var(--gold);margin-bottom:12px}
.modal-msg{font-size:15px;color:var(--text-muted);line-height:1.65;margin-bottom:20px}
.modal-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.modal-btn{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;padding:12px 28px;border-radius:50px;cursor:pointer;border:none;transition:all .2s}
.modal-btn.primary{background:var(--gold);color:var(--bg)}
.modal-btn.primary:hover{background:#ffd700;transform:translateY(-1px)}
.modal-btn.secondary{background:transparent;color:var(--text);border:1.5px solid var(--border-bright)}
.modal-btn.secondary:hover{background:rgba(255,255,255,.06)}
nav{position:sticky;top:0;z-index:1000;background:rgba(4,8,15,.95);backdrop-filter:blur(12px);border-bottom:1px solid rgba(13,32,64,.8);padding:0 16px;display:flex;align-items:center;height:52px;gap:10px}
</style>

<body>
<div class="page">
  <header class="site-header">
    <div class="game-title">Name Every <span class="hl">MLB Team</span></div>
    <div class="game-subtitle">All 30 current MLB franchises · city names, nicknames &amp; full names all accepted · 4 minutes</div>
  </header>
  <div class="stats-bar">
    <div class="stat-item"><div class="stat-val green" id="found-count">0</div><div class="stat-label">Found</div></div>
    <div class="stat-divider"></div>
    <div class="stat-item"><div class="stat-val" id="remain-count">30</div><div class="stat-label">Remaining</div></div>
    <div class="stat-divider"></div>
    <div class="stat-item"><div class="stat-val" id="timer-display">4:00</div><div class="stat-label">Time Left</div></div>
  </div>
  <div class="prog-wrap"><div class="prog-bar" id="prog-bar" style="width:0%"></div></div>
  <div class="input-wrap">
    <input class="guess-input" id="guess-input" type="text" placeholder="Type a team name or nickname and press Enter…" autocomplete="off"/>
    <div class="suggestions" id="suggestions" style="display:none"></div>
  </div>
  <button id="give-up-btn" onclick="giveUp()" style="display:block;margin:8px auto 16px;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;background:transparent;color:var(--text-muted);border:1px solid var(--border-bright);padding:8px 20px;border-radius:8px;cursor:pointer;transition:all .2s" onmouseover="this.style.borderColor='#ef4444';this.style.color='#ef4444'" onmouseout="this.style.borderColor='';this.style.color=''">Give Up &amp; Reveal</button>
  <div class="team-grid" id="team-grid"></div>
</div>
<div class="modal-backdrop" id="modal-backdrop">
  <div class="modal" id="modal">
    <div class="modal-icon" id="modal-icon"></div>
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-score" id="modal-score"></div>
    <div class="modal-msg" id="modal-msg"></div>
    <div class="modal-btns">
      <button class="modal-btn primary" onclick="resetQuiz()">Play Again</button>
      <button class="modal-btn secondary" onclick="closeModal()">See Results</button>
    </div>
  </div>
</div>
<script>
// All 30 MLB teams, sorted alphabetically.
// accepted[]: full name ✓ | city/state prefix ✓ | nickname ✓ | common short forms ✓
const TEAMS = [
  { id:1,  name:"Arizona Diamondbacks",   nick:"Diamondbacks", league:"NL West",
    accepted:["arizona diamondbacks","diamondbacks","arizona","dbacks","d-backs"] },
  { id:2,  name:"Atlanta Braves",          nick:"Braves",       league:"NL East",
    accepted:["atlanta braves","braves","atlanta"] },
  { id:3,  name:"Baltimore Orioles",       nick:"Orioles",      league:"AL East",
    accepted:["baltimore orioles","orioles","baltimore","o's","the o's"] },
  { id:4,  name:"Boston Red Sox",          nick:"Red Sox",      league:"AL East",
    accepted:["boston red sox","red sox","boston","sox"] },
  { id:5,  name:"Chicago Cubs",            nick:"Cubs",         league:"NL Central",
    accepted:["chicago cubs","cubs","chicago"] },
  { id:6,  name:"Chicago White Sox",       nick:"White Sox",    league:"AL Central",
    accepted:["chicago white sox","white sox","southsiders"] },
  { id:7,  name:"Cincinnati Reds",         nick:"Reds",         league:"NL Central",
    accepted:["cincinnati reds","reds","cincinnati"] },
  { id:8,  name:"Cleveland Guardians",     nick:"Guardians",    league:"AL Central",
    accepted:["cleveland guardians","guardians","cleveland","indians"] },
    // Accept "Indians" — recent rebrand
  { id:9,  name:"Colorado Rockies",        nick:"Rockies",      league:"NL West",
    accepted:["colorado rockies","rockies","colorado"] },
  { id:10, name:"Detroit Tigers",          nick:"Tigers",       league:"AL Central",
    accepted:["detroit tigers","tigers","detroit"] },
  { id:11, name:"Houston Astros",          nick:"Astros",       league:"AL West",
    accepted:["houston astros","astros","houston","stros"] },
  { id:12, name:"Kansas City Royals",      nick:"Royals",       league:"AL Central",
    accepted:["kansas city royals","royals","kansas city","kc royals"] },
  { id:13, name:"Los Angeles Angels",      nick:"Angels",       league:"AL West",
    accepted:["los angeles angels","angels","la angels","anaheim angels","california angels","halos"] },
  { id:14, name:"Los Angeles Dodgers",     nick:"Dodgers",      league:"NL West",
    accepted:["los angeles dodgers","dodgers","la dodgers","la"] },
  { id:15, name:"Miami Marlins",           nick:"Marlins",      league:"NL East",
    accepted:["miami marlins","marlins","miami","florida marlins"] },
  { id:16, name:"Milwaukee Brewers",       nick:"Brewers",      league:"NL Central",
    accepted:["milwaukee brewers","brewers","milwaukee","brew crew"] },
  { id:17, name:"Minnesota Twins",         nick:"Twins",        league:"AL Central",
    accepted:["minnesota twins","twins","minnesota"] },
  { id:18, name:"New York Mets",           nick:"Mets",         league:"NL East",
    accepted:["new york mets","mets","ny mets"] },
  { id:19, name:"New York Yankees",        nick:"Yankees",      league:"AL East",
    accepted:["new york yankees","yankees","new york","ny yankees","bronx bombers","pinstripes"] },
  { id:20, name:"Oakland Athletics",       nick:"Athletics",    league:"AL West",
    accepted:["oakland athletics","athletics","oakland","a's","the a's","las vegas athletics"] },
    // Team moved to Sacramento/Las Vegas — accept Oakland and A's
  { id:21, name:"Philadelphia Phillies",   nick:"Phillies",     league:"NL East",
    accepted:["philadelphia phillies","phillies","philadelphia","phils"] },
  { id:22, name:"Pittsburgh Pirates",      nick:"Pirates",      league:"NL Central",
    accepted:["pittsburgh pirates","pirates","pittsburgh","bucs"] },
  { id:23, name:"San Diego Padres",        nick:"Padres",       league:"NL West",
    accepted:["san diego padres","padres","san diego","friars"] },
  { id:24, name:"San Francisco Giants",    nick:"Giants",       league:"NL West",
    accepted:["san francisco giants","giants","san francisco","sf giants"] },
  { id:25, name:"Seattle Mariners",        nick:"Mariners",     league:"AL West",
    accepted:["seattle mariners","mariners","seattle","m's","ms"] },
  { id:26, name:"St. Louis Cardinals",     nick:"Cardinals",    league:"NL Central",
    accepted:["st. louis cardinals","st louis cardinals","cardinals","st. louis","st louis","cards","redbirds"] },
  { id:27, name:"Tampa Bay Rays",          nick:"Rays",         league:"AL East",
    accepted:["tampa bay rays","rays","tampa bay","tampa","devil rays"] },
  { id:28, name:"Texas Rangers",           nick:"Rangers",      league:"AL West",
    accepted:["texas rangers","rangers","texas"] },
  { id:29, name:"Toronto Blue Jays",       nick:"Blue Jays",    league:"AL East",
    accepted:["toronto blue jays","blue jays","toronto","jays","bluejays"] },
  { id:30, name:"Washington Nationals",    nick:"Nationals",    league:"NL East",
    accepted:["washington nationals","nationals","washington","nats","montreal expos","expos"] },
    // Accept Expos — same franchise
];

const TOTAL=TEAMS.length,TOTAL_SECS=240;
let secsLeft=TOTAL_SECS,timer=null,found=new Set(),gameActive=false;

function norm(s){return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9\s]/g,'').trim();}
function levenshtein(a,b){const m=a.length,n=b.length,dp=Array.from({length:m+1},(_,i)=>Array.from({length:n+1},(_,j)=>i===0?j:j===0?i:0));for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);return dp[m][n];}
function isExactMatch(val,p){const nv=norm(val);return p.accepted.map(norm).some(a=>a===nv);}
function getFuzzySuggestions(val){if(val.length<2)return[];const nv=norm(val),results=[];for(const p of TEAMS){if(found.has(p.id))continue;const d=Math.min(...p.accepted.map(a=>levenshtein(nv,norm(a))));if(d>=1&&d<=2)results.push({p,dist:d});}return results.sort((a,b)=>a.dist-b.dist).slice(0,1).map(r=>r.p);}

function cardInner(p,state){
  if(state==='found')return`<div class="card-name-found">${p.name}</div><div class="card-league-found">${p.nick}</div><div class="card-div-found">${p.league}</div>`;
  if(state==='revealed')return`<div class="card-name-revealed">${p.name}</div><div class="card-league-revealed">${p.nick}</div><div class="card-div-revealed">${p.league}</div>`;
  return`<div class="card-dots"><span class="card-dot"></span><span class="card-dot"></span><span class="card-dot"></span></div>`;
}

function renderGrid(){const g=document.getElementById('team-grid');g.innerHTML='';for(const p of TEAMS){const f=found.has(p.id),c=document.createElement('div');c.className='team-card'+(f?' found':'');c.id='card-'+p.id;c.innerHTML=cardInner(p,f?'found':'hidden');g.appendChild(c);}}
function revealCard(p){const c=document.getElementById('card-'+p.id);if(!c)return;c.className='team-card found';c.innerHTML=cardInner(p,'found');}
function revealAllMissed(){for(const p of TEAMS){if(!found.has(p.id)){const c=document.getElementById('card-'+p.id);if(!c)continue;c.className='team-card revealed';c.innerHTML=cardInner(p,'revealed');}}}
function updateHUD(){document.getElementById('found-count').textContent=found.size;document.getElementById('remain-count').textContent=TOTAL-found.size;document.getElementById('prog-bar').style.width=(found.size/TOTAL*100)+'%';const m=Math.floor(secsLeft/60),s=secsLeft%60,el=document.getElementById('timer-display');el.textContent=m+':'+String(s).padStart(2,'0');el.className='stat-val'+(secsLeft<=30?' urgent':'');}
function hideSuggestions(){document.getElementById('suggestions').style.display='none';}
function showSuggestions(matches){const box=document.getElementById('suggestions');if(!matches.length){hideSuggestions();return;}box.innerHTML='<div class="suggestion-label">Did you mean…</div>';matches.forEach(p=>{const item=document.createElement('div');item.className='suggestion-item';item.innerHTML=`<span>${p.name}</span><span class="sug-badge">${p.league}</span>`;item.onmousedown=ev=>{ev.preventDefault();acceptSuggestion(p);};box.appendChild(item);});box.style.display='block';}
function acceptSuggestion(p){hideSuggestions();document.getElementById('guess-input').value='';if(!found.has(p.id)&&gameActive){found.add(p.id);revealCard(p);updateHUD();checkWin();}}
function startTimer(){clearInterval(timer);timer=setInterval(()=>{secsLeft--;updateHUD();if(secsLeft<=0){clearInterval(timer);timeUp();}},1000);}

function giveUp(){
  if(!gameActive)return;
  clearInterval(timerInterval);
  const btn=document.getElementById('give-up-btn');
  if(btn)btn.style.display='none';
  timeUp();
}
function timeUp(){gameActive=false;document.getElementById('guess-input').disabled=true;hideSuggestions();revealAllMissed();showModal(false);}
function checkWin(){if(found.size===TOTAL){clearInterval(timer);gameActive=false;document.getElementById('guess-input').disabled=true;showModal(true);}}
function showModal(won){const elapsed=TOTAL_SECS-secsLeft,mins=Math.floor(elapsed/60),secs=elapsed%60,timeStr=mins>0?mins+' minute'+(mins!==1?'s':'')+' and '+secs+' second'+(secs!==1?'s':''):secs+' second'+(secs!==1?'s':''),modal=document.getElementById('modal');modal.className='modal '+(won?'win':'lose');document.getElementById('modal-icon').textContent=won?'🎉':'⏰';document.getElementById('modal-title').textContent=won?'Quiz Complete!':"Time's Up!";document.getElementById('modal-score').textContent=found.size+' / '+TOTAL+' found';document.getElementById('modal-msg').innerHTML=won?'Congratulations — you named all 30 MLB teams in <strong>'+timeStr+'</strong>!':'Better luck next time!<br>You found <strong>'+found.size+'</strong> of '+TOTAL+' teams. Missing teams are shown in <span style="color:var(--red)">red</span>.';document.getElementById('modal-backdrop').classList.add('show');}
function closeModal(){document.getElementById('modal-backdrop').classList.remove('show');}
function resetQuiz(){closeModal();clearInterval(timer);found.clear();secsLeft=TOTAL_SECS;gameActive=true;document.getElementById('guess-input').disabled=false;document.getElementById('guess-input').value='';hideSuggestions();renderGrid();updateHUD();startTimer();document.getElementById('guess-input').focus();}

const inputEl=document.getElementById('guess-input');
inputEl.addEventListener('keydown',e=>{if(e.key==='Enter'){const val=inputEl.value.trim();if(!val||!gameActive)return;hideSuggestions();let matched=null;for(const p of TEAMS){if(!found.has(p.id)&&isExactMatch(val,p)){matched=p;break;}}if(matched){found.add(matched.id);revealCard(matched);inputEl.value='';updateHUD();checkWin();}else{const sugs=getFuzzySuggestions(val);if(sugs.length)showSuggestions(sugs);else{inputEl.style.borderColor='var(--red)';setTimeout(()=>inputEl.style.borderColor='',600);}}}else if(e.key==='Escape')hideSuggestions();});
inputEl.addEventListener('input',()=>{hideSuggestions();});
document.addEventListener('click',e=>{if(!e.target.closest('.input-wrap'))hideSuggestions();});
renderGrid();updateHUD();gameActive=true;startTimer();
</script>
