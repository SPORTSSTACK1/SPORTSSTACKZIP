<style>
:root{
  --bg:#04080f;--surface:#080f1c;--surface2:#0d1829;--surface3:#122035;
  --blue:#2563eb;--blue-light:#3b82f6;
  --gold:#f5c842;
  --green:#22c55e;--green-bg:rgba(34,197,94,.09);--green-border:rgba(34,197,94,.45);
  --red:#ef4444;--red-bg:rgba(239,68,68,.07);--red-border:rgba(239,68,68,.4);
  --text:#e8f0fe;--text-muted:#6b8abf;--text-dim:#4a6890;
  --border:#0d2040;--border-bright:#1a3a6a;
  --radius:10px;--radius-lg:16px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif}
.page{max-width:980px;margin:0 auto;padding:22px 14px 56px}
.site-header{text-align:center;padding-bottom:16px;border-bottom:1px solid var(--border);margin-bottom:18px}
.game-title{font-family:'Barlow Condensed',sans-serif;font-size:clamp(18px,4vw,34px);font-weight:900;letter-spacing:.04em;text-transform:uppercase;line-height:1.1}
.game-title .hl{color:var(--gold)}
.game-subtitle{font-size:12px;color:var(--text-muted);letter-spacing:.1em;text-transform:uppercase;margin-top:5px}
.stats-bar{display:flex;align-items:center;justify-content:space-between;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:11px 20px;margin-bottom:16px;gap:10px;flex-wrap:wrap}
.stat-item{text-align:center;flex:1;min-width:72px}
.stat-val{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:900;line-height:1;color:var(--gold)}
.stat-val.urgent{color:var(--red);animation:pulse .8s infinite}
.stat-val.green{color:var(--green)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.stat-label{font-size:10px;color:var(--text-muted);letter-spacing:.1em;text-transform:uppercase;margin-top:3px}
.stat-divider{width:1px;height:38px;background:var(--border-bright);flex-shrink:0}
.prog-wrap{height:4px;background:rgba(255,255,255,.06);border-radius:99px;margin-bottom:16px;overflow:hidden}
.prog-bar{height:100%;background:linear-gradient(90deg,var(--blue-light),var(--gold));border-radius:99px;transition:width .4s ease}
.input-wrap{position:relative;margin-bottom:16px}
.guess-input{width:100%;font-size:16px;padding:13px 18px;border:1.5px solid var(--border-bright);border-radius:var(--radius);background:var(--surface2);color:var(--text);outline:none;font-family:'Barlow',sans-serif;transition:border-color .15s}
.guess-input:focus{border-color:var(--blue-light);box-shadow:0 0 0 3px rgba(59,130,246,.1)}
.guess-input::placeholder{color:#6b8abf}
.guess-input:disabled{opacity:.4;cursor:not-allowed}
.suggestions{position:absolute;top:100%;left:0;right:0;background:var(--surface2);border:1px solid var(--gold);border-radius:var(--radius);z-index:99;margin-top:3px;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,.45)}
.suggestion-label{font-size:11px;color:var(--gold);padding:7px 14px 3px;letter-spacing:.08em;text-transform:uppercase;font-weight:700;border-bottom:1px solid var(--border)}
.suggestion-item{padding:10px 14px;font-size:14px;color:var(--text);cursor:pointer;display:flex;align-items:center;gap:10px;transition:background .12s}
.suggestion-item:hover{background:var(--surface3)}
.sug-badge{font-size:10px;color:var(--gold);background:rgba(245,200,66,.1);border:1px solid rgba(245,200,66,.25);border-radius:4px;padding:2px 7px;font-weight:700;flex-shrink:0}
.team-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:9px}

@media(max-width:420px){.team-grid{grid-template-columns:repeat(2,1fr);gap:6px}}
.team-card{aspect-ratio:1/1;border-radius:var(--radius);border:1.5px solid var(--border-bright);background:var(--surface2);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:7px 5px;transition:all .35s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden;cursor:default}

.card-dots{display:flex;gap:3px;justify-content:center;margin-top:2px}
.card-dot{width:5px;height:5px;border-radius:50%;background:#1a3a6a}
.team-card.found{background:var(--green-bg);border-color:var(--green-border);box-shadow:0 0 16px rgba(34,197,94,.12)}
.team-card.found::before{background:radial-gradient(ellipse at 50% 0%,rgba(34,197,94,.08),transparent 70%)}

.card-team-found{font-family:'Barlow Condensed',sans-serif;font-size:clamp(7px,1.2vw,10px);font-weight:700;color:#4ade80;letter-spacing:.05em;text-transform:uppercase;line-height:1.1;margin-bottom:1px}
.card-city-found{font-size:clamp(7px,1.1vw,9px);color:#4ade80;letter-spacing:.06em}
.team-card.revealed{background:var(--red-bg);border-color:var(--red-border)}
.card-arena-revealed{font-family:'Barlow Condensed',sans-serif;font-size:clamp(9px,1.75vw,14px);font-weight:800;color:var(--red);letter-spacing:.02em;line-height:1.2;margin-bottom:3px}
.card-team-revealed{font-family:'Barlow Condensed',sans-serif;font-size:clamp(7px,1.2vw,10px);font-weight:700;color:rgba(239,68,68,.7);letter-spacing:.05em;text-transform:uppercase;line-height:1.1;margin-bottom:1px}
.card-city-revealed{font-size:clamp(7px,1.1vw,9px);color:rgba(239,68,68,.6);letter-spacing:.06em}
.modal-backdrop{position:fixed;inset:0;background:rgba(4,8,15,.85);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:999;opacity:0;pointer-events:none;transition:opacity .3s}
.modal-backdrop.show{opacity:1;pointer-events:all}
.modal{background:var(--surface2);border:1px solid var(--border-bright);border-radius:var(--radius-lg);padding:32px 28px;max-width:420px;width:90%;text-align:center}
.modal.win{border-color:var(--green-border);background:rgba(34,197,94,.05)}
.modal.lose{border-color:var(--red-border);background:var(--red-bg)}
.modal-icon{font-size:48px;margin-bottom:12px}
.modal-title{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:900;letter-spacing:.04em;text-transform:uppercase;margin-bottom:8px}
.modal.win .modal-title{color:#86efac}
.modal.lose .modal-title{color:#fca5a5}
.modal-score{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;color:var(--gold);margin-bottom:12px}
.modal-msg{font-size:15px;color:var(--text-muted);line-height:1.65;margin-bottom:20px}
.modal-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.modal-btn{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;padding:12px 28px;border-radius:50px;cursor:pointer;border:none;transition:all .2s}
.modal-btn.primary{background:var(--gold);color:var(--bg)}
.modal-btn.primary:hover{background:#ffd700;transform:translateY(-1px)}
.modal-btn.secondary{background:transparent;color:var(--text);border:1.5px solid var(--border-bright)}
.modal-btn.secondary:hover{background:rgba(255,255,255,.06)}
nav{position:sticky;top:0;z-index:1000;background:rgba(4,8,15,.95);backdrop-filter:blur(12px);border-bottom:1px solid rgba(13,32,64,.8);padding:0 16px;display:flex;align-items:center;height:52px;gap:10px}

<script>
// accepted[] = every string that should trigger a correct answer.
// Full name always accepted. Key sponsor/brand word accepted where distinctive.
// Generic words like "center", "arena", "garden" alone are NOT accepted.
// Previous names accepted only where the rename is very recent and widely unknown.
const TEAMS = [

  },
  {
    id:12, team:"Indiana Pacers", arena:"Gainbridge Fieldhouse", city:"Indianapolis, IN",
    accepted:["gainbridge fieldhouse","gainbridge"]
  },
  {

    accepted:["intuit dome","intuit"]
  },
  {

    accepted:["crypto.com arena","crypto com arena","crypto","cryptodotcom arena","staples center"]
    // Accept Staples Center — still widely used colloquially
  },
  {

    accepted:["fedexforum","fedex forum","fedex"]
  },
  {
    id:16, team:"Miami Heat", arena:"Kaseya Center", city:"Miami, FL",
    accepted:["kaseya center","kaseya","american airlines arena"]
    // Accept old name — renamed only in 2023
  },
  {

    accepted:["fiserv forum","fiserv"]

    accepted:["target center","target"]
  },
  {
    id:19, team:"New Orleans Pelicans", arena:"Smoothie King Center", city:"New Orleans, LA",
    accepted:["smoothie king center","smoothie king","smoothie"]
  },
  {
    id:20, team:"New York Knicks", arena:"Madison Square Garden", city:"New York, NY",
    accepted:["madison square garden","madison square","msg","the garden","garden","msg arena"]
    // MSG is globally iconic; "Garden" strongly associated with the Knicks
  },
  {

    accepted:["paycom center","paycom","chesapeake energy arena","chesapeake"]
    // Accept old name — still widely recognised

    accepted:["kia center","kia","amway center"]

    accepted:["xfinity mobile arena","xfinity mobile","xfinity","wells fargo center","wells fargo"]
    // Accept Wells Fargo Center — very recently renamed

    accepted:["mortgage matchup center","mortgage matchup","footprint center","footprint"]
    // Accept Footprint Center — renamed Oct 2025
  },

    accepted:["moda center","moda","rose garden","rose quarter"]
    // Rose Garden/Rose Quarter still used colloquially
  },
  {

    accepted:["golden 1 center","golden 1","golden one center","golden one"]
  },
  {
    id:27, team:"San Antonio Spurs", arena:"Frost Bank Center", city:"San Antonio, TX",
    accepted:["frost bank center","frost bank","at&t center","att center"]
    // Accept AT&T Center — renamed in 2023
  },
  {
    id:28, team:"Toronto Raptors", arena:"Scotiabank Arena", city:"Toronto, ON",
    accepted:["scotiabank arena","scotiabank","air canada centre","air canada center"]
    // Accept old name
  },
  {
    id:29, team:"Utah Jazz", arena:"Delta Center", city:"Salt Lake City, UT",
    accepted:["delta center","delta"]
  },
  {
    id:30, team:"Washington Wizards", arena:"Capital One Arena", city:"Washington, DC",
    accepted:["capital one arena","capital one","verizon center","verizon","mci center"]
  },
];

const TOTAL = TEAMS.length;
const TOTAL_SECS = 360;
let secsLeft = TOTAL_SECS, timer = null, found = new Set(), gameActive = false;

function norm(s){
  return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9\s]/g,'').trim();
}
function levenshtein(a, b){
  const m=a.length, n=b.length;
  const dp=Array.from({length:m+1},(_,i)=>Array.from({length:n+1},(_,j)=>i===0?j:j===0?i:0));
  for(let i=1;i<=m;i++) for(let j=1;j<=n;j++)
    dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[m][n];
}
function isExactMatch(val, p){
  const nv = norm(val);
  return p.accepted.map(norm).some(a => a === nv);
}
function getFuzzySuggestions(val){
  if(val.length < 2) return [];
  const nv = norm(val);
  const results = [];
  for(const p of TEAMS){
    if(found.has(p.id)) continue;
    const minDist = Math.min(...p.accepted.map(a => levenshtein(nv, norm(a))));
    if(minDist >= 1 && minDist <= 2) results.push({p, dist: minDist});
  }
  return results.sort((a,b) => a.dist - b.dist).slice(0,1).map(r => r.p);
}

function cardInner(p, state){
  if(state==='found'){
    return `<div class="card-arena-found">${p.arena}</div>
      <div class="card-team-found">${p.team}</div>
      <div class="card-city-found">${p.city}</div>`;
  }
  if(state==='revealed'){
    return `<div class="card-arena-revealed">${p.arena}</div>
      <div class="card-team-revealed">${p.team}</div>
      <div class="card-city-revealed">${p.city}</div>`;
  }
  return `<div class="card-team">${p.team}</div>
    <div class="card-city">${p.city}</div>
    <div class="card-dots"><span class="card-dot"></span><span class="card-dot"></span><span class="card-dot"></span></div>`;
}

function renderGrid(){
  const grid = document.getElementById('team-grid');
  grid.innerHTML = '';
  for(const p of TEAMS){
    const isFound = found.has(p.id);
    const card = document.createElement('div');
    card.className = 'team-card' + (isFound ? ' found' : '');
    card.id = 'card-' + p.id;
    card.innerHTML = cardInner(p, isFound ? 'found' : 'hidden');
    grid.appendChild(card);
  }
}
function revealCard(p){
  const card = document.getElementById('card-' + p.id);
  if(!card) return;
  card.className = 'team-card found';
  card.innerHTML = cardInner(p, 'found');
}
function revealAllMissed(){
  for(const p of TEAMS){
    if(!found.has(p.id)){
      const card = document.getElementById('card-' + p.id);
      if(!card) continue;
      card.className = 'team-card revealed';
      card.innerHTML = cardInner(p, 'revealed');
    }
  }
}

function updateHUD(){
  document.getElementById('found-count').textContent = found.size;
  document.getElementById('remain-count').textContent = TOTAL - found.size;
  document.getElementById('prog-bar').style.width = (found.size / TOTAL * 100) + '%';
  const m = Math.floor(secsLeft/60), s = secsLeft % 60;
  const el = document.getElementById('timer-display');
  el.textContent = m + ':' + String(s).padStart(2,'0');
  el.className = 'stat-val' + (secsLeft <= 30 ? ' urgent' : '');
}

function hideSuggestions(){ document.getElementById('suggestions').style.display = 'none'; }
function showSuggestions(matches){
  const box = document.getElementById('suggestions');
  if(!matches.length){ hideSuggestions(); return; }
  box.innerHTML = '<div class="suggestion-label">Did you mean…</div>';
  matches.forEach(p => {
    const item = document.createElement('div');
    item.className = 'suggestion-item';
    item.innerHTML = `<span>${p.arena}</span><span class="sug-badge">${p.team}</span>`;
    item.onmousedown = e => { e.preventDefault(); acceptSuggestion(p); };
    box.appendChild(item);
  });
  box.style.display = 'block';
}
function acceptSuggestion(p){
  hideSuggestions();
  document.getElementById('guess-input').value = '';
  if(!found.has(p.id) && gameActive){ found.add(p.id); revealCard(p); updateHUD(); checkWin(); }
}

function startTimer(){
  clearInterval(timer);
  timer = setInterval(() => { secsLeft--; updateHUD(); if(secsLeft <= 0){ clearInterval(timer); timeUp(); } }, 1000);
}

function giveUp(){
  if(!gameActive)return;
  if(typeof timerInterval!=="undefined")clearInterval(timerInterval);if(typeof timer!=="undefined")clearInterval(timer);
  const btn=document.getElementById('give-up-btn');
  if(btn)btn.style.display='none';
  timeUp();
}
function timeUp(){
  gameActive = false;
  document.getElementById('guess-input').disabled = true;
  hideSuggestions(); revealAllMissed(); showModal(false);
}
function checkWin(){
  if(found.size === TOTAL){ clearInterval(timer); gameActive = false; document.getElementById('guess-input').disabled = true; showModal(true); }
}
function showModal(won){
  const elapsed = TOTAL_SECS - secsLeft;
  const mins = Math.floor(elapsed/60), secs = elapsed % 60;
  const timeStr = mins > 0 ? mins+' minute'+(mins!==1?'s':'')+' and '+secs+' second'+(secs!==1?'s':'') : secs+' second'+(secs!==1?'s':'');
  const modal = document.getElementById('modal');
  modal.className = 'modal ' + (won ? 'win' : 'lose');
  document.getElementById('modal-icon').textContent = won ? '🎉' : '⏰';
  document.getElementById('modal-title').textContent = won ? 'Quiz Complete!' : "Time's Up!";
  document.getElementById('modal-score').textContent = found.size + ' / ' + TOTAL + ' found';
  document.getElementById('modal-msg').innerHTML = won
    ? 'Congratulations — you completed the quiz in <strong>'+timeStr+'</strong>!<br>You named the home arena for all 30 NBA franchises!'
    : 'Better luck next time!<br>You found <strong>'+found.size+'</strong> of '+TOTAL+' arenas. Missing answers are shown in <span style="color:var(--red)">red</span>.';
  document.getElementById('modal-backdrop').classList.add('show');
}
function closeModal(){ document.getElementById('modal-backdrop').classList.remove('show'); }
function resetQuiz(){
  closeModal(); clearInterval(timer);
  found.clear(); secsLeft = TOTAL_SECS; gameActive = true;
  document.getElementById('guess-input').disabled = false;
  document.getElementById('guess-input').value = '';
  hideSuggestions(); renderGrid(); updateHUD(); startTimer();
  document.getElementById('guess-input').focus();
}

const inputEl = document.getElementById('guess-input');
inputEl.addEventListener('keydown', e => {
  if(e.key === 'Enter'){
    const val = inputEl.value.trim(); if(!val || !gameActive) return;
    hideSuggestions();
    let matched = null;
    for(const p of TEAMS){ if(!found.has(p.id) && isExactMatch(val, p)){ matched = p; break; } }
    if(matched){ found.add(matched.id); revealCard(matched); inputEl.value = ''; updateHUD(); checkWin(); }
    else{
      const sugs = getFuzzySuggestions(val);
      if(sugs.length) showSuggestions(sugs);
      else{ inputEl.style.borderColor='var(--red)'; setTimeout(()=>inputEl.style.borderColor='',600); }
    }
  } else if(e.key === 'Escape') hideSuggestions();
});
inputEl.addEventListener('input', () => { hideSuggestions(); });
document.addEventListener('click', e => { if(!e.target.closest('.input-wrap')) hideSuggestions(); });

renderGrid(); updateHUD(); gameActive = true; startTimer();
</script>
