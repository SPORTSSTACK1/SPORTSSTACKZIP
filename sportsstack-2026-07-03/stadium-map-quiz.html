<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#04080f;--surface:#080f1c;--border:#0d2040;--border-bright:#1a3a6a;--gold:#f5c842;--green:#22c55e;--text:#e8f0fe;--text-muted:#7a9ab8;--red:#ef4444}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif}
body{display:flex;flex-direction:column;overflow:hidden}
nav{position:sticky;top:0;z-index:10000;display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--border);background:rgba(4,8,15,.95);backdrop-filter:blur(8px);flex-shrink:0}

/* Layout */
.game-wrap{display:flex;flex-direction:column;flex:1;min-height:0}
.top-bar{flex-shrink:0;display:flex;align-items:center;gap:12px;padding:10px 16px;background:var(--surface);border-bottom:1px solid var(--border);flex-wrap:wrap}
.stadium-info{flex:1;min-width:0}
.stadium-name{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;color:var(--gold);line-height:1.1}
.stadium-hint{font-size:12px;color:var(--text-muted);margin-top:1px}
.top-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.round-badge{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:800;letter-spacing:.08em;color:var(--text-muted);text-transform:uppercase;white-space:nowrap}
.score-badge{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:900;color:var(--gold);white-space:nowrap}
.btn-confirm{padding:10px 22px;background:var(--gold);color:#04080f;border:none;border-radius:8px;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:900;letter-spacing:.06em;cursor:pointer;white-space:nowrap;transition:opacity .15s}
.btn-confirm:hover{opacity:.9}
.btn-confirm:disabled{background:var(--border-bright);color:var(--text-muted);cursor:default;opacity:1}
.btn-next{padding:10px 22px;background:var(--green);color:#04080f;border:none;border-radius:8px;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:900;letter-spacing:.06em;cursor:pointer;display:none}

/* Map */
#map{flex:1;cursor:crosshair}
.leaflet-container{background:#0a1525}

/* Result panel */
.result-panel{flex-shrink:0;background:var(--surface);border-top:1px solid var(--border);padding:12px 16px;display:none;align-items:center;gap:16px;flex-wrap:wrap}
.result-panel.show{display:flex}
.result-score-big{font-family:'Barlow Condensed',sans-serif;font-size:36px;font-weight:900;color:var(--gold);line-height:1}
.result-label{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted)}
.result-dist{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;color:var(--text);line-height:1}
.result-msg{font-size:13px;color:var(--text-muted);flex:1;min-width:120px}

/* End screen */
.end-screen{display:none;position:absolute;inset:0;background:rgba(4,8,15,.95);z-index:2000;align-items:center;justify-content:center;padding:20px}
.end-screen.show{display:flex}
.end-card{background:var(--surface);border:1px solid rgba(245,200,66,.4);border-radius:18px;padding:32px 28px;max-width:440px;width:100%;text-align:center;box-shadow:0 0 60px rgba(245,200,66,.1)}
.end-trophy{font-size:56px;margin-bottom:12px}
.end-title{font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:900;font-style:italic;color:var(--gold);margin-bottom:4px}
.end-sub{font-size:14px;color:var(--text-muted);margin-bottom:20px}
.end-score{font-family:'Barlow Condensed',sans-serif;font-size:64px;font-weight:900;color:var(--gold);line-height:1;margin-bottom:4px}
.end-max{font-size:13px;color:var(--text-muted);margin-bottom:24px}
.end-breakdown{text-align:left;margin-bottom:24px;max-height:220px;overflow-y:auto}
.end-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px;gap:8px}
.end-row:last-child{border-bottom:none}
.end-row-name{color:var(--text);font-weight:600}
.end-row-score{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:900;color:var(--gold)}
.btn-play-again{width:100%;padding:14px;background:var(--gold);color:#04080f;border:none;border-radius:10px;font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:900;letter-spacing:.06em;cursor:pointer}

/* Map hint */
.map-hint{position:absolute;bottom:70px;left:50%;transform:translateX(-50%);background:rgba(8,15,28,.85);border:1px solid var(--border-bright);border-radius:8px;padding:6px 14px;font-size:12px;font-weight:600;color:var(--text-muted);z-index:900;pointer-events:none;white-space:nowrap;transition:opacity .3s}
@media(max-width:600px){
  .top-bar{flex-direction:column;align-items:stretch;gap:6px;padding:10px 12px}
  .stadium-info{width:100%}
  .stadium-name{font-size:20px}
  .top-right{display:flex;align-items:center;justify-content:space-between;width:100%;gap:8px}
  .round-badge{font-size:12px}
  .score-badge{font-size:16px}
  .btn-confirm,.btn-next{padding:8px 14px;font-size:13px}
}
</style>
</head>

      <div class="end-max" id="end-max">out of 50,000 points</div>
      <div class="end-breakdown" id="end-breakdown"></div>
      <button class="btn-play-again" onclick="startGame()">Play Today's Stadiums Again</button>
    </div>
  </div>
</div>

const ROUNDS = 3;
let map, guessMarker, correctMarker, line;
let queue = [], round = 0, totalScore = 0;
let guessLatLng = null, roundOver = false;
let roundScores = [];

// ── Scoring ──────────────────────────────────────────────────────────────────
function haversine(lat1,lon1,lat2,lon2){
  const R=6371, dLat=(lat2-lat1)*Math.PI/180, dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function calcScore(km){ return Math.max(0, Math.round(5000*Math.exp(-km/2000))); }

// ── Map init ─────────────────────────────────────────────────────────────────
function initMap(){
  if(map){ map.remove(); map=null; }
  map = L.map('map',{zoomControl:true, attributionControl:true}).setView([20,10],2);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png',{
    attribution:'© <a href="https://www.openstreetmap.org/copyright">OSM</a> contributors, © <a href="https://carto.com/">CARTO</a>',
    maxZoom:18, subdomains:'abcd'
  }).addTo(map);
  map.on('click', onMapClick);
  // Ensure Leaflet measures the real, settled container size (not a stale
  // pre-layout guess) — standard double-rAF pattern, safer than fixed delays
  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{ try{ if(map) map.invalidateSize(); }catch(e){} });
  });
  guessMarker=null; correctMarker=null; line=null;
}

function onMapClick(e){
  if(roundOver) return;
  guessLatLng = e.latlng;
  if(guessMarker) map.removeLayer(guessMarker);
  guessMarker = L.circleMarker(guessLatLng,{
    radius:10, color:'#f5c842', fillColor:'#f5c842', fillOpacity:1, weight:2
  }).addTo(map).bindPopup('Your guess').openPopup();
  document.getElementById('btn-confirm').disabled = false;
  document.getElementById('map-hint').style.opacity='0';
}

// ── Game flow ─────────────────────────────────────────────────────────────────
function mulberry32(a){
  return function(){
    a|=0; a=a+0x6D2B79F5|0;
    var t=Math.imul(a^a>>>15,1|a);
    t=t+Math.imul(t^t>>>7,61|t)^t;
    return((t^t>>>14)>>>0)/4294967296;
  };
}
function getDailySeed(){
  var d=new Date();
  return d.getFullYear()*10000+(d.getMonth()+1)*100+d.getDate();
}
function getDailyStadiums(){
  var seed=getDailySeed();
  var rng=mulberry32(seed);
  var arr=STADIUMS.slice();
  for(var i=arr.length-1;i>0;i--){
    var j=Math.floor(rng()*(i+1));
    var tmp=arr[i]; arr[i]=arr[j]; arr[j]=tmp;
  }
  return arr.slice(0,ROUNDS);
}
function getDayNum(){
  return Math.floor(Date.now()/864e5);
}
function startGame(){
  document.getElementById('end-screen').classList.remove('show');
  totalScore=0; round=0; roundScores=[];
  queue=getDailyStadiums();
  initMap();
  loadRound();
}

function loadRound(){
  roundOver=false; guessLatLng=null;
  if(guessMarker){map.removeLayer(guessMarker);guessMarker=null;}
  if(correctMarker){map.removeLayer(correctMarker);correctMarker=null;}
  if(line){map.removeLayer(line);line=null;}
  map.setView([20,10],2);
  document.getElementById('btn-confirm').disabled=true;
  document.getElementById('btn-confirm').style.display='';
  document.getElementById('btn-next').style.display='none';
  document.getElementById('result-panel').classList.remove('show');
  document.getElementById('map-hint').style.opacity='1';
  const s = queue[round];
  document.getElementById('stadium-name').textContent = s.name;
  document.getElementById('stadium-hint').textContent = s.hint.split(' · ').slice(0,2).join(' · ');
  document.getElementById('round-badge').textContent = 'Stadium '+(round+1)+' of '+ROUNDS+' · Daily';
  document.getElementById('score-badge').textContent = totalScore.toLocaleString()+' pts';
}

function confirmGuess(){
  if(!guessLatLng || roundOver) return;
  roundOver=true;
  document.getElementById('btn-confirm').style.display='none';
  document.getElementById('btn-next').style.display='inline-block';
  document.getElementById('btn-next').textContent = round+1 < ROUNDS ? 'Next Round →' : 'See Results →';

  const s = queue[round];
  const dist = haversine(guessLatLng.lat, guessLatLng.lng, s.lat, s.lng);
  const pts = calcScore(dist);
  totalScore += pts;
  roundScores.push({name:s.name, dist:Math.round(dist), pts});

  // Show correct marker
  correctMarker = L.marker([s.lat, s.lng], {
    icon: L.divIcon({
      html:'<div style="background:#22c55e;width:16px;height:16px;border-radius:50%;border:3px solid #fff;box-shadow:0 0 8px rgba(34,197,94,.8)"></div>',
      iconSize:[16,16], iconAnchor:[8,8]
    })
  }).addTo(map).bindPopup('<b>'+s.name+'</b>').openPopup();

  // Draw line
  line = L.polyline([guessLatLng,[s.lat,s.lng]],{color:'#f5c842',weight:2,dashArray:'6,4',opacity:.7}).addTo(map);

  // Fit bounds
  const bounds = L.latLngBounds([guessLatLng,[s.lat,s.lng]]);
  map.fitBounds(bounds.pad(.25));

  // Result panel
  const distStr = dist < 1 ? 'Right on it!' : dist < 10 ? Math.round(dist*10)/10+' km' : Math.round(dist)+' km';
  const msgs = ['🏟️ Incredible — right on the spot!','🎯 Outstanding — barely any distance!','⭐ Excellent guess!','👏 Really good!','🙂 Decent effort!','🤔 Not bad, getting warmer!','📍 A bit off — try to visualise the country','🌍 Keep exploring!','😅 Long way away!','🗺️ Better luck next round!'];
  const msgIdx = dist<1?0:dist<20?1:dist<100?2:dist<300?3:dist<600?4:dist<1000?5:dist<2000?6:dist<4000?7:dist<7000?8:9;
  document.getElementById('res-pts').textContent = pts.toLocaleString()+' pts';
  document.getElementById('res-dist').textContent = distStr;
  document.getElementById('res-msg').textContent = msgs[msgIdx];
  document.getElementById('result-panel').classList.add('show');
  document.getElementById('score-badge').textContent = totalScore.toLocaleString()+' pts';
}

function nextRound(){
  round++;
  if(round >= ROUNDS){ showEnd(); return; }
  loadRound();
}

function showEnd(){
  const pct = totalScore / (ROUNDS*5000) * 100;
  const trophy = pct>=90?'🏆':pct>=70?'🥇':pct>=50?'🥈':pct>=30?'🥉':'🏟️';
  document.getElementById('end-trophy').textContent = trophy;
  document.getElementById('end-score').textContent = totalScore.toLocaleString();
  document.getElementById('end-max').textContent = 'out of '+(ROUNDS*5000).toLocaleString()+' points ('+Math.round(pct)+'%)';
  let html='';
  roundScores.forEach(function(r){
    html+='<div class="end-row"><span class="end-row-name">'+r.name+'</span>'
      +'<span style="font-size:11px;color:var(--text-muted);flex:1;text-align:center">'+r.dist.toLocaleString()+' km</span>'
      +'<span class="end-row-score">'+r.pts.toLocaleString()+'</span></div>';
  });
  document.getElementById('end-breakdown').innerHTML = html;
  document.getElementById('end-screen').classList.add('show');
  if(typeof saveResult==='function') saveResult('stadium-map-quiz','Stadium Spotter',Math.round(totalScore/1000),ROUNDS*5,pct>=90);
}

window.addEventListener('load', startGame);
window.addEventListener('resize', ()=>{ try{ if(map) map.invalidateSize(); }catch(e){} });
window.addEventListener('orientationchange', ()=>{ setTimeout(()=>{ try{ if(map) map.invalidateSize(); }catch(e){} }, 200); });
</script>
