<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Prem Predictor Leaderboard — SportsStack</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,700;0,900;1,900&family=Barlow:wght@400;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#04080f;--surface:#080f1c;--s2:#0d1a2e;--border:#0d2040;--gold:#f5c842;--text:#e8f0fe;--muted:#3a5a7a;--red:#ef4444;--green:#22c55e}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh}
nav{position:sticky;top:0;z-index:100;background:rgba(4,8,15,.97);border-bottom:1px solid var(--border);padding:0 16px;height:52px;display:flex;align-items:center;justify-content:space-between}
.nav-links a{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;padding:6px 12px;border-radius:6px;text-decoration:none;border:1px solid var(--border);color:var(--text);background:var(--s2);margin-left:6px}
.nav-links a.gold{background:var(--gold);color:var(--bg);border-color:var(--gold)}
.page-head{padding:22px 16px 12px;text-align:center}
.page-head h1{font-family:'Barlow Condensed',sans-serif;font-size:clamp(26px,5vw,44px);font-weight:900;font-style:italic;color:var(--gold)}
.page-head p{color:var(--muted);font-size:13px;margin-top:4px}
.content{max-width:600px;margin:0 auto;padding:0 16px 60px}

/* Your rank */
.your-rank{background:var(--surface);border:1.5px solid rgba(245,200,66,.3);border-radius:10px;padding:14px 18px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.yr-item{text-align:center}
.yr-num{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:900;color:var(--gold)}
.yr-lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}

/* Scoring guide */
.guide{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:16px}
.guide-title{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px}
.guide-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:8px}
.guide-item{text-align:center;background:var(--s2);border-radius:7px;padding:8px 4px}
.guide-pts{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;color:var(--gold)}
.guide-lbl{font-size:10px;color:var(--muted);margin-top:1px}
.guide-bonus{font-size:12px;color:var(--muted);border-top:1px solid var(--border);padding-top:8px;margin-top:2px}

/* Refresh */
.refresh-row{display:flex;justify-content:flex-end;margin-bottom:8px;gap:8px;align-items:center}
.btn-refresh{background:var(--s2);border:1px solid var(--border);border-radius:6px;padding:6px 14px;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;color:var(--muted);cursor:pointer}
.updated-at{font-size:11px;color:var(--muted)}

/* Leaderboard rows */
.lb-row{display:grid;grid-template-columns:32px 28px 1fr auto;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:11px 14px;margin-bottom:6px;transition:border-color .15s}
.lb-row.you{border-color:rgba(245,200,66,.4);background:rgba(245,200,66,.03)}
.rank{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:900;color:var(--muted);text-align:right}
.rank.r1{color:#f5c842}.rank.r2{color:#94a3b8}.rank.r3{color:#cd7f32}
.medal{font-size:17px;text-align:center}
.player-info{overflow:hidden}
.player-name{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.player-detail{font-size:11px;color:var(--muted);margin-top:1px}
.score-block{text-align:right}
.total-score{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:900;color:var(--gold)}
.score-breakdown{font-size:10px;color:var(--muted)}
.loading{text-align:center;padding:40px;color:var(--muted)}
.season-badge{background:rgba(245,200,66,.08);border:1px solid rgba(245,200,66,.2);border-radius:20px;padding:4px 14px;font-size:12px;font-weight:700;color:var(--gold);display:inline-block;margin-bottom:12px}
.in-progress{background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.2);border-radius:8px;padding:10px 14px;font-size:13px;color:#60a5fa;margin-bottom:16px;text-align:center}
</style>
</head>
<body>
<nav>
  <a href="index.html" style="text-decoration:none;display:block;flex-shrink:0"><img src="logo.png" alt="SportsStack" width="48" height="48" style="display:block;border-radius:8px"/></a>
  <div class="nav-links">
    <a href="prem-predictor.html">My Prediction</a>
    <a href="prem-bonus.html" class="gold">Awards →</a>
  </div>
</nav>

<div class="page-head">
  <h1>🏴󠁧󠁢󠁥󠁮󠁧󠁿 Prem Predictor</h1>
  <p>2026–27 Season Leaderboard</p>
</div>

<div class="content">
  <div style="text-align:center;margin-bottom:14px">
    <span class="season-badge">2026–27 Premier League</span>
  </div>

  <div class="guide">
    <div class="guide-title">How points are scored</div>
    <div class="guide-grid">
      <div class="guide-item"><div class="guide-pts">3</div><div class="guide-lbl">Exact position</div></div>
      <div class="guide-item"><div class="guide-pts">2</div><div class="guide-lbl">1 place off</div></div>
      <div class="guide-item"><div class="guide-pts">1</div><div class="guide-lbl">2 places off</div></div>
    </div>
    <div class="guide-bonus">⭐ Bonus: 5 points each for top scorer, top assister, player of year, young player of year, golden glove · Max total: <strong style="color:var(--gold)">85 pts</strong></div>
  </div>

  <div id="in-progress-wrap"></div>
  <div id="your-rank-wrap"></div>

  <div class="refresh-row">
    <div class="updated-at" id="updated-at"></div>
    <button class="btn-refresh" onclick="loadLeaderboard()">↻ Refresh</button>
  </div>

  <div id="lb-container"><div class="loading">Loading…</div></div>
</div>

<script src="sportstack-member.js?v=4"></script>
<script>
const SS_URL='https://syntfyfsyjiuowclarpf.supabase.co';
const SS_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN5bnRmeWZzeWppdW93Y2xhcnBmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzODgwNzgsImV4cCI6MjA5NTk2NDA3OH0.jQVBQo7tnv1RBEnCdzZCIvx8vVjsaXWRfZ3VNm1__Ig';
const MEDALS=['🥇','🥈','🥉'];
let currentUser=null,accessToken=null;

async function init(){
  try{
    const keys=Object.keys(localStorage).filter(k=>k.includes('supabase')&&k.includes('auth'));
    if(keys.length){
      const s=JSON.parse(localStorage.getItem(keys[0]));
      currentUser=s?.user||s?.session?.user;
      accessToken=s?.access_token||s?.session?.access_token;
    }
  }catch(e){}

  // Check if scoring is complete
  try{
    const r=await fetch(`${SS_URL}/rest/v1/prem_config?id=eq.1&select=scoring_complete,is_locked`,
      {headers:{'apikey':SS_KEY,'Authorization':'Bearer '+SS_KEY}});
    const d=await r.json();
    const complete=d[0]?.scoring_complete;
    const locked=d[0]?.is_locked;
    if(!complete){
      document.getElementById('in-progress-wrap').innerHTML=
        '<div class="in-progress">🏴󠁧󠁢󠁥󠁮󠁧󠁿 Season in progress — scores update as results come in · Final scores calculated at end of season</div>';
    }
    if(locked&&!complete){
      document.getElementById('in-progress-wrap').innerHTML=
        '<div class="in-progress">🔒 Predictions locked · Scores will update throughout the season</div>';
    }
  }catch(e){}

  await loadLeaderboard();
}

async function loadLeaderboard(){
  document.getElementById('lb-container').innerHTML='<div class="loading">Loading…</div>';
  try{
    // Get all table picks with scores
    const [r1,r2]=await Promise.all([
      fetch(`${SS_URL}/rest/v1/prem_table_picks?select=user_id,table_score&order=table_score.desc`,
        {headers:{'apikey':SS_KEY,'Authorization':'Bearer '+SS_KEY}}),
      fetch(`${SS_URL}/rest/v1/prem_bonus_picks?select=user_id,bonus_score`,
        {headers:{'apikey':SS_KEY,'Authorization':'Bearer '+SS_KEY}})
    ]);
    const tablePicks=await r1.json();
    const bonusPicks=await r2.json();
    if(!tablePicks.length){
      document.getElementById('lb-container').innerHTML='<div class="loading">No predictions yet — be the first!</div>';
      return;
    }
    // Combine scores
    const bonusMap={};
    bonusPicks.forEach(b=>bonusMap[b.user_id]=b.bonus_score||0);
    const combined=tablePicks.map(t=>({
      userId:t.user_id,
      tableScore:t.table_score||0,
      bonusScore:bonusMap[t.user_id]||0,
      total:(t.table_score||0)+(bonusMap[t.user_id]||0)
    })).sort((a,b)=>b.total-a.total||b.tableScore-a.tableScore);

    // Fetch usernames
    const uids=combined.map(c=>c.userId);
    const pr=await fetch(`${SS_URL}/rest/v1/profiles?user_id=in.(${uids.join(',')})&select=user_id,username`,
      {headers:{'apikey':SS_KEY,'Authorization':'Bearer '+SS_KEY}});
    const profiles=await pr.json();
    const names={};
    if(Array.isArray(profiles)) profiles.forEach(p=>names[p.user_id]=p.username||'Member');

    // Your rank
    const yourEntry=currentUser?combined.find(c=>c.userId===currentUser.id):null;
    const yrWrap=document.getElementById('your-rank-wrap');
    if(yourEntry){
      const yourRank=combined.indexOf(yourEntry)+1;
      yrWrap.innerHTML=`<div class="your-rank">
        <div class="yr-item"><div class="yr-num">#${yourRank}</div><div class="yr-lbl">Your rank</div></div>
        <div class="yr-item"><div class="yr-num">${yourEntry.total}</div><div class="yr-lbl">Total pts</div></div>
        <div class="yr-item"><div class="yr-num">${yourEntry.tableScore}</div><div class="yr-lbl">Table pts</div></div>
        <div class="yr-item"><div class="yr-num">${yourEntry.bonusScore}</div><div class="yr-lbl">Award pts</div></div>
        <div class="yr-item"><div class="yr-num">${combined.length}</div><div class="yr-lbl">Entries</div></div>
      </div>`;
    } else {yrWrap.innerHTML='';}

    const con=document.getElementById('lb-container');
    con.innerHTML='';
    combined.forEach((e,i)=>{
      const rank=i+1;
      const isYou=currentUser&&e.userId===currentUser.id;
      const row=document.createElement('div');
      row.className='lb-row'+(isYou?' you':'');
      const rc=rank===1?'r1':rank===2?'r2':rank===3?'r3':'';
      row.innerHTML=
        `<div class="rank ${rc}">${rank}</div>`+
        `<div class="medal">${MEDALS[rank-1]||''}</div>`+
        `<div class="player-info"><div class="player-name">${names[e.userId]||'Member'}${isYou?' <span style="font-size:11px;color:var(--gold)">(you)</span>':''}</div>`+
        `<div class="player-detail">Table: ${e.tableScore}pts · Awards: ${e.bonusScore}pts</div></div>`+
        `<div class="score-block"><div class="total-score">${e.total}<span style="font-size:14px;color:var(--muted)"> pts</span></div></div>`;
      con.appendChild(row);
    });
    document.getElementById('updated-at').textContent='Updated: '+new Date().toLocaleTimeString();
  }catch(e){
    document.getElementById('lb-container').innerHTML='<div class="loading">Error loading — please refresh</div>';
  }
}

init();
</script>
</body>
</html>
