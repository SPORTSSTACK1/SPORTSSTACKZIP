<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>All-NBA Teams 2025-26 – SportsStack</title>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,700;0,800;0,900;1,900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet"/>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#04080f;--surface:#080f1c;--s2:#0d1a2e;--border:#0d2040;--gold:#f5c842;--silver:#c8ccd4;--bronze:#cd8a4e;--text:#e8f0fe;--muted:#aebfd6;--red:#ef4444;--green:#22c55e}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif}
body{display:flex;flex-direction:column;overflow-x:hidden}
nav{position:sticky;top:0;z-index:1000;display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--border);background:rgba(4,8,15,.95);backdrop-filter:blur(8px);flex-shrink:0}
.page{max-width:760px;margin:0 auto;width:100%;padding:18px 14px 60px}
.site-header{text-align:center;padding-bottom:14px}
.game-name{font-family:'Barlow Condensed',sans-serif;font-size:clamp(26px,6vw,38px);font-weight:900;font-style:italic;color:var(--gold);line-height:1.05}
.game-sub{font-size:13px;color:var(--muted);margin-top:4px}
.hud{display:flex;align-items:center;justify-content:center;gap:18px;padding:10px 0 16px;flex-wrap:wrap}
.hud-stat{text-align:center}
.hud-label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:700}
.hud-val{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:900;color:var(--text)}
#timer-val.warn{color:var(--red)}
.tier-block{margin-bottom:18px}
.tier-label{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.tier-label .dot{width:10px;height:10px;border-radius:50%;display:inline-block}
.tier-label.gold{color:var(--gold)} .tier-label.gold .dot{background:var(--gold)}
.tier-label.silver{color:var(--silver)} .tier-label.silver .dot{background:var(--silver)}
.tier-label.bronze{color:var(--bronze)} .tier-label.bronze .dot{background:var(--bronze)}
.tier-row{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.player-box{position:relative;border-radius:10px;padding:10px 8px;min-height:84px;display:flex;flex-direction:column;justify-content:flex-end;cursor:pointer;border:2px solid transparent;transition:transform .12s,border-color .15s;text-align:center}
.player-box.gold{background:linear-gradient(160deg,#3a3008,#1a1604);border-color:rgba(245,200,66,.35)}
.player-box.silver{background:linear-gradient(160deg,#2a2e34,#15171c);border-color:rgba(200,204,212,.3)}
.player-box.bronze{background:linear-gradient(160deg,#3a2412,#1c1208);border-color:rgba(205,138,78,.3)}
.player-box:hover{transform:translateY(-2px)}
.player-box.active{border-color:var(--text)}
.player-box.found{cursor:default}
.player-box.found.gold{border-color:var(--gold)}
.player-box.found.silver{border-color:var(--silver)}
.player-box.found.bronze{border-color:var(--bronze)}
.pb-pos{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:800;letter-spacing:.06em;opacity:.65;margin-bottom:2px}
.pb-team{font-size:10px;color:var(--muted);line-height:1.2;margin-bottom:4px}
.pb-name{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:800;line-height:1.15;min-height:16px}
.pb-name.revealed{color:var(--text)}
@media(max-width:560px){
  .tier-row{grid-template-columns:repeat(5,1fr);gap:5px}
  .player-box{padding:6px 4px;min-height:70px}
  .pb-pos{font-size:9px} .pb-team{font-size:8px} .pb-name{font-size:10.5px}
}
.input-wrap{position:fixed;left:0;right:0;bottom:0;background:var(--surface);border-top:1px solid var(--border);padding:12px 14px calc(12px + env(safe-area-inset-bottom));display:flex;gap:8px;z-index:500}
#guess-input{flex:1;padding:12px 14px;background:var(--s2);border:1.5px solid var(--border);border-radius:9px;color:var(--text);font-size:16px;font-family:'Barlow',sans-serif}
#guess-input:focus{outline:none;border-color:var(--gold)}
.btn-give-up{padding:0 16px;background:var(--s2);border:1.5px solid var(--border);border-radius:9px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap}
.suggestions{position:fixed;left:14px;right:14px;bottom:64px;background:var(--s2);border:1px solid var(--border);border-radius:9px;padding:8px 12px;font-size:13px;color:var(--muted);z-index:499}
/* Desktop: input bar sits inline right below the answer boxes instead of
   floating fixed at the viewport bottom */
@media(min-width:700px){
  .page{padding-bottom:18px}
  .input-wrap{position:static;max-width:760px;margin:18px auto 0;border-top:none;border:1.5px solid var(--border);border-radius:12px;background:var(--surface)}
  .suggestions{position:static;max-width:760px;margin:8px auto 0;left:auto;right:auto}
}
.result{margin-top:10px}
.result-banner{text-align:center;padding:18px;border-radius:12px;background:var(--surface);border:1.5px solid var(--border)}
.result-banner.perfect{border-color:var(--gold)}
.result-icon{font-size:38px;margin-bottom:6px}
.result-title{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:900}
.result-sub{font-size:13px;color:var(--muted);margin-top:4px}
.save-status{text-align:center;font-size:12px;color:var(--muted);min-height:16px;margin-top:6px}
.save-status.ok{color:var(--green)}
</style>
</head>
<body>
<nav>
  <a href="index.html" style="text-decoration:none;display:block;flex-shrink:0">
    <img src="logo.png" alt="SportsStack" width="48" height="48" style="display:block;border-radius:8px"/>
  </a>
  <div style="display:flex;align-items:center;gap:8px">
    <a href="leaderboard.html" style="font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;padding:6px 12px;border-radius:6px;color:var(--text);background:var(--s2);border:1px solid var(--border);text-decoration:none">Leaderboard</a>
    <div id="ss-member-widget"></div>
  </div>
</nav>
<div class="page">
  <div class="site-header">
    <div class="game-name">All-NBA Teams 2025-26</div>
    <div class="game-sub">Name all 15 players across the 2025-26 All-NBA First, Second and Third Teams · 4:00</div>
  </div>
  <div class="hud">
    <div class="hud-stat"><div class="hud-label">Found</div><div class="hud-val"><span id="found-count">0</span>/<span id="total-count">15</span></div></div>
    <div class="hud-stat"><div class="hud-label">Time</div><div class="hud-val" id="timer-val">4:00</div></div>
  </div>
  <div id="tiers"></div>
  <div class="result" id="result"></div>
</div>
<div class="input-wrap">
  <input id="guess-input" type="text" placeholder="Type a player name…" autocomplete="off"/>
  <button class="btn-give-up" onclick="giveUp()">Give Up</button>
</div>
<div class="suggestions" id="suggestions" style="display:none"></div>
<script>
const TIERS = [{label:"1st Team",cls:"gold",players:[{uid:"p1",name:"Shai Gilgeous-Alexander",team:"Oklahoma City Thunder",pos:null,aliases:["shai gilgeous-alexander", "gilgeous-alexander", "shai"]},{uid:"p2",name:"Nikola Jokić",team:"Denver Nuggets",pos:null,aliases:["nikola jokić", "jokić", "nikola jokic", "jokic", "nikola"]},{uid:"p3",name:"Victor Wembanyama",team:"San Antonio Spurs",pos:null,aliases:["victor wembanyama", "wembanyama", "victor"]},{uid:"p4",name:"Luka Dončić",team:"Los Angeles Lakers",pos:null,aliases:["luka dončić", "dončić", "luka doncic", "doncic", "luka"]},{uid:"p5",name:"Cade Cunningham",team:"Detroit Pistons",pos:null,aliases:["cade cunningham", "cunningham", "cade"]}]},
{label:"2nd Team",cls:"silver",players:[{uid:"p6",name:"Jaylen Brown",team:"Boston Celtics",pos:null,aliases:["jaylen brown", "brown", "jaylen"]},{uid:"p7",name:"Kawhi Leonard",team:"LA Clippers",pos:null,aliases:["kawhi leonard", "leonard", "kawhi"]},{uid:"p8",name:"Donovan Mitchell",team:"Cleveland Cavaliers",pos:null,aliases:["donovan mitchell", "mitchell", "donovan"]},{uid:"p9",name:"Kevin Durant",team:"Houston Rockets",pos:null,aliases:["kevin durant", "durant", "kevin"]},{uid:"p10",name:"Jalen Brunson",team:"New York Knicks",pos:null,aliases:["jalen brunson", "brunson"]}]},
{label:"3rd Team",cls:"bronze",players:[{uid:"p11",name:"Tyrese Maxey",team:"Philadelphia 76ers",pos:null,aliases:["tyrese maxey", "maxey", "tyrese"]},{uid:"p12",name:"Jamal Murray",team:"Denver Nuggets",pos:null,aliases:["jamal murray", "murray", "jamal"]},{uid:"p13",name:"Jalen Johnson",team:"Atlanta Hawks",pos:null,aliases:["jalen johnson", "johnson"]},{uid:"p14",name:"Jalen Duren",team:"Detroit Pistons",pos:null,aliases:["jalen duren", "duren"]},{uid:"p15",name:"Chet Holmgren",team:"Oklahoma City Thunder",pos:null,aliases:["chet holmgren", "holmgren", "chet"]}]}];
const ALL_PLAYERS = TIERS.flatMap(t=>t.players);
const found = new Set();
let done=false, secondsLeft=240, timerInterval=null, hintShown=false, finalScore=0;

function normalise(s){ return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9\s]/g,'').trim(); }

function matches(player, val){
  const nv = normalise(val); if(!nv) return false;
  const surname = normalise(player.name.split(' ').pop());
  return normalise(player.name) === nv || surname === nv || player.aliases.some(a => normalise(a) === nv);
}

function levenshtein(a, b){
  const m=a.length, n=b.length;
  const dp = Array.from({length:m+1},(_,i)=>Array.from({length:n+1},(_,j)=>j===0?i:i===0?j:0));
  for(let i=1;i<=m;i++) for(let j=1;j<=n;j++) dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[m][n];
}

function buildTiers(){
  const wrap = document.getElementById('tiers');
  wrap.innerHTML = '';
  TIERS.forEach(tier=>{
    const block = document.createElement('div');
    block.className = 'tier-block';
    const label = document.createElement('div');
    label.className = 'tier-label ' + tier.cls;
    label.innerHTML = '<span class="dot"></span>' + tier.label;
    block.appendChild(label);
    const row = document.createElement('div');
    row.className = 'tier-row';
    tier.players.forEach(p=>{
      const box = document.createElement('div');
      box.className = 'player-box ' + tier.cls;
      box.id = 'box-' + p.uid;
      box.onclick = ()=>{ if(!found.has(p.uid)) document.getElementById('guess-input').focus(); };
      box.innerHTML =
        (p.pos ? '<div class="pb-pos">' + p.pos + '</div>' : '') +
        '<div class="pb-team">' + p.team + '</div>' +
        '<div class="pb-name" id="name-' + p.uid + '"></div>';
      row.appendChild(box);
    });
    block.appendChild(row);
    wrap.appendChild(block);
  });
}

function revealPlayer(p, isGuess){
  if(isGuess !== false) found.add(p.uid);
  const box = document.getElementById('box-'+p.uid);
  box.classList.add('found');
  document.getElementById('name-'+p.uid).textContent = p.name;
  document.getElementById('name-'+p.uid).classList.add('revealed');
  updateHUD();
  if(isGuess !== false && found.size === ALL_PLAYERS.length) endGame(false);
}

function updateHUD(){
  document.getElementById('found-count').textContent = found.size;
}

function handleGuess(){
  const input = document.getElementById('guess-input');
  const val = input.value.trim();
  if(!val || done) return;
  const hit = ALL_PLAYERS.find(p => !found.has(p.uid) && matches(p, val));
  if(hit){ revealPlayer(hit); input.value=''; hideSuggestions(); return; }
  // fuzzy suggestion (only after Enter, one suggestion, distance<=2)
  const nv = normalise(val);
  let best=null, bestD=99;
  ALL_PLAYERS.forEach(p=>{
    if(found.has(p.uid)) return;
    const surname = normalise(p.name.split(' ').pop());
    const d = Math.min(levenshtein(nv, normalise(p.name)), levenshtein(nv, surname));
    if(d < bestD){ bestD=d; best=p; }
  });
  if(best && bestD<=2 && nv.length>=3){
    showSuggestion('Did you mean <b>'+best.name+'</b>? Press Enter again to confirm.');
    input.dataset.suggested = best.uid;
  } else {
    input.value='';
  }
}

function showSuggestion(html){
  const el = document.getElementById('suggestions');
  el.innerHTML = html; el.style.display='block';
}
function hideSuggestions(){
  const el = document.getElementById('suggestions');
  el.style.display='none'; el.innerHTML='';
}

document.getElementById('guess-input').addEventListener('keydown', e=>{
  if(e.key==='Enter'){
    const input = e.target;
    if(input.dataset.suggested){
      const p = ALL_PLAYERS.find(pp=>pp.uid===input.dataset.suggested);
      if(p && !found.has(p.uid)){ revealPlayer(p); input.value=''; hideSuggestions(); input.dataset.suggested=''; return; }
    }
    handleGuess();
  }
});

function giveUp(){
  if(done) return;
  finalScore = found.size; // lock in the real score BEFORE force-revealing the rest
  ALL_PLAYERS.forEach(p=>{ if(!found.has(p.uid)) revealPlayer(p, false); });
  endGame(true);
}

function startTimer(){
  timerInterval = setInterval(()=>{
    secondsLeft--;
    const m = Math.floor(secondsLeft/60), s = secondsLeft%60;
    const el = document.getElementById('timer-val');
    el.textContent = m+':'+String(s).padStart(2,'0');
    if(secondsLeft<=30) el.classList.add('warn');
    if(secondsLeft<=0){ clearInterval(timerInterval); giveUp(); }
  }, 1000);
}

function endGame(gaveUp){
  if(done) return;
  done = true;
  clearInterval(timerInterval);
  document.getElementById('guess-input').disabled = true;
  const r = document.getElementById('result');
  const score = gaveUp ? finalScore : found.size;
  const perfect = score === ALL_PLAYERS.length && !gaveUp;
  let icon, title, sub;
  if(perfect){ icon='🏆'; title='Perfect Score!'; sub='You named all '+ALL_PLAYERS.length+' players in the '+document.title.split(' – ')[0]+'!'; }
  else if(gaveUp){ icon='🏳️'; title='Gave Up'; sub='You found '+score+' / '+ALL_PLAYERS.length+' players before giving up — saved to your profile.'; }
  else { icon='🏀'; title='Nice Work'; sub='You found '+score+' / '+ALL_PLAYERS.length+' players.'; }
  r.innerHTML = '<div class="result-banner'+(perfect?' perfect':'')+'">'+
    '<div class="result-icon">'+icon+'</div>'+
    '<div class="result-title">'+title+'</div>'+
    '<div class="result-sub">'+sub+'</div>'+
    '<div class="save-status" id="save-status"></div>'+
  '</div>';
  if(typeof saveResult==='function') saveResult('all-nba-2025-26','All-NBA Teams 2025-26', score, ALL_PLAYERS.length, perfect);
}

function init(){
  buildTiers();
  updateHUD();
}
init();
startTimer();
</script>
<script src="sportstack-member.js?v=4"></script>
</body>
</html>
