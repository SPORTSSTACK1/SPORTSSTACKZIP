*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#04080f;--sf:#080f1c;--sf2:#0d1829;--gold:#f5c842;--text:#e8f0fe;--mut:#6b8abf;--dim:#1e3355;--bd:#0d2040;--brt:#1a3a6a;--green:#22c55e;--gbg:rgba(34,197,94,.12);--gbd:rgba(34,197,94,.4);--rbg:rgba(239,68,68,.08);--rbd:rgba(239,68,68,.3)}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif}
.page{max-width:520px;margin:0 auto;padding:20px 16px 80px}
.hdr{text-align:center;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--bd)}
.eyebrow{font-size:11px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--mut);margin-bottom:4px}
.ttl{font-family:'Barlow Condensed',sans-serif;font-size:clamp(32px,8vw,52px);font-weight:900;text-transform:uppercase;color:var(--gold)}
.date-lbl{font-size:12px;color:var(--dim);margin-top:3px}
.path-wrap{margin-bottom:18px}
.path-item{display:flex;align-items:stretch;margin-bottom:0}
.path-left{display:flex;flex-direction:column;align-items:center;width:28px;flex-shrink:0}
.path-dot{width:12px;height:12px;border-radius:50%;background:var(--gold);border:2px solid var(--bg);flex-shrink:0;margin-top:18px;z-index:1}
.path-dot.dim{background:var(--dim);border-color:var(--dim)}
.path-line{flex:1;width:2px;background:var(--brt);margin:0 auto}
.path-line.dim{background:var(--dim);opacity:.3}
.path-card{flex:1;background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:11px 14px;margin:6px 0 6px 8px;transition:all .3s}
.path-card.on{border-color:var(--brt);animation:sIn .3s ease}
.path-card.off{opacity:.35;border-style:dashed}
.club-name{font-family:'Barlow Condensed',sans-serif;font-size:19px;font-weight:900;color:var(--text);margin-bottom:2px}
.club-years{font-size:13px;color:var(--mut)}
.path-card.off .club-name{color:var(--dim);font-size:13px;font-weight:500}
@keyframes sIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
.status{font-size:11px;color:var(--mut);letter-spacing:.08em;text-transform:uppercase;margin-bottom:14px;text-align:center}
.guesses{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.grow{display:flex;align-items:center;gap:10px;padding:8px 13px;border-radius:8px;border:1px solid;animation:pop .18s ease}
.grow.ok{background:var(--gbg);border-color:var(--gbd)}.grow.no{background:var(--rbg);border-color:var(--rbd)}
.gico{font-size:13px}.gnm{font-size:14px;font-weight:600}
.grow.ok .gnm{color:#86efac}.grow.no .gnm{color:#fca5a5}
@keyframes pop{from{transform:translateX(-5px);opacity:0}to{transform:translateX(0);opacity:1}}
.pips{display:flex;justify-content:center;gap:7px;margin-bottom:14px}
.pip{width:10px;height:10px;border-radius:50%;background:var(--dim);transition:background .25s}
.pip.ok{background:var(--green)}.pip.no{background:#ef4444}
.iwrap{position:relative}
.ginput{width:100%;font-family:'Barlow',sans-serif;font-size:16px;font-weight:500;padding:12px 16px;border:2px solid var(--brt);border-radius:12px;background:var(--sf2);color:var(--text);outline:none;transition:border-color .2s}
.ginput:focus{border-color:var(--gold)}.ginput:disabled{opacity:.38;cursor:not-allowed}
.sbox{position:absolute;top:100%;left:0;right:0;z-index:50;background:var(--sf);border:1px solid var(--brt);border-radius:10px;margin-top:4px;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.si{padding:9px 15px;font-size:14px;font-weight:500;color:var(--text);cursor:pointer;border-bottom:1px solid var(--bd)}
.si:last-child{border-bottom:none}.si:hover{background:var(--sf2);color:var(--gold)}
.rbox{border-radius:14px;padding:20px;text-align:center;margin-top:16px;border:1px solid}
.rbox.win{border-color:var(--gbd);background:var(--gbg)}.rbox.lose{border-color:var(--rbd);background:var(--rbg)}
.ricon{font-size:40px;margin-bottom:6px}
.rtitle{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:900;text-transform:uppercase;margin-bottom:4px}
.rbox.win .rtitle{color:#86efac}.rbox.lose .rtitle{color:#fca5a5}
.rsub{font-size:13px;color:var(--mut);line-height:1.6;margin-bottom:12px}.rsub b{color:var(--text)}
.sbtn{padding:9px 22px;border-radius:50px;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;border:1.5px solid var(--brt);background:transparent;color:var(--text)}
.back{display:block;text-align:center;margin-top:16px;font-size:12px;color:var(--mut);text-decoration:none;letter-spacing:.06em;text-transform:uppercase}
.back:hover{color:var(--gold)}

function lev(a,b){var m=a.length,n=b.length,i,j;if(!m)return n;if(!n)return m;var p=Array(n+1),q=Array(n+1);for(j=0;j<=n;j++)p[j]=j;for(i=1;i<=m;i++){q[0]=i;for(j=1;j<=n;j++)q[j]=a[i-1]===b[j-1]?p[j-1]:1+Math.min(p[j],q[j-1],p[j-1]);}return q[n];}

function buildPath(all){
  var wrap=document.getElementById('path-wrap');wrap.innerHTML='';
  var total=PLAYER.clubs.length,show=all?total:revealed;
  for(var i=0;i<total;i++){
    var club=PLAYER.clubs[i],isOn=i<show;
    var item=document.createElement('div');item.className='path-item';
    var left=document.createElement('div');left.className='path-left';
    var dot=document.createElement('div');dot.className='path-dot'+(isOn?'':' dim');
    var line=document.createElement('div');line.className='path-line'+(isOn?'':' dim');
    if(i===total-1)line.style.opacity='0';
    left.appendChild(dot);left.appendChild(line);
    var card=document.createElement('div');card.className='path-card '+(isOn?'on':'off');
    card.innerHTML=isOn?'<div class="club-name">'+club.c+'</div><div class="club-years">'+club.y+'</div>':'<div class="club-name">Club '+(i+1)+'</div>';
    item.appendChild(left);item.appendChild(card);wrap.appendChild(item);
  }
  var st=document.getElementById('status');
  st.textContent=all?'':(revealed<total?'Showing '+revealed+' of '+total+' clubs \u2014 each wrong guess reveals the next':'All '+total+' clubs shown');
}
buildPath(false);

function addRow(name,ok){
  var row=document.createElement('div');row.className='grow '+(ok?'ok':'no');
  row.innerHTML='<span class="gico">'+(ok?'\u2705':'\u274c')+'</span><span class="gnm">'+name+'</span>';
  document.getElementById('guesses').appendChild(row);
  var pip=document.getElementById('p'+(guesses-1));if(pip)pip.classList.add(ok?'ok':'no');
}
function finish(won){
  over=true;document.getElementById('ginput').disabled=true;hideSugg();buildPath(true);
  if(typeof saveResult==='function'){var sc=won?Math.max(1,7-guesses):0;saveResult('career-path','Career Path',sc,6,won);}
  document.getElementById('status').textContent='';
  var area=document.getElementById('rarea');
  var body='<div class="rbox '+(won?'win':'lose')+'"><div class="ricon">'+(won?'\uD83C\uDFC6':'\u274c')+'</div>'
    +'<div class="rtitle">'+(won?'Correct!':'Unlucky!')+'</div>'
    +'<div class="rsub">'+(won?'That was':'It was')+' <b>'+PLAYER.name+'</b></div>'
    +'<button class="sbtn" onclick="shareResult('+(won?'true':'false')+')">Share \uD83D\uDCCB</button></div>';
  area.innerHTML=body;
}
function shareResult(won){
  var today=new Date().toLocaleDateString('en-AU'),pips='';
  for(var i=0;i<6;i++){var p=document.getElementById('p'+i);pips+=p.classList.contains('ok')?'\uD83D\uDFE9':p.classList.contains('no')?'\uD83D\uDFE5':'\u2B1C';}
  var txt='SportsStack \u2014 Career Path \u00b7 '+today+'\n'+(won?'\u2705 '+guesses+'/6':'\u274c X/6')+' \u00b7 '+revealed+'/'+PLAYER.clubs.length+' clubs shown\n'+pips+'\nsportsstack.com.au/career-path.html';
  navigator.share?(navigator.share({text:txt}).catch(()=>{}),undefined):navigator.clipboard&&navigator.clipboard.writeText(txt).then(function(){var b=document.querySelector('.sbtn');if(b){b.textContent='Copied!';setTimeout(function(){b.textContent='Share \uD83D\uDCCB';},2000);}});
}
function doGuess(){
  if(over)return;
  var inp=document.getElementById('ginput'),val=inp.value.trim();if(!val)return;
  inp.value='';hideSugg();guesses++;
  var ok=isMatch(val);addRow(val,ok);
  if(ok){finish(true);return;}
  if(revealed<PLAYER.clubs.length)revealed++;
  buildPath(false);
  if(guesses>=MAX)finish(false);
}
function hideSugg(){var b=document.getElementById('sbox');b.style.display='none';b.innerHTML='';}
function buildSugg(val){
  if(over||val.length<2){hideSugg();return;}
  var nv=norm(val),seen={},hits=[];
  for(var i=0;i<PLAYERS.length;i++){var p=PLAYERS[i];if(seen[p.name])continue;var pn=norm(p.name);if(pn.indexOf(nv)===0||p.acc.some(function(a){return norm(a).indexOf(nv)===0;})||lev(nv,pn)<=2){seen[p.name]=1;hits.push(p);}if(hits.length>=6)break;}
  if(!hits.length){hideSugg();return;}
  var box=document.getElementById('sbox');
  box.innerHTML=hits.map(function(h){var s=h.name.replace(/&/g,'&amp;').replace(/"/g,'&quot;');return '<div class="si" data-n="'+s+'">'+s+'</div>';}).join('');
  box.style.display='block';
  box.querySelectorAll('.si').forEach(function(el){el.addEventListener('mousedown',function(e){e.preventDefault();document.getElementById('ginput').value=el.getAttribute('data-n').replace(/&amp;/g,'&').replace(/&quot;/g,'"');hideSugg();});});
}
document.getElementById('ginput').addEventListener('input',function(e){buildSugg(e.target.value.trim());});
document.getElementById('ginput').addEventListener('keydown',function(e){if(e.key==='Enter')doGuess();if(e.key==='Escape')hideSugg();});
document.addEventListener('click',function(e){if(!e.target.closest('#iwrap'))hideSugg();});

</script>
