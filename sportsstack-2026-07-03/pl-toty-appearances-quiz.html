<style>
:root{
  --bg:#04080f;--surface:#080f1c;--surface2:#0d1829;--surface3:#122035;
  --gold:#f5c842;--blue:#2563eb;--blue-light:#3b82f6;
  --green:#22c55e;--green-bg:rgba(34,197,94,.14);--green-border:rgba(34,197,94,.55);
  --red:#ef4444;--red-bg:rgba(239,68,68,.12);--red-border:rgba(239,68,68,.45);
  --text:#e8f0fe;--text-muted:#6b8abf;--text-dim:#1e3355;
  --border:#0d2040;--border-bright:#1a3a6a;--radius:10px;--radius-lg:16px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif}
.page{max-width:720px;margin:0 auto;padding:16px 10px 40px}
@media(max-width:480px){
  .pitch-wrap{padding:16px 6px}
  .formation{gap:10px}
  .score-bar{gap:8px;margin-bottom:8px}
  .score-pill,.timer-pill{padding:5px 12px;font-size:12px}
  .btn-give-up{padding:7px 14px;font-size:12px}
}
.site-header{text-align:center;padding-bottom:16px;border-bottom:1px solid var(--border);margin-bottom:18px}
.game-name{font-family:'Barlow Condensed',sans-serif;font-size:clamp(20px,4.5vw,36px);font-weight:900;letter-spacing:.04em;text-transform:uppercase;color:var(--text);line-height:1}
.game-name .hl{color:var(--gold)}
.game-sub{font-size:12px;color:var(--text-muted);letter-spacing:.08em;text-transform:uppercase;margin-top:5px}
.score-bar{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:12px;flex-wrap:wrap}
.score-pill,.timer-pill{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:6px 18px;border-radius:20px;background:var(--surface2);border:1px solid var(--border-bright);color:var(--text-muted)}
.score-pill span{color:var(--gold)}
.timer-pill span{color:var(--text)}
.timer-pill.urgent span{color:#ef4444}
.msg{font-size:13px;color:var(--gold);min-height:20px;text-align:center;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px}
.btn-give-up{display:block;margin:0 auto 14px;padding:8px 20px;border-radius:50px;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;border:1.5px solid var(--border-bright);background:transparent;color:var(--text-muted);transition:all .2s}
.btn-give-up:hover{border-color:var(--red);color:var(--red)}

/* ── Pitch ── */
.pitch-wrap{
  background:repeating-linear-gradient(180deg,rgba(255,255,255,.022) 0px,rgba(255,255,255,.022) 46px,transparent 46px,transparent 92px),
    linear-gradient(180deg,#1b4a1f 0%,#1e5222 50%,#1b4a1f 100%);
  border-radius:14px;border:2px solid rgba(255,255,255,.1);
  padding:24px 12px;position:relative;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.5);
}
.pitch-wrap::before{content:'';position:absolute;left:6%;right:6%;top:50%;height:1px;background:rgba(255,255,255,.12);pointer-events:none}
.pitch-wrap::after{content:'';position:absolute;left:50%;top:50%;width:72px;height:72px;margin:-36px 0 0 -36px;border:1px solid rgba(255,255,255,.12);border-radius:50%;pointer-events:none}
.formation{display:flex;flex-direction:column;gap:14px;position:relative;z-index:1}
.form-row{display:flex;justify-content:center;gap:clamp(4px,1.5vw,10px);align-items:flex-start}

/* ── Shirt card — scales with viewport ── */
.shirt-card{display:flex;flex-direction:column;align-items:center;width:clamp(72px,20vw,106px)}
.shirt-svg-wrap{
  width:clamp(64px,18vw,96px);
  height:clamp(72px,20vw,108px);
  position:relative;transition:filter .35s,transform .25s
}
.shirt-card.found .shirt-svg-wrap{filter:drop-shadow(0 0 10px rgba(34,197,94,.5));transform:scale(1.04)}
.shirt-card.revealed .shirt-svg-wrap{filter:drop-shadow(0 0 6px rgba(239,68,68,.4))}

/* pos label on shirt */
.shirt-overlay{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:16%;pointer-events:none;z-index:2}
.shirt-pos{font-family:'Barlow Condensed',sans-serif;font-size:clamp(8px,2.2vw,11px);font-weight:900;letter-spacing:.14em;text-transform:uppercase;text-shadow:0 1px 3px rgba(0,0,0,.6)}
.shirt-q{font-size:clamp(20px,6vw,30px);font-weight:900;line-height:1;transition:opacity .3s;text-shadow:0 1px 4px rgba(0,0,0,.5)}
.shirt-card.found .shirt-q,.shirt-card.revealed .shirt-q{opacity:0!important}

/* ── Labels under shirt ── */
.shirt-club-label{margin-top:5px;font-family:'Barlow Condensed',sans-serif;font-size:clamp(8px,2vw,11px);font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:var(--text-muted);text-align:center;line-height:1.3}
.shirt-nat-label{font-size:clamp(12px,3.5vw,16px);text-align:center;opacity:0;transition:opacity .5s;height:20px;line-height:1}
.shirt-nat-label.visible{opacity:1}
.shirt-card.found .shirt-nat-label{opacity:0!important}

/* ── Per-shirt input ── */
.shirt-input-wrap{margin-top:5px;width:clamp(64px,18vw,100px)}
.shirt-input{width:100%;font-family:'Barlow Condensed',sans-serif;font-size:clamp(10px,2.5vw,12px);font-weight:700;padding:5px 4px;border:1.5px solid var(--border-bright);border-radius:8px;background:var(--surface2);color:var(--text);outline:none;text-align:center;transition:border-color .2s,background .2s,color .2s;letter-spacing:.04em}
.shirt-input::placeholder{color:var(--text-dim);font-weight:400;font-size:clamp(9px,2.2vw,11px)}
.shirt-input:focus{border-color:var(--blue-light)}
.shirt-input.correct{border-color:var(--green-border);background:var(--green-bg);color:#86efac;cursor:default}
.shirt-input.wrong{border-color:var(--red-border);background:rgba(239,68,68,.1)}
.shirt-input.miss{border-color:var(--red-border);background:rgba(239,68,68,.1);color:#fca5a5;cursor:default}

/* ── Result ── */
.result-banner{border-radius:var(--radius-lg);padding:1.1rem 1.25rem;text-align:center;margin-top:18px;border:1px solid}
.result-banner.win{border-color:var(--green-border);background:var(--green-bg)}
.result-banner.lose{border-color:var(--red-border);background:var(--red-bg)}
.rb-icon{font-size:32px;margin-bottom:6px}
.rb-title{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:900;letter-spacing:.04em;text-transform:uppercase;margin-bottom:6px}
.result-banner.win .rb-title{color:#86efac}.result-banner.lose .rb-title{color:#fca5a5}
.rb-sub{font-size:13px;color:var(--text-muted)}
.share-btn{margin-top:12px;display:inline-block;padding:10px 24px;border-radius:50px;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;border:1.5px solid var(--border-bright);background:transparent;color:var(--text);transition:all .2s}
.share-btn:hover{background:rgba(255,255,255,.06)}

.next-quiz-wrap{margin-top:14px;padding-top:12px;border-top:1px solid rgba(255,255,255,.08);text-align:center}
.next-quiz-label{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:6px}
.next-quiz-link{display:inline-block;margin-top:6px;padding:10px 22px;border-radius:50px;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;background:var(--gold);color:var(--bg);text-decoration:none;transition:all .2s}
.next-quiz-link:hover{background:#ffd700;transform:translateY(-1px)}

.shirt-card{cursor:pointer;transition:transform .15s}
.shirt-card.selected .shirt-svg-wrap{filter:drop-shadow(0 0 12px rgba(245,200,66,.7));transform:scale(1.08)}
.shirt-card.selected{outline:none}
.shirt-name-label{margin-top:3px;font-family:'Barlow Condensed',sans-serif;font-size:clamp(8px,2vw,11px);font-weight:800;color:var(--text-muted);text-align:center;min-height:14px;line-height:1.2}
.input-area{display:flex;align-items:center;gap:10px;padding:10px 12px 4px;flex-shrink:0}
.global-input{flex:1;font-family:'Barlow Condensed',sans-serif;font-size:clamp(16px,3.5vw,22px);font-weight:700;padding:10px 16px;border:2px solid var(--border-bright);border-radius:12px;background:var(--surface2);color:var(--text);outline:none;text-align:center;transition:border-color .2s,background .2s;letter-spacing:.04em}
.global-input::placeholder{color:var(--text-dim);font-weight:400}
.global-input:focus{border-color:var(--blue-light);background:var(--surface3)}
.global-input.wrong{border-color:var(--red-border);background:rgba(239,68,68,.1);animation:shake .3s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.shirt-nat-label.visible{opacity:1}

.pitch{background:linear-gradient(180deg,#1a5c1a,#1e6b1e);border:2px solid #2a7a2a;border-radius:8px;padding:16px 8px;margin:16px 0;min-height:300px}
.p-row{display:flex;justify-content:center;gap:8px;margin-bottom:10px}
.p-card{width:80px;background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.25);border-radius:8px;padding:8px 4px;text-align:center;transition:.3s}
.p-card.found{background:rgba(245,200,66,0.2);border-color:#f5c842}
.p-pos{font-size:10px;font-weight:700;letter-spacing:.08em;color:rgba(255,255,255,0.7);text-transform:uppercase}
.p-hint{font-size:11px;font-weight:700;color:#f5c842;margin-top:2px}
.p-flag{font-size:18px}
.p-name{font-size:10px;font-weight:700;color:#fff;margin-top:2px;line-height:1.2}
.p-detail{font-size:9px;color:rgba(255,255,255,0.6);margin-top:1px}
#start-area{text-align:center;padding:20px 0}
.start-btn{padding:12px 28px;background:#f5c842;color:#04080f;border:none;border-radius:8px;font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:900;text-transform:uppercase;cursor:pointer;letter-spacing:.06em}
nav{position:sticky;top:0;z-index:1000;background:rgba(4,8,15,.95);backdrop-filter:blur(12px);border-bottom:1px solid rgba(13,32,64,.8);padding:0 16px;display:flex;align-items:center;height:52px;gap:10px}
</style>

<body>
<div class="page">
<header class="site-header">
  <div class="ucl-stars">★ ★ ★ ★ ★ ★ ★ ★ ★ ★ ★ ★</div>
  <div class="game-name">PL Team of the Year <span class="hl">Most Appearances</span></div>
  <div class="game-sub">Number of TOTY appearances shown on each shirt · 4 minutes</div>
</header>
<div class="score-bar">
  <div class="score-pill"><span id="found-count">0</span> / 15 players</div>
  <div class="timer-pill" id="timer-pill">⏱ <span id="timer">4:00</span></div>
</div>
<div class="msg" id="msg">&nbsp;</div>
<div class="input-area" id="input-area">
  <input class="global-input" id="global-input" type="text" placeholder="Click a shirt, then type a name…" autocomplete="off" spellcheck="false"/>
</div>
<button class="btn-give-up" id="give-up-btn" onclick="giveUp()">Give up &amp; reveal</button>
<div class="pitch-wrap"><div class="formation" id="formation"></div></div>
<div id="result"></div>
</div>
<script>
const FORMATION = [
  [{name:"Alan Shearer",aliases:["shearer","alan shearer"],pos:"FW",club:"6x TOTY",flag:"🏴󠁧󠁢󠁥󠁮󠁧󠁿"},
   {name:"Thierry Henry",aliases:["henry","thierry henry"],pos:"FW",club:"6x TOTY",flag:"🇫🇷"}],
  [{name:"Cristiano Ronaldo",aliases:["ronaldo","cristiano ronaldo"],pos:"MF",club:"4x TOTY",flag:"🇵🇴"},
   {name:"Patrick Vieira",aliases:["vieira","patrick vieira"],pos:"MF",club:"6x TOTY",flag:"🇫🇷"},
   {name:"Steven Gerrard",aliases:["gerrard","steven gerrard"],pos:"MF",club:"8x TOTY",flag:"🏴󠁧󠁢󠁥󠁮󠁧󠁿"},
   {name:"Ryan Giggs",aliases:["giggs","ryan giggs"],pos:"MF",club:"6x TOTY",flag:"🏴󠁧󠁢󠁷󠁬󠁳󠁿"}],
  [{name:"Gary Neville",aliases:["neville","gary neville"],pos:"DF",club:"6x TOTY",flag:"🏴󠁧󠁢󠁥󠁮󠁧󠁿"},
   {name:"Rio Ferdinand",aliases:["ferdinand","rio ferdinand"],pos:"DF",club:"6x TOTY",flag:"🏴󠁧󠁢󠁥󠁮󠁧󠁿"},
   {name:"Virgil van Dijk",aliases:["van dijk","virgil van dijk"],pos:"DF",club:"5x TOTY",flag:"🇳🇱"},
   {name:"Ashley Cole",aliases:["cole","ashley cole"],pos:"DF",club:"5x TOTY",flag:"🏴󠁧󠁢󠁥󠁮󠁧󠁿"}],
  [{name:"Nigel Martyn",aliases:["martyn","nigel martyn"],pos:"GK",club:"5x TOTY",flag:"🏴󠁧󠁢󠁥󠁮󠁧󠁿"}],
  [{name:"Harry Kane",aliases:["kane","harry kane"],pos:"FW",club:"6x TOTY",flag:"🏴󠁧󠁢󠁥󠁮󠁧󠁿"},
   {name:"Roy Keane",aliases:["keane","roy keane"],pos:"MF",club:"5x TOTY",flag:"🇮🇪"},
   {name:"David de Gea",aliases:["de gea","david de gea"],pos:"GK",club:"5x TOTY",flag:"🇪🇸"},
   {name:"David Beckham",aliases:["beckham","david beckham"],pos:"MF",club:"4x TOTY",flag:"🏴󠁧󠁢󠁥󠁮󠁧󠁿"}],
];

const ALL_PLAYERS = FORMATION.flat();
const TOTAL = ALL_PLAYERS.length;
const TOTAL_SECS = 240;
let secsLeft = TOTAL_SECS, timerInterval = null, gameActive = false;
let foundNames = new Set(), done = false;

function norm(s){ return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim(); }

function buildPitch(){
  const pitch = document.getElementById('pitch');
  pitch.innerHTML = '';
  FORMATION.forEach(function(row, ri){
    const rowEl = document.createElement('div');
    rowEl.className = 'p-row';
    row.forEach(function(p){
      const card = document.createElement('div');
      card.id = 'pcard-' + norm(p.name).replace(/\s/g,'-');
      card.className = 'p-card';
      card.innerHTML = '<div class="p-pos">'+p.pos+'</div><div class="p-hint">'+p.club+'</div>';
      rowEl.appendChild(card);
    });
    pitch.appendChild(rowEl);
  });
}

function revealPlayer(p){
  const id = 'pcard-' + norm(p.name).replace(/\s/g,'-');
  const card = document.getElementById(id);
  if(!card) return;
  card.className = 'p-card found';
  card.innerHTML = '<div class="p-flag">'+p.flag+'</div><div class="p-name">'+p.name+'</div><div class="p-detail">'+p.pos+' · '+p.club+'</div>';
}

function tryGuess(val){
  if(!gameActive || !val.trim()) return;
  const nv = norm(val);
  let matched = false;
  ALL_PLAYERS.forEach(function(p){
    if(foundNames.has(norm(p.name))) return;
    if(p.aliases.some(function(a){ return norm(a) === nv; })){
      foundNames.add(norm(p.name));
      revealPlayer(p);
      matched = true;
    }
  });
  if(matched){
    document.getElementById('guess-input').value = '';
    document.getElementById('score').textContent = foundNames.size;
    document.getElementById('remain-count').textContent = TOTAL - foundNames.size;
    const el = document.getElementById('timer');
    if(el){ const m=Math.floor(secsLeft/60),s=secsLeft%60; el.textContent=m+':'+(s<10?'0':'')+s; }
    if(foundNames.size === TOTAL) endGame(true);
  }
}

function startGame(){
  gameActive = true;
  document.getElementById('start-area').style.display = 'none';
  document.getElementById('input-area').style.display = 'block';
  timerInterval = setInterval(function(){
    secsLeft--;
    const m=Math.floor(secsLeft/60), s=secsLeft%60;
    const el=document.getElementById('timer');
    if(el) el.textContent=m+':'+(s<10?'0':'')+s;
    if(secsLeft<=0){ clearInterval(timerInterval); endGame(false); }
  }, 1000);
}

function endGame(won){
  gameActive = false; done = true;
  clearInterval(timerInterval);
  document.getElementById('input-area').style.display = 'none';
  if(!won){ ALL_PLAYERS.forEach(function(p){ if(!foundNames.has(norm(p.name))) revealPlayer(p); }); }
  const modal = document.getElementById('modal');
  const elapsed = TOTAL_SECS - secsLeft;
  const mins = Math.floor(elapsed/60), secs = elapsed%60;
  document.getElementById('modal-icon').textContent = won ? '🏆' : '⌛';
  document.getElementById('modal-title').textContent = won ? 'Quiz Complete!' : "Time's Up!";
  document.getElementById('modal-score').textContent = foundNames.size + ' / ' + TOTAL + ' found';
  document.getElementById('modal-msg').textContent = won ? 'You named all ' + TOTAL + ' players in ' + mins + 'm ' + secs + 's!' : 'You found ' + foundNames.size + ' of ' + TOTAL + ' players.';
  document.getElementById('modal-backdrop').classList.add('show');
  if(typeof saveResult === 'function') saveResult('pl-toty-appearances','PL TOTY Appearances',foundNames.size,TOTAL,won);
}

function closeModal(){ document.getElementById('modal-backdrop').classList.remove('show'); }
function resetQuiz(){ closeModal(); secsLeft=TOTAL_SECS; foundNames=new Set(); done=false; gameActive=false; document.getElementById('start-area').style.display='block'; document.getElementById('score').textContent='0'; document.getElementById('remain-count').textContent=TOTAL; document.getElementById('timer').textContent='4:00'; buildPitch(); }

document.addEventListener('DOMContentLoaded', function(){
  buildPitch();
  const input = document.getElementById('guess-input');
  if(input){
    input.addEventListener('keydown', function(e){ if(e.key==='Enter') tryGuess(input.value); });
    input.addEventListener('input', function(){ tryGuess(input.value); });
  }
});
</script>
</body>
