<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#04080f;--surface:#080f1c;--surface2:#0d1829;--gold:#f5c842;--text:#e8f0fe;--muted:#6b8abf;--dim:#1e3355;--border:#0d2040;--bright:#1a3a6a}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh}
nav{background:rgba(4,8,15,.95);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:54px;position:sticky;top:0;z-index:10}
.nav-brand{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-style:italic;font-size:20px;text-transform:uppercase;color:var(--gold);text-decoration:none;line-height:.9}
.nav-right{display:flex;gap:8px;align-items:center}
.nav-btn{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;padding:6px 14px;border-radius:7px;cursor:pointer;text-decoration:none;transition:all .15s;border:1px solid var(--bright);background:transparent;color:var(--muted)}
.nav-btn:hover,.nav-btn.gold{background:var(--gold);color:var(--bg);border-color:var(--gold)}
.hero{padding:32px 20px 24px;text-align:center;border-bottom:1px solid var(--border);background:radial-gradient(ellipse at 50% 0%,#0d2040 0%,var(--bg) 70%)}
.avatar{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,#f5c842,#e6a800);color:var(--bg);display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:28px;letter-spacing:.04em;margin:0 auto 12px;border:3px solid rgba(245,200,66,.3)}
.username{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:900;letter-spacing:.04em;text-transform:uppercase;color:var(--text);margin-bottom:4px}
.joined{font-size:12px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}
.stats-row{display:flex;justify-content:center;gap:0;margin-top:20px;border:1px solid var(--border);border-radius:12px;overflow:hidden;max-width:480px;margin-left:auto;margin-right:auto}
.stat{flex:1;padding:14px 8px;text-align:center;background:var(--surface);border-right:1px solid var(--border)}
.stat:last-child{border-right:none}
.stat-n{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:900;color:var(--gold);line-height:1}
.stat-l{font-size:10px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-top:2px}
.hub{max-width:1000px;margin:0 auto;padding:32px 16px 60px}
.sec-hdr{display:flex;align-items:center;gap:8px;margin:28px 0 10px}
.sec-title{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;padding-left:9px;border-left:3px solid var(--gold);color:var(--gold)}
.sec-count{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);background:var(--surface2);border:1px solid var(--border);padding:2px 7px;border-radius:20px}
.badge-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px}
.badge{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 8px 10px;text-align:center;cursor:pointer;transition:all .2s;text-decoration:none;display:block}
.badge.earned{border-color:var(--c);background:color-mix(in srgb,var(--c) 8%,var(--surface))}
.badge.earned:hover{transform:translateY(-2px);box-shadow:0 4px 16px color-mix(in srgb,var(--c) 30%,transparent)}
.badge:not(.earned){opacity:.45}
.badge-icon{font-size:24px;margin-bottom:6px;line-height:1}
.badge-score{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:900;color:var(--c,var(--muted));line-height:1;margin-bottom:3px}
.badge-name{font-size:10px;color:var(--muted);line-height:1.3;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.badge.earned .badge-name{color:var(--text)}
#loading{text-align:center;padding:60px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:16px;letter-spacing:.1em;text-transform:uppercase}

/* ── World Cup Sticker Book ── */
.sb-section{margin-top:36px;padding-top:28px;border-top:1px solid var(--border)}
.sb-header{text-align:center;margin-bottom:24px}
.sb-title{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:900;
  text-transform:uppercase;color:var(--gold);letter-spacing:.04em;margin-bottom:4px}
.sb-subtitle{font-size:13px;color:var(--muted);margin-bottom:12px}
.sb-progress-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden;max-width:300px;margin:0 auto}
.sb-progress-fill{height:100%;background:var(--gold);border-radius:3px;transition:width .6s ease}
.sb-progress-label{font-size:12px;color:var(--muted);margin-top:6px}
.sb-groups{display:flex;flex-direction:column;gap:20px}
.sb-group{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px}
.sb-group-label{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:900;
  letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
.sb-cards{display:flex;gap:8px;flex-wrap:wrap}
.sb-empty{text-align:center;padding:40px;color:var(--muted);font-size:13px}
@keyframes wcShimmer{0%{left:-100%}100%{left:200%}}

.sb-rar-g{color:#FFD700;border-color:#FFD700}
.sb-rar-s{color:#A8A9AD;border-color:#A8A9AD}
.sb-rar-b{color:#CD7F32;border-color:#CD7F32}
.sb-tier-hdr{display:flex;align-items:center;gap:8px;margin:20px 0 10px}
.sb-tier-label{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:900;
  letter-spacing:.14em;text-transform:uppercase}
.sb-tier-count{font-size:11px;color:var(--muted);background:var(--surface2);
  border-radius:20px;padding:2px 9px}
</style>
</head>

async function load() {
  const loadEl = document.getElementById('loading');
  const fail = function(msg) {
    loadEl.innerHTML = '<p style="color:#ef4444;font-size:14px;text-align:center;padding:30px 20px">' + msg + '</p>';
  };
  try {
    const authRes = await client.auth.getUser();
    const user = authRes && authRes.data && authRes.data.user;
    if (!user) { location.href = 'auth.html'; return; }

    const name = (user.user_metadata && user.user_metadata.full_name) || user.email.split('@')[0];
    const initials = name.split(' ').map(function(p){return p[0];}).join('').slice(0,2).toUpperCase();
    document.getElementById('avatar').textContent = initials;
    document.getElementById('username').textContent = name;
    document.getElementById('joined').textContent = 'Member since ' + new Date(user.created_at).toLocaleDateString('en-AU',{year:'numeric',month:'long'});

    var qRes = await client.from('quiz_results').select('*').eq('user_id', user.id);
    var results = qRes.data || [];
    var resultMap = {};
    results.forEach(function(r) { resultMap[r.quiz_slug] = r; });

    var gold = results.filter(function(r){return r.completed;}).length;
    document.getElementById('stat-gold').textContent = gold;
    document.getElementById('stat-att').textContent = results.length;
    document.getElementById('stat-pct').textContent = Math.round(gold/156*100)+'%';

    var hub = document.getElementById('badge-hub');
    hub.innerHTML = '';
    SECTIONS.forEach(function(sec) {
      var validSlugs = sec.slugs.filter(function(s){return quizMap[s];});
      if (!validSlugs.length) return;
      var earnedInSec = validSlugs.filter(function(s){return resultMap[s];}).length;
      var html = '<div class="sec-hdr"><div class="sec-title" style="border-color:'+sec.colour+';color:'+sec.colour+'">'+sec.label+'</div><div class="sec-count">'+earnedInSec+'/'+validSlugs.length+'</div></div><div class="badge-grid">';
      html += validSlugs.map(function(slug) {
        var q = quizMap[slug], r = resultMap[slug], colour = q.colour;
        if (r) {
          var icon = r.completed ? '\uD83E\uDD47' : '\uD83C\uDFC5';
          var scoreStr = r.completed ? 'PERFECT' : r.score+'/'+r.total;
          return '<a class="badge earned" href="'+slug+'.html" style="--c:'+colour+'"><div class="badge-icon">'+icon+'</div><div class="badge-score">'+scoreStr+'</div><div class="badge-name">'+q.name+'</div></a>';
        }
        return '<a class="badge" href="'+slug+'.html" style="--c:'+colour+'"><div class="badge-icon">\uD83D\uDD18</div><div class="badge-score">-</div><div class="badge-name">'+q.name+'</div></a>';
      }).join('');
      html += '</div>';
      hub.innerHTML += html;
    });

    loadEl.style.display = 'none';
    document.getElementById('profile-content').style.display = 'block';
    loadStickerBook(user);
  } catch(err) {
    fail('Could not load profile: ' + (err && err.message ? err.message : String(err)));
  }
}

    '<div style="position:absolute;top:0;left:-100%;width:50%;height:100%;' +
      'background:linear-gradient(90deg,transparent,'+rar.shimmer+',transparent);' +
      'animation:wcShimmer '+(nation.r==='G'?'1.8':'2.6')+'s ease infinite;pointer-events:none"></div>' +

    // rarity badge top-right
    '<div style="position:absolute;top:6px;right:6px;' +
      'background:'+rar.border+';color:'+(nation.r==='G'?'#000':'#000')+';' +
      'font-family:Barlow Condensed,sans-serif;font-size:'+rarSize+';font-weight:900;' +
      'letter-spacing:.1em;text-transform:uppercase;padding:1px 5px;border-radius:4px;' +
      'opacity:0.92">'+rar.label+'</div>' +

    // group top-left
    '<div style="font-family:Barlow Condensed,sans-serif;font-size:'+grpSize+';font-weight:900;' +
      'letter-spacing:.14em;color:'+rar.border+';text-transform:uppercase;align-self:flex-start">GROUP '+nation.g+'</div>' +

    // crest + flag
    '<div style="position:relative;width:'+(size==='lg'?78:50)+'px;height:'+(size==='lg'?82:54)+'px;display:flex;align-items:center;justify-content:center">' +
      '<svg style="position:absolute;inset:0;width:100%;height:100%;opacity:0.22" viewBox="0 0 78 84">' +
        '<path fill="'+nation.acc+'" d="M8 4L70 4L70 52Q70 76 39 82Q8 76 8 52Z"/>' +
      '</svg>' +
      '<div style="font-size:'+flagSize+';line-height:1;position:relative;z-index:1;' +
        'filter:drop-shadow(0 2px 6px rgba(0,0,0,0.5))">'+nation.f+'</div>' +
    '</div>' +

    // name + stars
    '<div style="text-align:center">' +
      (nation.w > 0 ? '<div style="font-size:'+(size==='lg'?'11':'7')+'px;letter-spacing:-1px;color:'+(nation.r==='G'?rar.border:'#c9a227')+';margin-bottom:1px">'+'&#9733;'.repeat(nation.w)+'</div>' : '') +
      '<div style="font-family:Barlow Condensed,sans-serif;font-size:'+nameSize+';font-weight:900;' +
        'color:#fff;text-transform:uppercase;letter-spacing:.05em;text-shadow:0 1px 4px rgba(0,0,0,0.6)">'+nation.n+'</div>' +
      '<div style="font-size:'+(size==='lg'?'7':'6')+'px;color:rgba(255,255,255,0.4);letter-spacing:.1em">FIFA WC 2026</div>' +
    '</div>' +
  '</div>';
}

function buildLockedCard(nation, size) {
  var rar = WC_RARITY[nation.r] || WC_RARITY.B;
  var w   = size === 'lg' ? 160 : 100;
  var h   = size === 'lg' ? 220 : 140;
  var nameSize = size === 'lg' ? '14px' : '9px';
  return '<div style="width:'+w+'px;height:'+h+'px;border-radius:11px;' +
    'background:#0a0f1a;' +
    'border:1px dashed '+(nation.r==='G'?'#4a3800':nation.r==='S'?'#2a2a2a':'#1e3355')+';' +
    'opacity:0.5;display:flex;flex-direction:column;align-items:center;justify-content:space-between;' +
    'padding:9px 6px 7px;flex-shrink:0;position:relative">' +
    '<div style="font-family:Barlow Condensed,sans-serif;font-size:7px;font-weight:900;' +
      'letter-spacing:.12em;color:'+(nation.r==='G'?'#3a2800':nation.r==='S'?'#2a2a2a':'#1e3355')+';' +
      'text-transform:uppercase">'+rar.label+'</div>' +
    '<div style="font-size:'+(size==='lg'?'32':'22')+'px;color:#1e3355">?</div>' +
    '<div style="font-family:Barlow Condensed,sans-serif;font-size:'+nameSize+';font-weight:900;' +
      'color:#1e3355;text-transform:uppercase;text-align:center">'+nation.n+'</div>' +
  '</div>';
}


async function loadStickerBook(user) {
  if (!user) return;
  var sbGroups = document.getElementById('sb-groups');
  if (!sbGroups) return;
  try {
    var res = await client.from('world_cup_stickers').select('nation').eq('user_id', user.id);
    var owned = new Set((res.data||[]).map(function(s){return s.name||s.nation;}));
    var total = 48, count = owned.size;

    var fillEl = document.getElementById('sb-fill');
    var countEl = document.getElementById('sb-count');
    if (fillEl) fillEl.style.width = (count/total*100) + '%';
    if (countEl) countEl.textContent = count + ' / ' + total + ' stickers collected' + (count===total?' Complete!':'');

    sbGroups.innerHTML = '';
    var tiers = [
      {label:'Gold', color:'#FFD700', nations: WC_NATIONS.filter(function(n){return n.r==='G';})},
      {label:'Silver', color:'#A8A9AD', nations: WC_NATIONS.filter(function(n){return n.r==='S';})},
      {label:'Bronze', color:'#CD7F32', nations: WC_NATIONS.filter(function(n){return n.r==='B';})},
    ];
    tiers.forEach(function(tier) {
      var ownedCount = tier.nations.filter(function(n){return owned.has(n.n);}).length;
      var hdr = document.createElement('div');
      hdr.style.cssText = 'font-family:Barlow Condensed,sans-serif;font-size:13px;font-weight:900;letter-spacing:.12em;text-transform:uppercase;color:'+tier.color+';margin:16px 0 8px;display:flex;align-items:center;gap:8px';
      hdr.innerHTML = tier.label + ' <span style="font-size:11px;color:var(--muted);font-weight:400">'+ownedCount+' / '+tier.nations.length+'</span>';
      sbGroups.appendChild(hdr);
      var grid = document.createElement('div');
      grid.style.cssText = 'display:flex;flex-wrap:wrap;gap:8px;margin-bottom:4px';
      tier.nations.forEach(function(n) {
        grid.innerHTML += owned.has(n.n) ? buildStickerCard(n,'sm') : buildLockedCard(n,'sm');
      });
      sbGroups.appendChild(grid);
    });
  } catch(err) {
    sbGroups.innerHTML = '<div style="color:#6b8abf;font-size:13px;padding:20px;text-align:center">Sticker book unavailable — ' + err.message + '</div>';
  }
}
async function signOut() {
  await client.auth.signOut();
  location.href = 'index.html';
}

load();
</script>
