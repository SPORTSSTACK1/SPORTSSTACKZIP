<style>
:root{
  --bg:#04080f;--surface:#080f1c;--surface2:#0d1829;--surface3:#122035;
  --blue:#2563eb;--blue-light:#3b82f6;
  --gold:#f5c842;
  --green:#22c55e;--green-bg:rgba(34,197,94,.09);--green-border:rgba(34,197,94,.45);
  --red:#ef4444;--red-bg:rgba(239,68,68,.07);--red-border:rgba(239,68,68,.4);
  --text:#e8f0fe;--text-muted:#6b8abf;--text-dim:#4a6890;
  --border:#0d2040;--border-bright:#1a3a6a;
  --radius:10px;--radius-lg:16px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif}
.page{max-width:860px;margin:0 auto;padding:22px 14px 56px}
.site-header{text-align:center;padding-bottom:16px;border-bottom:1px solid var(--border);margin-bottom:18px}
.game-title{font-family:'Barlow Condensed',sans-serif;font-size:clamp(18px,4vw,34px);font-weight:900;letter-spacing:.04em;text-transform:uppercase;line-height:1.1}
.game-title .hl{color:var(--gold)}
.game-subtitle{font-size:12px;color:var(--text-muted);letter-spacing:.1em;text-transform:uppercase;margin-top:5px}
.stats-bar{display:flex;align-items:center;justify-content:space-between;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:11px 20px;margin-bottom:16px;gap:10px;flex-wrap:wrap}
.stat-item{text-align:center;flex:1;min-width:72px}
.stat-val{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:900;line-height:1;color:var(--gold)}
.stat-val.urgent{color:var(--red);animation:pulse .8s infinite}
.stat-val.green{color:var(--green)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.stat-label{font-size:10px;color:var(--text-muted);letter-spacing:.1em;text-transform:uppercase;margin-top:3px}
.stat-divider{width:1px;height:38px;background:var(--border-bright);flex-shrink:0}
.prog-wrap{height:4px;background:rgba(255,255,255,.06);border-radius:99px;margin-bottom:16px;overflow:hidden}
.prog-bar{height:100%;background:linear-gradient(90deg,var(--blue-light),var(--gold));border-radius:99px;transition:width .4s ease}
.input-wrap{position:relative;margin-bottom:16px}
.guess-input{width:100%;font-size:16px;padding:13px 18px;border:1.5px solid var(--border-bright);border-radius:var(--radius);background:var(--surface2);color:var(--text);outline:none;font-family:'Barlow',sans-serif;transition:border-color .15s}
.guess-input:focus{border-color:var(--blue-light);box-shadow:0 0 0 3px rgba(59,130,246,.1)}
.guess-input::placeholder{color:#6b8abf}
.guess-input:disabled{opacity:.4;cursor:not-allowed}
.suggestions{position:absolute;top:100%;left:0;right:0;background:var(--surface2);border:1px solid var(--gold);border-radius:var(--radius);z-index:99;margin-top:3px;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,.45)}
.suggestion-label{font-size:11px;color:var(--gold);padding:7px 14px 3px;letter-spacing:.08em;text-transform:uppercase;font-weight:700;border-bottom:1px solid var(--border)}
.suggestion-item{padding:10px 14px;font-size:14px;color:var(--text);cursor:pointer;display:flex;align-items:center;gap:10px;transition:background .12s}
.suggestion-item:hover{background:var(--surface3)}
.sug-badge{font-size:10px;color:var(--gold);background:rgba(245,200,66,.1);border:1px solid rgba(245,200,66,.25);border-radius:4px;padding:2px 7px;font-weight:700;flex-shrink:0}
.team-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
@media(max-width:600px){.team-grid{grid-template-columns:repeat(3,1fr);gap:8px}}
@media(max-width:400px){.team-grid{grid-template-columns:repeat(2,1fr);gap:7px}}
.team-card{aspect-ratio:1/1;border-radius:var(--radius);border:1.5px solid var(--border-bright);background:var(--surface2);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:9px 7px;transition:all .35s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden;cursor:default}
.team-card::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(59,130,246,.06),transparent 70%);pointer-events:none}
.card-rank{font-family:'Barlow Condensed',sans-serif;font-size:clamp(20px,4vw,32px);font-weight:900;color:#6b8abf;line-height:1;margin-bottom:3px}
.card-goals-hidden{font-size:clamp(11px,1.8vw,14px);color:#6b8abf;letter-spacing:.05em;margin-bottom:5px}
.card-icon{font-size:clamp(18px,3.5vw,26px);margin-bottom:3px;opacity:.15}
.card-dots{display:flex;gap:3px;justify-content:center;margin-top:4px}
.card-dot{width:5px;height:5px;border-radius:50%;background:#1a3a6a}
.team-card.found{background:var(--green-bg);border-color:var(--green-border);box-shadow:0 0 18px rgba(34,197,94,.13)}
.team-card.found::before{background:radial-gradient(ellipse at 50% 0%,rgba(34,197,94,.08),transparent 70%)}
.card-icon-found{font-size:clamp(14px,2.5vw,19px);margin-bottom:3px}
.card-name-found{font-family:'Barlow Condensed',sans-serif;font-size:clamp(12px,2.2vw,17px);font-weight:800;color:#86efac;letter-spacing:.03em;line-height:1.2;margin-bottom:2px}
.card-era-found{font-size:clamp(8px,1.4vw,11px);color:#4ade80;letter-spacing:.05em;margin-bottom:2px}
.card-goals-found{font-family:'Barlow Condensed',sans-serif;font-size:clamp(15px,2.8vw,22px);font-weight:900;color:var(--gold);line-height:1;margin-bottom:1px}
.card-goals-label{font-size:clamp(7px,1.1vw,9px);color:#4ade80;letter-spacing:.08em;text-transform:uppercase}
.team-card.revealed{background:var(--red-bg);border-color:var(--red-border)}
.card-name-revealed{font-family:'Barlow Condensed',sans-serif;font-size:clamp(12px,2.2vw,17px);font-weight:800;color:var(--red);letter-spacing:.03em;line-height:1.2;margin-bottom:2px}
.card-era-revealed{font-size:clamp(8px,1.4vw,11px);color:rgba(239,68,68,.7);letter-spacing:.05em;margin-bottom:2px}
.card-goals-revealed{font-family:'Barlow Condensed',sans-serif;font-size:clamp(15px,2.8vw,22px);font-weight:900;color:rgba(239,68,68,.8);line-height:1;margin-bottom:1px}
.card-goals-label-rev{font-size:clamp(7px,1.1vw,9px);color:rgba(239,68,68,.6);letter-spacing:.08em;text-transform:uppercase}
.modal-backdrop{position:fixed;inset:0;background:rgba(4,8,15,.85);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:999;opacity:0;pointer-events:none;transition:opacity .3s}
.modal-backdrop.show{opacity:1;pointer-events:all}
.modal{background:var(--surface2);border:1px solid var(--border-bright);border-radius:var(--radius-lg);padding:32px 28px;max-width:420px;width:90%;text-align:center}
.modal.win{border-color:var(--green-border);background:rgba(34,197,94,.05)}
.modal.lose{border-color:var(--red-border);background:var(--red-bg)}
.modal-icon{font-size:48px;margin-bottom:12px}
.modal-title{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:900;letter-spacing:.04em;text-transform:uppercase;margin-bottom:8px}
.modal.win .modal-title{color:#86efac}
.modal.lose .modal-title{color:#fca5a5}
.modal-score{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;color:var(--gold);margin-bottom:12px}
.modal-msg{font-size:15px;color:var(--text-muted);line-height:1.65;margin-bottom:20px}
.modal-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.modal-btn{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;padding:12px 28px;border-radius:50px;cursor:pointer;border:none;transition:all .2s}
.modal-btn.primary{background:var(--gold);color:var(--bg)}
.modal-btn.primary:hover{background:#ffd700;transform:translateY(-1px)}
.modal-btn.secondary{background:transparent;color:var(--text);border:1.5px solid var(--border-bright)}
.modal-btn.secondary:hover{background:rgba(255,255,255,.06)}
nav{position:sticky;top:0;z-index:1000;background:rgba(4,8,15,.95);backdrop-filter:blur(12px);border-bottom:1px solid rgba(13,32,64,.8);padding:0 16px;display:flex;align-items:center;height:52px;gap:10px}
</style>

<body>
<div class="page">
  <header class="site-header" data-sport="AFL" style="--sport-accent:#3EA8B8">
    <div class="game-title">AFL/VFL <span class="hl">800-Goal Club</span></div>
    <div class="game-subtitle">Name all 12 players to kick 800+ career goals · ordered by totals · rank &amp; goals shown · 4 minutes</div>
  </header>
  <div class="stats-bar">
    <div class="stat-item"><div class="stat-val green" id="found-count">0</div><div class="stat-label">Found</div></div>
    <div class="stat-divider"></div>
    <div class="stat-item"><div class="stat-val" id="remain-count">12</div><div class="stat-label">Remaining</div></div>
    <div class="stat-divider"></div>
    <div class="stat-item"><div class="stat-val" id="timer-display">4:00</div><div class="stat-label">Time Left</div></div>
  </div>
  <div class="prog-wrap"><div class="prog-bar" id="prog-bar" style="width:0%"></div></div>
  <div class="input-wrap">
    <input class="guess-input" id="guess-input" type="text" placeholder="Type a player's name and press Enter…" autocomplete="off"/>
    <div class="suggestions" id="suggestions" style="display:none"></div>
  </div>
  <button id="give-up-btn" onclick="giveUp()" style="display:block;margin:8px auto 16px;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;background:transparent;color:var(--text-muted);border:1px solid var(--border-bright);padding:8px 20px;border-radius:8px;cursor:pointer;transition:all .2s" onmouseover="this.style.borderColor='#ef4444';this.style.color='#ef4444'" onmouseout="this.style.borderColor='';this.style.color=''">Give Up &amp; Reveal</button>
  <div class="team-grid" id="team-grid"></div>
</div>
<div class="modal-backdrop" id="modal-backdrop">
  <div class="modal" id="modal">
    <div class="modal-icon" id="modal-icon"></div>
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-score" id="modal-score"></div>
    <div class="modal-msg" id="modal-msg"></div>
    <div class="modal-btns">
      <button class="modal-btn primary" onclick="resetQuiz()">Play Again</button>
      <button class="modal-btn secondary" onclick="closeModal()">See Results</button>
    </div>
  </div>
</div>
<script>
// All 12 players with 800+ career VFL/AFL goals. Source: AFL Tables (confirmed to 2025).
// Note: Tom Hawkins retired in 2024 with 796 goals — 4 short of the cutoff.
// accepted[]: last name ✓ | full name ✓ | iconic nicknames/first names ✓
const PLAYERS = [
  {
    id:1,  rank:1,  name:"Tony Lockett",       goals:1360, era:"St Kilda & Sydney (1983–2002)",
    accepted:["lockett","tony lockett","plugger","tony"]
    // "Plugger" is one of the most iconic AFL nicknames; "Tony" distinctive as the GOAT goalkicker
  },
  {
    id:2,  rank:2,  name:"Gordon Coventry",     goals:1299, era:"Collingwood (1920–1937)",
    accepted:["coventry","gordon coventry","gordon"]
    // "Gordon" distinctive in AFL goalkicking history
  },
  {
    id:3,  rank:3,  name:"Jason Dunstall",      goals:1254, era:"Hawthorn (1985–1998)",
    accepted:["dunstall","jason dunstall","dunny"]
  },
  {
    id:4,  rank:4,  name:"Lance Franklin",      goals:1066, era:"Hawthorn & Sydney (2005–2023)",
    accepted:["franklin","lance franklin","buddy","buddy franklin"]
    // "Buddy" is globally iconic in AFL
  },
  {
    id:5,  rank:5,  name:"Doug Wade",           goals:1057, era:"Geelong & North Melbourne (1961–1975)",
    accepted:["wade","doug wade"]
  },
  {
    id:6,  rank:6,  name:"Gary Ablett Snr",     goals:1031, era:"Geelong (1982–1996)",
    accepted:["ablett","gary ablett","gary ablett snr","gary ablett sr","ablett snr","ablett sr","god"]
    // "God" is his famous Geelong nickname; "ablett" resolves here (more goals than Jnr)
  },
  {
    id:7,  rank:7,  name:"Jack Titus",          goals:970,  era:"Richmond (1926–1943)",
    accepted:["titus","jack titus"]
    // "Jack" not distinctive enough alone
  },
  {
    id:8,  rank:8,  name:"Matthew Lloyd",       goals:926,  era:"Essendon (1995–2009)",
    accepted:["lloyd","matthew lloyd","lloydy"]
  },
  {
    id:9,  rank:9,  name:"Leigh Matthews",      goals:915,  era:"Hawthorn (1969–1985)",
    accepted:["matthews","leigh matthews","lethal","lethal leigh"]
    // "Lethal Leigh" was his famous nickname
  },
  {
    id:10, rank:10, name:"Peter McKenna",        goals:874,  era:"Collingwood & Carlton (1965–1977)",
    accepted:["mckenna","peter mckenna"]
  },
  {
    id:11, rank:11, name:"Bernie Quinlan",       goals:817,  era:"Fitzroy & Hawthorn (1969–1986)",
    accepted:["quinlan","bernie quinlan","bernie","superboot","super boot"]
    // "Superboot" was his famous nickname; "Bernie" quite distinctive
  },
  {
    id:12, rank:12, name:"Matthew Richardson",  goals:800,  era:"Richmond (1993–2009)",
    accepted:["richardson","matthew richardson","richo","matty richo"]
    // "Richo" is his famous nickname
  },
];

const TOTAL=PLAYERS.length,TOTAL_SECS=240;
let secsLeft=TOTAL_SECS,timer=null,found=new Set(),gameActive=false;

function norm(s){return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9\s]/g,'').trim();}
function levenshtein(a,b){const m=a.length,n=b.length,dp=Array.from({length:m+1},(_,i)=>Array.from({length:n+1},(_,j)=>i===0?j:j===0?i:0));for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);return dp[m][n];}
function isExactMatch(val,p){const nv=norm(val);return p.accepted.map(norm).some(a=>a===nv);}
function getFuzzySuggestions(val){if(val.length<2)return[];const nv=norm(val),results=[];for(const p of PLAYERS){if(found.has(p.id))continue;const d=Math.min(...p.accepted.map(a=>levenshtein(nv,norm(a))));if(d>=1&&d<=2)results.push({p,dist:d});}return results.sort((a,b)=>a.dist-b.dist).slice(0,1).map(r=>r.p);}

function rankLabel(r){const s=r===1?'st':r===2?'nd':r===3?'rd':'th';return r+s;}
function fmt(n){return n.toLocaleString();}

function cardInner(p,state){
  if(state==='found')return`<div class="card-icon-found">🏉</div><div class="card-name-found">${p.name}</div><div class="card-era-found">${p.era}</div><div class="card-goals-found">${fmt(p.goals)}</div><div class="card-goals-label">career goals</div>`;
  if(state==='revealed')return`<div class="card-icon" style="opacity:.25;font-size:clamp(14px,2.5vw,19px)">🏉</div><div class="card-name-revealed">${p.name}</div><div class="card-era-revealed">${p.era}</div><div class="card-goals-revealed">${fmt(p.goals)}</div><div class="card-goals-label-rev">career goals</div>`;
  return`<div class="card-icon">🏉</div><div class="card-rank">${rankLabel(p.rank)}</div><div class="card-goals-hidden">${fmt(p.goals)} goals</div><div class="card-dots"><span class="card-dot"></span><span class="card-dot"></span><span class="card-dot"></span></div>`;
}

function renderGrid(){const g=document.getElementById('team-grid');g.innerHTML='';for(const p of PLAYERS){const f=found.has(p.id),c=document.createElement('div');c.className='team-card'+(f?' found':'');c.id='card-'+p.id;c.innerHTML=cardInner(p,f?'found':'hidden');g.appendChild(c);}}
function revealCard(p){const c=document.getElementById('card-'+p.id);if(!c)return;c.className='team-card found';c.innerHTML=cardInner(p,'found');}
function revealAllMissed(){for(const p of PLAYERS){if(!found.has(p.id)){const c=document.getElementById('card-'+p.id);if(!c)continue;c.className='team-card revealed';c.innerHTML=cardInner(p,'revealed');}}}
function updateHUD(){document.getElementById('found-count').textContent=found.size;document.getElementById('remain-count').textContent=TOTAL-found.size;document.getElementById('prog-bar').style.width=(found.size/TOTAL*100)+'%';const m=Math.floor(secsLeft/60),s=secsLeft%60,el=document.getElementById('timer-display');el.textContent=m+':'+String(s).padStart(2,'0');el.className='stat-val'+(secsLeft<=30?' urgent':'');}
function hideSuggestions(){document.getElementById('suggestions').style.display='none';}
function showSuggestions(matches){const box=document.getElementById('suggestions');if(!matches.length){hideSuggestions();return;}box.innerHTML='<div class="suggestion-label">Did you mean…</div>';matches.forEach(p=>{const item=document.createElement('div');item.className='suggestion-item';item.innerHTML=`<span>${p.name}</span><span class="sug-badge">${fmt(p.goals)} goals</span>`;item.onmousedown=ev=>{ev.preventDefault();acceptSuggestion(p);};box.appendChild(item);});box.style.display='block';}
function acceptSuggestion(p){hideSuggestions();document.getElementById('guess-input').value='';if(!found.has(p.id)&&gameActive){found.add(p.id);revealCard(p);updateHUD();checkWin();}}
function startTimer(){clearInterval(timer);timer=setInterval(()=>{secsLeft--;updateHUD();if(secsLeft<=0){clearInterval(timer);timeUp();}},1000);}

function giveUp(){
  if(!gameActive)return;
  clearInterval(timerInterval);
  const btn=document.getElementById('give-up-btn');
  if(btn)btn.style.display='none';
  timeUp();
}
function timeUp(){gameActive=false;document.getElementById('guess-input').disabled=true;hideSuggestions();revealAllMissed();showModal(false);}
function checkWin(){if(found.size===TOTAL){clearInterval(timer);gameActive=false;document.getElementById('guess-input').disabled=true;showModal(true);}}
function showModal(won){const elapsed=TOTAL_SECS-secsLeft,mins=Math.floor(elapsed/60),secs=elapsed%60,timeStr=mins>0?mins+' minute'+(mins!==1?'s':'')+' and '+secs+' second'+(secs!==1?'s':''):secs+' second'+(secs!==1?'s':''),modal=document.getElementById('modal');modal.className='modal '+(won?'win':'lose');document.getElementById('modal-icon').textContent=won?'🎉':'⏰';document.getElementById('modal-title').textContent=won?'Quiz Complete!':"Time's Up!";document.getElementById('modal-score').textContent=found.size+' / '+TOTAL+' found';document.getElementById('modal-msg').innerHTML=won?'Congratulations — you completed the quiz in <strong>'+timeStr+'</strong>!<br>You named all 12 members of the AFL/VFL 800-goal club!':'Better luck next time!<br>You found <strong>'+found.size+'</strong> of '+TOTAL+' players. Missing names are shown in <span style="color:var(--red)">red</span>.';document.getElementById('modal-backdrop').classList.add('show');}
function closeModal(){document.getElementById('modal-backdrop').classList.remove('show');}
function resetQuiz(){closeModal();clearInterval(timer);found.clear();secsLeft=TOTAL_SECS;gameActive=true;document.getElementById('guess-input').disabled=false;document.getElementById('guess-input').value='';hideSuggestions();renderGrid();updateHUD();startTimer();document.getElementById('guess-input').focus();}

const inputEl=document.getElementById('guess-input');
inputEl.addEventListener('keydown',e=>{if(e.key==='Enter'){const val=inputEl.value.trim();if(!val||!gameActive)return;hideSuggestions();let matched=null;for(const p of PLAYERS){if(!found.has(p.id)&&isExactMatch(val,p)){matched=p;break;}}if(matched){found.add(matched.id);revealCard(matched);inputEl.value='';updateHUD();checkWin();}else{const sugs=getFuzzySuggestions(val);if(sugs.length)showSuggestions(sugs);else{inputEl.style.borderColor='var(--red)';setTimeout(()=>inputEl.style.borderColor='',600);}}}else if(e.key==='Escape')hideSuggestions();});
inputEl.addEventListener('input',()=>{hideSuggestions();});
document.addEventListener('click',e=>{if(!e.target.closest('.input-wrap'))hideSuggestions();});
renderGrid();updateHUD();gameActive=true;startTimer();
</script>
