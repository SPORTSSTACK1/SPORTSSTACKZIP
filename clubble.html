.page{max-width:700px;margin:0 auto;padding:24px 16px 56px}

.dot{width:9px;height:9px;border-radius:50%}
.col-hdr{font:700 9px/1.2 'Sora',sans-serif;color:var(--mute-2);text-align:center;padding:2px 0;text-transform:uppercase;letter-spacing:.1em}

/* Signature: the evidence board — every guess is a row of verdicts */
.tile{border-radius:var(--radius);padding:7px 4px;text-align:center;min-height:56px;display:flex;flex-direction:column;align-items:center;justify-content:center;border:1px solid var(--line-2);background:var(--surface2);transition:background .3s,border-color .3s,transform .2s}
.tile .tv{font:600 11px/1.3 'Sora',sans-serif;color:var(--ink)}
.tile .ti{font-family:'Fraunces',Georgia,serif;font-style:italic;font-size:10.5px;color:var(--mute);margin-top:2px;line-height:1.2}
.tile.g{background:var(--green-bg);border-color:var(--green-border)}.tile.g .tv{color:#86EFAC}.tile.g .ti{color:#4ADE80}
.tile.a{background:var(--amber-bg);border-color:var(--amber-border)}.tile.a .tv{color:#FCD34D}.tile.a .ti{color:#FBBF24}
.tile.gr{background:var(--grey-bg);border-color:var(--grey-border)}.tile.gr .tv{color:#9CA9C4}.tile.gr .ti{color:#7B8AA8}
.tile.empty{background:transparent;border:1px dashed var(--line-2)}
.tile.flip{animation:tileIn .4s cubic-bezier(.34,1.4,.64,1) both}
@keyframes tileIn{from{transform:scale(.92);opacity:.4}to{transform:scale(1);opacity:1}}
.clr-dots{display:flex;gap:3px;justify-content:center;margin-top:2px}
.clr-dot{width:8px;height:8px;border-radius:50%;border:.5px solid rgba(255,255,255,.12)}

.input-area{margin-top:14px;display:flex;gap:8px;position:relative}

.input-area input:focus{border-color:var(--gold)}
.input-area input::placeholder{color:var(--mute-2)}
.dropdown{position:absolute;top:100%;left:0;right:80px;background:var(--surface2);border:1px solid var(--line-2);border-radius:var(--radius);z-index:99;max-height:260px;overflow-y:auto;margin-top:4px;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.dd-item{padding:10px 14px;font:500 14px/1.3 'Sora',sans-serif;color:var(--ink);cursor:pointer;border-bottom:1px solid var(--line)}
.dd-item:last-child{border-bottom:none}
.dd-item:hover,.dd-item.hl{background:var(--surface3);color:var(--gold)}
.dd-meta{font-family:'Fraunces',Georgia,serif;font-style:italic;font-size:11px;color:var(--mute);margin-top:2px}

.btn:hover{background:#FCE28A}
.result-banner{border-radius:var(--radius-lg);padding:24px 22px;text-align:left;margin-top:16px;background:var(--surface);border:1px solid var(--line-2);border-top:3px solid var(--green)}
.result-banner.fail{border-top-color:var(--red)}

function getDayIndex(){
  const epoch=new Date('2026-01-01');
  return Math.floor((new Date()-epoch)/86400000)%ALL_TEAMS.length;
}
const TARGET=ALL_TEAMS[getDayIndex()];
const MAX=8;
var doneRestoring=false;
let attempts=0,done=false,guesses=[],ddHighlight=-1,ddItems=[];

function normalise(s){
  return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9\s]/g,'').trim();
}
function findTeam(val){
  const nv=normalise(val);
  return ALL_TEAMS.find(t=>normalise(t.name)===nv||t.aliases.some(a=>normalise(a)===nv))
    ||ALL_TEAMS.find(t=>normalise(t.name).includes(nv)||t.aliases.some(a=>normalise(a).includes(nv)));
}

function scoreGuess(g){
  const t=TARGET;
  const allColorsMatch=(a,b)=>a.colors.every(c=>b.colors.includes(c))&&b.colors.every(c=>a.colors.includes(c));
  const colorOverlap=(a,b)=>a.colors.some(c=>b.colors.includes(c));
  return{
    sport:    g.sport===t.sport?'g':'gr',
    // Green = same country · Amber = same continent, different country · Grey = different continent
    location: g.country===t.country?'g':(g.continent===t.continent?'a':'gr'),
    league:   (()=>{
      // NFL: division match = green, same conference = amber, diff conference = grey
      if(g.sport==='American Football' && g.division && t.division){
        if(g.division===t.division) return 'g';
        const gc=g.division.split(' ')[0], tc=t.division.split(' ')[0];
        return gc===tc ? 'a' : 'gr';
      }
      return g.league===t.league?'g':(g.country===t.country?'a':'gr');
    })(),
    titles:   g.titles===t.titles?'g':(Math.abs(g.titles-t.titles)<=2?'a':'gr'),
    colors:   allColorsMatch(g,t)?'g':(colorOverlap(g,t)?'a':'gr'),
  };
}

function cssColor(n){
  const m={
    red:'#dc2626','sky blue':'#38bdf8',blue:'#2563eb',navy:'#1e3a5f','midnight green':'#064e3b',
    white:'#d1d5db',black:'#374151',gold:'#ca8a04',purple:'#7c3aed',green:'#16a34a',
    silver:'#9ca3af',teal:'#0d9488',yellow:'#ca8a04',orange:'#ea580c',brown:'#78350f',
    claret:'#9b1b30',maroon:'#7f1d1d',grey:'#9ca3af',aqua:'#06b6d4',burgundy:'#7f1d1d',
    pewter:'#6b7280','powder blue':'#7dd3fc','light blue':'#7dd3fc',cream:'#fef9c3',
    wine:'#4c1d35',lime:'#65a30d',
  };
  return m[n.toLowerCase()]||'#6b7280';
}

function renderRows(){
  const c=document.getElementById('rows');c.innerHTML='';
  for(let i=0;i<MAX;i++){
    const wrap=document.createElement('div');
    wrap.style.cssText='display:grid;grid-template-columns:28px repeat(5,1fr);gap:4px;margin-bottom:2px';
    const lbl=document.createElement('div');
    lbl.style.cssText='font-size:11px;color:var(--text-muted);text-align:right;padding-right:4px;display:flex;align-items:center;justify-content:flex-end;font-family:"Barlow Condensed",sans-serif;font-weight:700';
    lbl.textContent=i+1;wrap.appendChild(lbl);if(typeof isNew!=='undefined'&&isNew){}
    if(i<guesses.length){
      const g=guesses[i],s=scoreGuess(g);const isNew=(i===guesses.length-1&&!doneRestoring);
      [{cat:'sport',val:g.sport,sub:''},{cat:'location',val:g.country,sub:g.continent},
       {cat:'league',val:(g.division||g.league),sub:(g.division?'NFL':'')},{cat:'titles',val:g.titles,sub:'titles'},
       {cat:'colors',val:'',sub:g.colors.join(', ')}].forEach(def=>{
        const tile=document.createElement('div');tile.className='tile '+s[def.cat];
        if(def.cat==='colors'){
          const dots=document.createElement('div');dots.className='clr-dots';
          g.colors.forEach(col=>{const d=document.createElement('span');d.className='clr-dot';d.style.background=cssColor(col);dots.appendChild(d);});
          tile.appendChild(dots);
          const ti=document.createElement('div');ti.className='ti';ti.textContent=g.colors.join(', ');tile.appendChild(ti);
        } else {
          const tv=document.createElement('div');tv.className='tv';tv.textContent=def.val;tile.appendChild(tv);
          if(def.sub){const ti=document.createElement('div');ti.className='ti';ti.textContent=def.sub;tile.appendChild(ti);}
        }
        wrap.appendChild(tile);
      });
      c.appendChild(wrap);
      const nr=document.createElement('div');
      nr.style.cssText='display:grid;grid-template-columns:28px 1fr;gap:4px;margin-bottom:6px';
      nr.innerHTML='<div></div><div style="font-size:11px;color:var(--text-muted);padding-left:2px;font-style:italic">'+g.name+'</div>';
      c.appendChild(nr);
    } else {
      for(let j=0;j<5;j++){const t=document.createElement('div');t.className='tile empty';wrap.appendChild(t);}
      c.appendChild(wrap);
    }
  }
}

function getFiltered(q){
  if(!q||q.length<2)return[];
  const nq=normalise(q);
  return ALL_TEAMS.filter(t=>normalise(t.name).includes(nq)||t.aliases.some(a=>normalise(a).includes(nq))).slice(0,10);
}

const input=document.getElementById('guess-input'),dd=document.getElementById('dropdown');
function renderDD(items,hl=-1){
  ddItems=items;
  if(!items.length){dd.style.display='none';return;}
  dd.innerHTML='';
  items.forEach((t,i)=>{
    const item=document.createElement('div');
    item.className='dd-item'+(i===hl?' hl':'');
    item.innerHTML='<div>'+t.name+'</div><div class="dd-meta">'+t.sport+' · '+t.country+' · '+t.league+'</div>';
    item.onmousedown=e=>{e.preventDefault();input.value=t.name;dd.style.display='none';ddHighlight=-1;input.focus();};
    dd.appendChild(item);
  });
  dd.style.display='block';
}
input.addEventListener('input',()=>{ddHighlight=-1;renderDD(getFiltered(input.value));});
input.addEventListener('keydown',e=>{
  if(e.key==='ArrowDown'){e.preventDefault();ddHighlight=Math.min(ddHighlight+1,ddItems.length-1);renderDD(ddItems,ddHighlight);}
  else if(e.key==='ArrowUp'){e.preventDefault();ddHighlight=Math.max(ddHighlight-1,0);renderDD(ddItems,ddHighlight);}
  else if(e.key==='Enter'){ddHighlight>=0&&ddItems[ddHighlight]?(input.value=ddItems[ddHighlight].name,dd.style.display='none',ddHighlight=-1):submitGuess();}
  else if(e.key==='Escape')dd.style.display='none';
});
document.addEventListener('click',e=>{if(!e.target.closest('.input-area'))dd.style.display='none';});

function submitGuess(){
  if(done)return;
  const val=input.value.trim();
  if(!val){document.getElementById('msg').textContent='Type a team name first.';return;}
  const team=findTeam(val);
  if(!team){document.getElementById('msg').textContent='"'+val+'" not found — pick from the dropdown or try a different spelling.';return;}
  if(guesses.find(g=>g.name===team.name)){document.getElementById('msg').textContent='Already guessed '+team.name+'!';return;}
  document.getElementById('msg').textContent='';
  guesses.push(team);attempts++;
  renderRows();
  document.getElementById('att-badge').textContent=(MAX-attempts)+' attempt'+(MAX-attempts!==1?'s':'')+' remaining';
  input.value='';dd.style.display='none';
  if(team.name===TARGET.name){done=true;showResult(true);}
  else if(attempts>=MAX){done=true;showResult(false);}
}


function ymdC(d){ return d.toISOString().slice(0,10); }
function updateStreakC(){
  try{
    var today = ymdC(new Date());
    var last = localStorage.getItem('clubble-streak-last');
    var cur = parseInt(localStorage.getItem('clubble-streak-count')||'0',10) || 0;
    if(last === today) return getStreakC();
    var y = new Date(); y.setDate(y.getDate()-1);
    cur = (last === ymdC(y)) ? cur + 1 : 1;
    localStorage.setItem('clubble-streak-count', String(cur));
    localStorage.setItem('clubble-streak-last', today);
    return cur;
  }catch(e){ return 0; }
}
function getStreakC(){
  try{
    var last = localStorage.getItem('clubble-streak-last');
    if(!last) return 0;
    var today = ymdC(new Date());
    var y = new Date(); y.setDate(y.getDate()-1);
    if(last === today || last === ymdC(y)) return parseInt(localStorage.getItem('clubble-streak-count')||'0',10)||0;
    return 0;
  }catch(e){ return 0; }
}

function showResult(won){
  document.getElementById('input-area').style.display='none';
  document.getElementById('att-badge').style.display='none';

  try{
    localStorage.setItem('clubble-daily-'+ymdC(new Date()),
      JSON.stringify({won:won, names:guesses.map(g=>g.name)}));
  }catch(e){}
  var st = updateStreakC();
  var streakLine = st>1 ? '\uD83D\uDD25 '+st+'-day streak. Come back tomorrow to keep it alive.'
                        : 'A new club tomorrow.';

  const r=document.getElementById('result');
  const attLine = won
    ? (attempts===1 ? 'First guess. Absurd.' : 'Solved in '+attempts+' guesses.')
    : 'Eight guesses, no dice.';
  r.innerHTML='<div class="result-banner '+(won?'win':'fail')+'">'
    +'<div class="rb-kicker">'+(won?'Solved':'Not today')+' \u00B7 Clubble</div>'
    +'<div class="rb-title">'+TARGET.name+'</div>'
    +'<div class="rb-sub">'+TARGET.sport+' \u00B7 '+TARGET.country+' \u00B7 '+attLine+'</div>'
    +'<div class="rb-streak">'+streakLine+'</div>'
    +'<button class="share-btn" onclick="copyShare()">Copy my grid</button></div>';

  var clubbleScore = won ? (MAX - attempts + 1) : 0;
  if(typeof saveResult==='function') saveResult('clubble', 'Clubble', clubbleScore, MAX, won);
}

function copyShare(){
  const e={g:'\uD83D\uDFE9',a:'\uD83D\uDFE8',gr:'\u2B1C'};
  const cats=['sport','location','league','titles','colors'];
  const won = done&&guesses.length&&guesses[guesses.length-1].name===TARGET.name;
  let txt='Clubble \u2014 Daily '+ymdC(new Date())+'\n'+(won?attempts:'X')+'/'+MAX+'\n\n';
  guesses.forEach(g=>{const sc=scoreGuess(g);txt+=cats.map(c=>e[sc[c]]).join('')+'\n';});
  const st=getStreakC();
  if(st>1) txt+='\n\uD83D\uDD25 '+st+' day streak';
  txt+='\n\nPlay: sportsstack.com.au/clubble.html';
  const b=document.querySelector('.share-btn');
  const okFn=()=>{ if(b){const o=b.textContent;b.textContent='Copied \u2713';setTimeout(()=>b.textContent=o,2000);} };
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(okFn).catch(()=>{ if(navigator.share) navigator.share({text:txt}).catch(()=>{}); });
  } else if(navigator.share){ navigator.share({text:txt}).catch(()=>{}); }
}

renderRows();

// Already played today? Restore the finished board.
(function(){
  try{
    var saved = localStorage.getItem('clubble-daily-'+ymdC(new Date()));
    if(!saved) return;
    var r = JSON.parse(saved);
    (r.names||[]).forEach(function(n){
      var t = ALL_TEAMS.find(function(x){ return x.name === n; });
      if(t){ guesses.push(t); attempts++; }
    });
    done = true;
    renderRows();
    showResultRestored(r.won);
  }catch(e){}
})();

function showResultRestored(won){
  document.getElementById('input-area').style.display='none';
  document.getElementById('att-badge').style.display='none';
  var st = getStreakC();
  var streakLine = st>1 ? '\uD83D\uDD25 '+st+'-day streak. Come back tomorrow to keep it alive.' : 'A new club tomorrow.';
  const r=document.getElementById('result');
  r.innerHTML='<div class="result-banner '+(won?'win':'fail')+'">'
    +'<div class="rb-kicker">Already played today \u00B7 Clubble</div>'
    +'<div class="rb-title">'+TARGET.name+'</div>'
    +'<div class="rb-sub">'+TARGET.sport+' \u00B7 '+TARGET.country+' \u00B7 '+(won?('Solved in '+attempts):'Not solved')+'</div>'
    +'<div class="rb-streak">'+streakLine+'</div>'
    +'<button class="share-btn" onclick="copyShare()">Copy my grid</button></div>';
}
</script>
