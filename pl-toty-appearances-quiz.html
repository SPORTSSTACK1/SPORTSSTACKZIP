<style>
:root{
  --bg:#04080f;--surface:#080f1c;--surface2:#0d1829;--surface3:#122035;
  --gold:#f5c842;--blue:#2563eb;--blue-light:#3b82f6;
  --green:#22c55e;--green-bg:rgba(34,197,94,.09);--green-border:rgba(34,197,94,.45);
  --red:#ef4444;--red-bg:rgba(239,68,68,.07);--red-border:rgba(239,68,68,.4);
  --text:#e8f0fe;--text-muted:#6b8abf;--text-dim:#1e3355;
  --border:#0d2040;--border-bright:#1a3a6a;--radius:10px;--radius-lg:16px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif}
.page{max-width:960px;margin:0 auto;padding:22px 14px 56px}
.site-header{text-align:center;padding-bottom:16px;border-bottom:1px solid var(--border);margin-bottom:18px}
.game-title{font-family:'Barlow Condensed',sans-serif;font-size:clamp(18px,4vw,34px);font-weight:900;letter-spacing:.04em;text-transform:uppercase;line-height:1.1}
.game-title .hl{color:var(--gold)}
.game-subtitle{font-size:12px;color:var(--text-muted);letter-spacing:.1em;text-transform:uppercase;margin-top:5px}
.stats-bar{display:flex;align-items:center;justify-content:space-between;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:11px 20px;margin-bottom:16px;gap:10px;flex-wrap:wrap}
.stat-item{text-align:center;flex:1;min-width:72px}
.stat-val{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:900;line-height:1;color:var(--gold)}
.stat-val.urgent{color:var(--red);animation:pulse .8s infinite}
.stat-val.green{color:var(--green)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.stat-label{font-size:10px;color:var(--text-muted);letter-spacing:.1em;text-transform:uppercase;margin-top:3px}
.stat-divider{width:1px;height:38px;background:var(--border-bright);flex-shrink:0}
.prog-wrap{height:4px;background:rgba(255,255,255,.06);border-radius:99px;margin-bottom:16px;overflow:hidden}
.prog-bar{height:100%;background:linear-gradient(90deg,var(--blue-light),var(--gold));border-radius:99px;transition:width .4s ease}
.input-wrap{position:relative;margin-bottom:16px}
.guess-input{width:100%;font-size:16px;padding:13px 18px;border:1.5px solid var(--border-bright);border-radius:var(--radius);background:var(--surface2);color:var(--text);outline:none;font-family:'Barlow',sans-serif;transition:border-color .15s}
.guess-input:focus{border-color:var(--blue-light);box-shadow:0 0 0 3px rgba(59,130,246,.1)}
.guess-input::placeholder{color:var(--text-dim)}
.guess-input:disabled{opacity:.4;cursor:not-allowed}
.btn-give-up{display:block;margin:0 auto 14px;padding:8px 20px;border-radius:50px;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;border:1.5px solid var(--border-bright);background:transparent;color:var(--text-muted);transition:all .2s}
.btn-give-up:hover{border-color:var(--red);color:var(--red)}
.team-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:9px}
@media(max-width:640px){.team-grid{grid-template-columns:repeat(3,1fr);gap:7px}}
@media(max-width:400px){.team-grid{grid-template-columns:repeat(2,1fr);gap:6px}}
.team-card{aspect-ratio:1/1;border-radius:var(--radius);border:1.5px solid var(--border-bright);background:var(--surface2);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:8px 6px;transition:all .35s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden;cursor:default}
.team-card::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(59,130,246,.06),transparent 70%);pointer-events:none}
.card-trophy{font-size:clamp(14px,2.5vw,20px);margin-bottom:2px;opacity:.35}
.card-year{font-family:'Barlow Condensed',sans-serif;font-size:clamp(11px,1.8vw,15px);font-weight:900;color:var(--gold);letter-spacing:.04em;margin-bottom:4px}
.card-dots{display:flex;gap:4px;justify-content:center;margin-top:2px}
.card-dot{width:5px;height:5px;border-radius:50%;background:var(--border-bright)}
.team-card.found{background:var(--green-bg);border-color:var(--green-border);box-shadow:0 0 16px rgba(34,197,94,.12)}
.team-card.found::before{background:radial-gradient(ellipse at 50% 0%,rgba(34,197,94,.08),transparent 70%)}
.card-trophy-found{font-size:clamp(14px,2.5vw,20px);margin-bottom:2px}
.card-year-found{font-family:'Barlow Condensed',sans-serif;font-size:clamp(10px,1.6vw,13px);font-weight:900;color:var(--gold);letter-spacing:.04em;margin-bottom:2px}
.card-name-found{font-family:'Barlow Condensed',sans-serif;font-size:clamp(11px,1.8vw,15px);font-weight:900;color:var(--green);letter-spacing:.02em;line-height:1.1}
.card-detail-found{font-size:clamp(8px,1.3vw,11px);color:var(--text-muted);margin-top:2px}
.team-card.revealed{background:var(--red-bg);border-color:var(--red-border)}
.card-year-revealed{font-family:'Barlow Condensed',sans-serif;font-size:clamp(10px,1.6vw,13px);font-weight:900;color:var(--gold);letter-spacing:.04em;margin-bottom:2px}
.card-name-revealed{font-family:'Barlow Condensed',sans-serif;font-size:clamp(11px,1.8vw,15px);font-weight:900;color:var(--red);letter-spacing:.02em;line-height:1.1}
.card-detail-revealed{font-size:clamp(8px,1.3vw,11px);color:var(--text-muted);margin-top:2px}
.result-area{margin-top:20px}
.result-card{border-radius:var(--radius-lg);padding:22px 20px;text-align:center;border:1px solid}
.result-card.win{border-color:var(--green-border);background:var(--green-bg)}
.result-card.lose{border-color:var(--red-border);background:var(--red-bg)}
.result-icon{font-size:36px;margin-bottom:8px}
.result-title{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:900;letter-spacing:.04em;text-transform:uppercase;margin-bottom:6px}
.result-card.win .result-title{color:#86efac}
.result-card.lose .result-title{color:#fca5a5}
.result-sub{font-size:14px;color:var(--text-muted);margin-bottom:14px}
.share-btn{display:inline-block;margin-top:10px;padding:10px 24px;border-radius:50px;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;border:1.5px solid var(--border-bright);background:transparent;color:var(--text);transition:all .2s}
.share-btn:hover{background:rgba(255,255,255,.06)}
nav{position:sticky;top:0;z-index:1000;background:rgba(4,8,15,.95);backdrop-filter:blur(12px);border-bottom:1px solid rgba(13,32,64,.8);padding:0 16px;display:flex;align-items:center;height:52px;gap:10px}
.btn-lb{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--text);text-decoration:none;padding:6px 14px;border:1px solid var(--border-bright);border-radius:8px;transition:all .2s}
.btn-lb:hover{border-color:var(--gold);color:var(--gold)}
</style>

<body>
<nav>
  <a href="index.html" style="text-decoration:none;display:block;flex-shrink:0" aria-label="SportsStack home">
    <img src="logo.png" alt="SportsStack" width="48" height="48" style="display:block;border-radius:8px"/>
  </a>
  <div style="display:flex;align-items:center;gap:8px">
    <a href="leaderboard.html" class="btn-lb">Leaderboard</a>
    <div id="ss-member-widget"></div>
  </div>
</nav>
<div class="page">
  <header class="site-header">
    <div class="game-title">PL <span class="hl">TOTY Most Appearances</span></div>
    <div class="game-subtitle">Name every player with 4+ PL Team of the Year selections · 15 players · 4 minutes</div>
  </header>
  <div class="stats-bar">
    <div class="stat-item"><div class="stat-val" id="val-found">0</div><div class="stat-label">Found</div></div>
    <div class="stat-divider"></div>
    <div class="stat-item"><div class="stat-val" id="val-remain">15</div><div class="stat-label">Remaining</div></div>
    <div class="stat-divider"></div>
    <div class="stat-item"><div class="stat-val" id="val-timer">4:00</div><div class="stat-label">Time left</div></div>
  </div>
  <div class="prog-wrap"><div class="prog-bar" id="prog-bar" style="width:0%"></div></div>
  <div class="input-wrap">
    <input class="guess-input" id="guess-input" type="text" placeholder="Type a player name…" autocomplete="off" spellcheck="false"/>
  </div>
  <button class="btn-give-up" id="give-up-btn" onclick="giveUp()">Give Up &amp; Reveal</button>
  <div class="team-grid" id="team-grid"></div>
  <div class="result-area" id="result-area"></div>
</div>
<script>
const ENTRIES = [
  {id:1,  year:"8× TOTY", name:"Steven Gerrard",     accepted:["gerrard","steven gerrard"],              pos:"Midfielder", club:"Liverpool"},
  {id:2,  year:"6× TOTY", name:"Thierry Henry",       accepted:["henry","thierry henry"],                 pos:"Forward",    club:"Arsenal"},
  {id:3,  year:"6× TOTY", name:"Alan Shearer",        accepted:["shearer","alan shearer"],                pos:"Forward",    club:"Newcastle / Blackburn"},
  {id:4,  year:"6× TOTY", name:"Ryan Giggs",          accepted:["giggs","ryan giggs"],                    pos:"Midfielder", club:"Man Utd"},
  {id:5,  year:"6× TOTY", name:"Patrick Vieira",      accepted:["vieira","patrick vieira"],               pos:"Midfielder", club:"Arsenal"},
  {id:6,  year:"6× TOTY", name:"Rio Ferdinand",       accepted:["ferdinand","rio ferdinand"],             pos:"Defender",   club:"Man Utd"},
  {id:7,  year:"5× TOTY", name:"David De Gea",        accepted:["de gea","david de gea","degea"],         pos:"Goalkeeper", club:"Man Utd"},
  {id:8,  year:"5× TOTY", name:"Harry Kane",          accepted:["kane","harry kane"],                     pos:"Forward",    club:"Tottenham"},
  {id:9,  year:"5× TOTY", name:"Gary Neville",        accepted:["neville","gary neville"],                pos:"Defender",   club:"Man Utd"},
  {id:10, year:"5× TOTY", name:"Cristiano Ronaldo",   accepted:["ronaldo","cristiano ronaldo","cr7"],     pos:"Forward",    club:"Man Utd"},
  {id:11, year:"4× TOTY", name:"Eden Hazard",         accepted:["hazard","eden hazard"],                  pos:"Forward",    club:"Chelsea"},
  {id:12, year:"4× TOTY", name:"David Beckham",       accepted:["beckham","david beckham"],               pos:"Midfielder", club:"Man Utd"},
  {id:13, year:"4× TOTY", name:"Gary Pallister",      accepted:["pallister","gary pallister"],            pos:"Defender",   club:"Man Utd / Middlesbrough"},
  {id:14, year:"4× TOTY", name:"John Terry",          accepted:["terry","john terry"],                    pos:"Defender",   club:"Chelsea"},
  {id:15, year:"4× TOTY", name:"Nemanja Vidić",       accepted:["vidic","nemanja vidic","vidić"],         pos:"Defender",   club:"Man Utd"},
];

const TOTAL = ENTRIES.length, TOTAL_SECS = 240;
let secsLeft = TOTAL_SECS, timerInterval = null, gameActive = false;
let foundIds = new Set(), done = false;

function norm(s){return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9\s]/g,'').trim();}

function cardInner(e, state){
  if(state==='found'){
    return `<div class="card-trophy-found">⭐</div>
      <div class="card-year-found">${e.year}</div>
      <div class="card-name-found">${e.name}</div>
      <div class="card-detail-found">${e.pos}</div>`;
  }
  if(state==='revealed'){
    return `<div class="card-trophy" style="opacity:.22">⭐</div>
      <div class="card-year-revealed">${e.year}</div>
      <div class="card-name-revealed">${e.name}</div>
      <div class="card-detail-revealed">${e.pos}</div>`;
  }
  return `<div class="card-trophy">⭐</div>
    <div class="card-year">${e.year}</div>
    <div class="card-dots"><span class="card-dot"></span><span class="card-dot"></span><span class="card-dot"></span></div>`;
}

function renderGrid(){
  const grid = document.getElementById('team-grid');
  grid.innerHTML = '';
  for(const e of ENTRIES){
    const isFound = foundIds.has(e.id);
    const card = document.createElement('div');
    card.className = 'team-card' + (isFound ? ' found' : '');
    card.id = 'card-' + e.id;
    card.innerHTML = cardInner(e, isFound ? 'found' : 'hidden');
    grid.appendChild(card);
  }
}

function revealCard(e){
  const card = document.getElementById('card-' + e.id);
  if(!card) return;
  card.className = 'team-card found';
  card.innerHTML = cardInner(e, 'found');
}

function revealAllMissed(){
  for(const e of ENTRIES){
    if(!foundIds.has(e.id)){
      const card = document.getElementById('card-' + e.id);
      if(!card) continue;
      card.className = 'team-card revealed';
      card.innerHTML = cardInner(e, 'revealed');
    }
  }
}

function updateHUD(){
  document.getElementById('val-found').textContent = foundIds.size;
  document.getElementById('val-remain').textContent = TOTAL - foundIds.size;
  const pct = Math.round(foundIds.size / TOTAL * 100);
  document.getElementById('prog-bar').style.width = pct + '%';
}

function tryGuess(val){
  if(!gameActive || !val.trim()) return;
  const nv = norm(val);
  for(const e of ENTRIES){
    if(foundIds.has(e.id)) continue;
    if(e.accepted.some(a => norm(a) === nv)){
      foundIds.add(e.id);
      revealCard(e);
      updateHUD();
      document.getElementById('guess-input').value = '';
      if(foundIds.size === TOTAL) timeUp(true);
      return;
    }
  }
}

function startTimer(){
  timerInterval = setInterval(()=>{
    secsLeft--;
    const m = Math.floor(secsLeft/60), s = secsLeft % 60;
    const timerEl = document.getElementById('val-timer');
    if(timerEl) timerEl.textContent = m + ':' + String(s).padStart(2,'0');
    if(secsLeft <= 30) timerEl && timerEl.classList.add('urgent');
    if(secsLeft <= 0){ clearInterval(timerInterval); timeUp(false); }
  }, 1000);
}

function giveUp(){
  if(!gameActive) return;
  clearInterval(timerInterval);
  const btn = document.getElementById('give-up-btn');
  if(btn) btn.style.display = 'none';
  timeUp(false);
}

function timeUp(won){
  gameActive = false;
  done = true;
  const input = document.getElementById('guess-input');
  if(input) input.disabled = true;
  const btn = document.getElementById('give-up-btn');
  if(btn) btn.style.display = 'none';
  if(!won) revealAllMissed();
  const area = document.getElementById('result-area');
  const perfect = foundIds.size === TOTAL;
  area.innerHTML = `<div class="result-card ${perfect ? 'win' : (won ? 'win' : 'lose')}">
    <div class="result-icon">${perfect ? '🏆' : (won ? '⭐' : '⏱')}</div>
    <div class="result-title">${perfect ? 'Perfect!' : (won ? 'Well Done!' : "Time's Up!")}</div>
    <div class="result-sub">${foundIds.size} / ${TOTAL} players named</div>
    <button class="share-btn" onclick="shareResult()">Share Score 📋</button>
  </div>`;
  if(typeof saveResult === 'function') saveResult('pl-toty-appearances','PL TOTY Most Appearances', foundIds.size, TOTAL, perfect);
}

function shareResult(){
  const pct = Math.round(foundIds.size/TOTAL*100);
  const bar = Array.from({length:10},(_,i)=>i<Math.round(pct/10)?'⭐':'⬛').join('');
  const txt = 'SportsStack — PL TOTY Most Appearances\n'+foundIds.size+' / '+TOTAL+' players ('+pct+'%)\n'+bar+'\nsportsstack.com.au/pl-toty-appearances-quiz.html';
  const btn = document.querySelector('.share-btn');
  if(navigator.share){
    navigator.share({text:txt}).catch(()=>{});
    if(btn){btn.textContent='Shared ✓';setTimeout(()=>btn.textContent='Share Score 📋',2000);}
  } else if(navigator.clipboard){
    navigator.clipboard.writeText(txt).then(()=>{
      if(btn){btn.textContent='Copied ✓';setTimeout(()=>btn.textContent='Share Score 📋',2000);}
    });
  }
}

renderGrid();
gameActive = true;
startTimer();

const input = document.getElementById('guess-input');
input.addEventListener('input', e => { if(gameActive) tryGuess(e.target.value); });
input.addEventListener('keydown', e => { if(e.key === 'Enter' && gameActive) tryGuess(e.target.value); });
</script>
<script src="sportstack-member.js?v=4"></script>
<script src="xp-system.js"></script>
</body>
