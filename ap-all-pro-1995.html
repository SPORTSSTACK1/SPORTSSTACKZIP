<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,700;0,800;0,900;1,900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-TL0NM71G5M"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-TL0NM71G5M');</script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#04080f;--surface:#080f1c;--s2:#0d1a2e;--border:#0d2040;--gold:#f5c842;--off:#3b82f6;--def:#ef4444;--text:#e8f0fe;--muted:#aebfd6;--green:#22c55e}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif}
body{display:flex;flex-direction:column;overflow-x:hidden}
nav{position:sticky;top:0;z-index:1000;display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--border);background:rgba(4,8,15,.95);backdrop-filter:blur(8px);flex-shrink:0}
.page{max-width:980px;margin:0 auto;width:100%;padding:18px 14px 18px}
.site-header{text-align:center;padding-bottom:14px}
.game-name{font-family:'Barlow Condensed',sans-serif;font-size:clamp(24px,5.5vw,36px);font-weight:900;font-style:italic;color:var(--gold);line-height:1.05}
.game-sub{font-size:13px;color:var(--muted);margin-top:4px}
.hud{display:flex;align-items:center;justify-content:center;gap:18px;padding:10px 0 16px;flex-wrap:wrap}
.hud-stat{text-align:center}
.hud-label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:700}
.hud-val{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:900;color:var(--text)}
#timer-val.warn{color:var(--def)}
.split{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.side-label{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px;text-align:center;padding:6px;border-radius:8px}
.side-label.off{color:var(--off);background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.3)}
.side-label.def{color:var(--def);background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3)}
.box-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:7px}
.player-box{position:relative;border-radius:9px;padding:9px 7px;min-height:78px;display:flex;flex-direction:column;justify-content:flex-end;cursor:pointer;border:2px solid transparent;transition:transform .12s,border-color .15s;text-align:center}
.player-box.off{background:linear-gradient(160deg,#0c2a52,#061528);border-color:rgba(59,130,246,.35)}
.player-box.def{background:linear-gradient(160deg,#4a0e0e,#220505);border-color:rgba(239,68,68,.35)}
.player-box:hover{transform:translateY(-2px)}
.player-box.found.off{border-color:var(--off)}
.player-box.found.def{border-color:var(--def)}
.pb-pos{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:800;letter-spacing:.06em;opacity:.75;margin-bottom:2px}
.pb-team{font-size:9.5px;color:var(--muted);line-height:1.2;margin-bottom:4px}
.pb-name{font-family:'Barlow Condensed',sans-serif;font-size:12.5px;font-weight:800;line-height:1.15;min-height:16px}
.pb-name.revealed{color:var(--text)}
@media(max-width:760px){
  .split{grid-template-columns:1fr;gap:20px}
}
@media(max-width:420px){
  .box-grid{gap:5px}
  .player-box{padding:6px 4px;min-height:68px}
  .pb-pos{font-size:9.5px} .pb-team{font-size:8px} .pb-name{font-size:10.5px}
}
.input-wrap{position:fixed;left:0;right:0;bottom:0;background:var(--surface);border-top:1px solid var(--border);padding:12px 14px calc(12px + env(safe-area-inset-bottom));display:flex;gap:8px;z-index:500}
#guess-input{flex:1;padding:12px 14px;background:var(--s2);border:1.5px solid var(--border);border-radius:9px;color:var(--text);font-size:16px;font-family:'Barlow',sans-serif}
#guess-input:focus{outline:none;border-color:var(--gold)}
.btn-give-up{padding:0 16px;background:var(--s2);border:1.5px solid var(--border);border-radius:9px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap}
.suggestions{position:fixed;left:14px;right:14px;bottom:64px;background:var(--s2);border:1px solid var(--border);border-radius:9px;padding:8px 12px;font-size:13px;color:var(--muted);z-index:499}
@media(min-width:700px){
  .page{padding-bottom:18px}
  .input-wrap{position:static;max-width:980px;margin:18px auto 0;border-top:none;border:1.5px solid var(--border);border-radius:12px;background:var(--surface)}
  .suggestions{position:static;max-width:980px;margin:8px auto 0;left:auto;right:auto}
}
.result{margin-top:16px}
.result-banner{text-align:center;padding:18px;border-radius:12px;background:var(--surface);border:1.5px solid var(--border)}
.result-banner.perfect{border-color:var(--gold)}
.result-icon{font-size:38px;margin-bottom:6px}
.result-title{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:900}
.result-sub{font-size:13px;color:var(--muted);margin-top:4px}
.save-status{text-align:center;font-size:12px;color:var(--muted);min-height:16px;margin-top:6px}
.save-status.ok{color:var(--green)}
</style>
</head>
<body>
<nav>
  <a href="index.html" style="text-decoration:none;display:block;flex-shrink:0">
    <img src="logo.png" alt="SportsStack" width="48" height="48" style="display:block;border-radius:8px"/>
  </a>
  <div style="display:flex;align-items:center;gap:8px">
    <a href="leaderboard.html" style="font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;padding:6px 12px;border-radius:6px;color:var(--text);background:var(--s2);border:1px solid var(--border);text-decoration:none">Leaderboard</a>
    <div id="ss-member-widget"></div>
  </div>
</nav>
<div class="page">
  <div class="site-header">
    <div class="game-name">1995 AP All-Pro First Team</div>
    <div class="game-sub">Name all 22 players on the 1995 AP All-Pro First Team — offense and defense · 5:00</div>
  </div>
  <div class="hud">
    <div class="hud-stat"><div class="hud-label">Found</div><div class="hud-val"><span id="found-count">0</span>/<span id="total-count">22</span></div></div>
    <div class="hud-stat"><div class="hud-label">Time</div><div class="hud-val" id="timer-val">5:00</div></div>
  </div>
  <div class="split">
    <div>
      <div class="side-label off">Offense</div>
      <div class="box-grid" id="off-grid"></div>
    </div>
    <div>
      <div class="side-label def">Defense</div>
      <div class="box-grid" id="def-grid"></div>
    </div>
  </div>
  <div class="result" id="result"></div>
</div>
<div class="input-wrap">
  <input id="guess-input" type="text" placeholder="Type a player name…" autocomplete="off"/>
  <button class="btn-give-up" onclick="giveUp()">Give Up</button>
</div>
<div class="suggestions" id="suggestions" style="display:none"></div>
<script>
const OFFENSE = [
  {uid:"o1",pos:"QB",name:"Brett Favre",team:"Green Bay Packers",aliases:["brett favre", "favre", "brett"]},
  {uid:"o2",pos:"RB",name:"Barry Sanders",team:"Detroit Lions",aliases:["barry sanders", "sanders", "barry"]},
  {uid:"o3",pos:"RB",name:"Emmitt Smith",team:"Dallas Cowboys",aliases:["emmitt smith", "smith", "emmitt"]},
  {uid:"o4",pos:"WR",name:"Herman Moore",team:"Detroit Lions",aliases:["herman moore", "moore", "herman"]},
  {uid:"o5",pos:"WR",name:"Jerry Rice",team:"San Francisco 49ers",aliases:["jerry rice", "rice", "jerry"]},
  {uid:"o6",pos:"TE",name:"Ben Coates",team:"New England Patriots",aliases:["ben coates", "coates", "ben"]},
  {uid:"o7",pos:"C",name:"Dermontti Dawson",team:"Pittsburgh Steelers",aliases:["dermontti dawson", "dawson", "dermontti"]},
  {uid:"o8",pos:"OT",name:"Lomas Brown",team:"Detroit Lions",aliases:["lomas brown", "brown", "lomas"]},
  {uid:"o9",pos:"OT",name:"Willie Roaf",team:"New Orleans Saints",aliases:["willie roaf", "roaf", "willie"]},
  {uid:"o10",pos:"OG",name:"Randall McDaniel",team:"Minnesota Vikings",aliases:["randall mcdaniel", "mcdaniel", "randall"]},
  {uid:"o11",pos:"OG",name:"Nate Newton",team:"Dallas Cowboys",aliases:["nate newton", "newton", "nate"]}
];
const DEFENSE = [
  {uid:"d1",pos:"DE",name:"Reggie White",team:"Green Bay Packers",aliases:["reggie white", "white", "reggie"]},
  {uid:"d2",pos:"DE",name:"Bruce Smith",team:"Buffalo Bills",aliases:["bruce smith", "smith", "bruce"]},
  {uid:"d3",pos:"DT",name:"Chester McGlockton",team:"Oakland Raiders",aliases:["chester mcglockton", "mcglockton", "chester"]},
  {uid:"d4",pos:"DT",name:"John Randle",team:"Minnesota Vikings",aliases:["john randle", "randle", "john"]},
  {uid:"d5",pos:"ILB",name:"Ken Norton",team:"San Francisco 49ers",aliases:["ken norton", "norton", "ken"]},
  {uid:"d6",pos:"OLB",name:"Greg Lloyd",team:"Pittsburgh Steelers",aliases:["greg lloyd", "lloyd", "greg"]},
  {uid:"d7",pos:"OLB",name:"Bryce Paup",team:"Buffalo Bills",aliases:["bryce paup", "paup", "bryce"]},
  {uid:"d8",pos:"CB",name:"Aeneas Williams",team:"Arizona Cardinals",aliases:["aeneas williams", "williams", "aeneas"]},
  {uid:"d9",pos:"CB",name:"Eric Davis",team:"San Francisco 49ers",aliases:["eric davis", "davis", "eric"]},
  {uid:"d10",pos:"S",name:"Merton Hanks",team:"San Francisco 49ers",aliases:["merton hanks", "hanks", "merton"]},
  {uid:"d11",pos:"S",name:"Darren Woodson",team:"Dallas Cowboys",aliases:["darren woodson", "woodson", "darren"]}
];
const ALL_PLAYERS = [...OFFENSE, ...DEFENSE];
const found = new Set();
let done=false, secondsLeft=300, timerInterval=null, finalScore=0;

function normalise(s){ return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9\s]/g,'').trim(); }

const NAME_SUFFIXES = new Set(['jr','sr','ii','iii','iv','v']);
function coreSurname(name){
  const parts = name.split(' ');
  const last = normalise(parts[parts.length-1]);
  if(parts.length>1 && NAME_SUFFIXES.has(last)) return normalise(parts[parts.length-2]);
  return last;
}
function matches(player, val){
  const nv = normalise(val); if(!nv) return false;
  const surname = coreSurname(player.name);
  return normalise(player.name) === nv || surname === nv || player.aliases.some(a => normalise(a) === nv);
}

function levenshtein(a, b){
  const m=a.length, n=b.length;
  const dp = Array.from({length:m+1},(_,i)=>Array.from({length:n+1},(_,j)=>j===0?i:i===0?j:0));
  for(let i=1;i<=m;i++) for(let j=1;j<=n;j++) dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[m][n];
}

function buildGrid(list, gridId, side){
  const grid = document.getElementById(gridId);
  grid.innerHTML = '';
  list.forEach(p=>{
    const box = document.createElement('div');
    box.className = 'player-box ' + side;
    box.id = 'box-' + p.uid;
    box.onclick = ()=>{ if(!found.has(p.uid)) document.getElementById('guess-input').focus(); };
    box.innerHTML =
      '<div class="pb-pos">' + p.pos + '</div>' +
      '<div class="pb-team">' + p.team + '</div>' +
      '<div class="pb-name" id="name-' + p.uid + '"></div>';
    grid.appendChild(box);
  });
}

function revealPlayer(p, isGuess){
  if(isGuess !== false) found.add(p.uid);
  const box = document.getElementById('box-'+p.uid);
  box.classList.add('found');
  document.getElementById('name-'+p.uid).textContent = p.name;
  document.getElementById('name-'+p.uid).classList.add('revealed');
  updateHUD();
  if(isGuess !== false && found.size === ALL_PLAYERS.length) endGame(false);
}

function updateHUD(){
  document.getElementById('found-count').textContent = found.size;
}

function handleGuess(){
  const input = document.getElementById('guess-input');
  const val = input.value.trim();
  if(!val || done) return;
  const hit = ALL_PLAYERS.find(p => !found.has(p.uid) && matches(p, val));
  if(hit){ revealPlayer(hit); input.value=''; hideSuggestions(); return; }
  const nv = normalise(val);
  let best=null, bestD=99;
  ALL_PLAYERS.forEach(p=>{
    if(found.has(p.uid)) return;
    const surname = coreSurname(p.name);
    const d = Math.min(levenshtein(nv, normalise(p.name)), levenshtein(nv, surname));
    if(d < bestD){ bestD=d; best=p; }
  });
  if(best && bestD<=2 && nv.length>=3){
    showSuggestion('Did you mean <b>'+best.name+'</b>? Press Enter again to confirm.');
    input.dataset.suggested = best.uid;
  } else {
    input.value='';
  }
}

function showSuggestion(html){
  const el = document.getElementById('suggestions');
  el.innerHTML = html; el.style.display='block';
}
function hideSuggestions(){
  const el = document.getElementById('suggestions');
  el.style.display='none'; el.innerHTML='';
}

document.getElementById('guess-input').addEventListener('keydown', e=>{
  if(e.key==='Enter'){
    const input = e.target;
    if(input.dataset.suggested){
      const p = ALL_PLAYERS.find(pp=>pp.uid===input.dataset.suggested);
      if(p && !found.has(p.uid)){ revealPlayer(p); input.value=''; hideSuggestions(); input.dataset.suggested=''; return; }
    }
    handleGuess();
  }
});

function giveUp(){
  if(done) return;
  finalScore = found.size;
  ALL_PLAYERS.forEach(p=>{ if(!found.has(p.uid)) revealPlayer(p, false); });
  endGame(true);
}

function startTimer(){
  timerInterval = setInterval(()=>{
    secondsLeft--;
    const m = Math.floor(secondsLeft/60), s = secondsLeft%60;
    const el = document.getElementById('timer-val');
    el.textContent = m+':'+String(s).padStart(2,'0');
    if(secondsLeft<=30) el.classList.add('warn');
    if(secondsLeft<=0){ clearInterval(timerInterval); giveUp(); }
  }, 1000);
}

function endGame(gaveUp){
  if(done) return;
  done = true;
  clearInterval(timerInterval);
  document.getElementById('guess-input').disabled = true;
  const r = document.getElementById('result');
  const score = gaveUp ? finalScore : found.size;
  const perfect = score === ALL_PLAYERS.length && !gaveUp;
  let icon, title, sub;
  if(perfect){ icon='🏆'; title='Perfect Score!'; sub='You named all '+ALL_PLAYERS.length+' players in the '+document.title.split(' – ')[0]+'!'; }
  else if(gaveUp){ icon='🏳️'; title='Gave Up'; sub='You found '+score+' / '+ALL_PLAYERS.length+' players before giving up — saved to your profile.'; }
  else { icon='🏈'; title='Nice Work'; sub='You found '+score+' / '+ALL_PLAYERS.length+' players.'; }
  const nextLinks = "<a class=\"next-link outline\" href=\"ap-all-pro-1994.html\">1994 AP All-Pro</a><a class=\"next-link\" href=\"ap-all-pro-1996.html\">1996 AP All-Pro</a>";
  r.innerHTML = '<div class="result-banner'+(perfect?' perfect':'')+'">'+
    '<div class="result-icon">'+icon+'</div>'+
    '<div class="result-title">'+title+'</div>'+
    '<div class="result-sub">'+sub+'</div>'+
    '<div class="save-status" id="save-status"></div>'+
    '<button class="share-btn" onclick="shareScore('+score+','+ALL_PLAYERS.length+')">Share Score 📋</button>'+
    '<div class="next-wrap"><div class="next-label">Play next</div>'+
    '<div class="next-links">'+nextLinks+'<a class="next-link outline" href="nfl.html">All NFL Quizzes</a></div></div>'+
  '</div>';
  if(typeof saveResult==='function') saveResult('ap-all-pro-1995','1995 AP All-Pro First Team', score, ALL_PLAYERS.length, perfect);
}

function shareScore(score, total){
  const pct = Math.round(score/total*100);
  const bar = Array.from({length:10},(_,i)=>i<Math.round(pct/10)?'🟨':'⬛').join('');
  const txt = 'SportsStack — 1995 AP All-Pro First Team\n'+score+' / '+total+' players ('+pct+'%)\n'+bar+'\nsportsstack.com.au/ap-all-pro-1995.html';
  const btn = document.querySelector('.share-btn');
  if(navigator.share){
    navigator.share({text:txt}).catch(()=>{});
    btn.textContent='Shared ✓';setTimeout(()=>btn.textContent='Share Score 📋',2000);
  } else if(navigator.clipboard){
    navigator.clipboard.writeText(txt).then(()=>{btn.textContent='Copied! ✔';setTimeout(()=>btn.textContent='Share Score 📋',2000);});
  } else {
    const ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();
    try{document.execCommand('copy');btn.textContent='Copied! ✔';setTimeout(()=>btn.textContent='Share Score 📋',2000);}
    catch(e){}
    document.body.removeChild(ta);
  }
}

function init(){
  buildGrid(OFFENSE, 'off-grid', 'off');
  buildGrid(DEFENSE, 'def-grid', 'def');
  updateHUD();
}
init();
startTimer();
</script>
<script src="sportstack-member.js?v=4"></script>
<script src="xp-system.js"></script>
</body>
</html>
