<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>F1 Calendar Circuits — SportsStack</title>
<link rel="icon" href="/favicon.ico"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,700;0,800;0,900;1,900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-TL0NM71G5M"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-TL0NM71G5M');</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="sportstack-member.js?v=4"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#04080f;--surface:#080f1c;--border:#0d2040;--border-bright:#1a3a6a;--gold:#f5c842;--green:#22c55e;--text:#e8f0fe;--text-muted:#7a9ab8;--text-dim:#4a6890;--red:#ef4444}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh}
nav{position:sticky;top:0;z-index:1000;display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border);background:rgba(4,8,15,.95);backdrop-filter:blur(8px)}
.site-header{max-width:680px;margin:0 auto;padding:32px 16px 20px;text-align:center}
.site-header h1{font-family:'Barlow Condensed',sans-serif;font-size:clamp(28px,6vw,44px);font-weight:900;font-style:italic;color:var(--gold);margin-bottom:6px}
.site-header .sub{font-size:14px;color:var(--text-muted);margin-bottom:16px}
.prog-wrap{max-width:400px;margin:0 auto 6px;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.prog-bar{height:100%;background:var(--gold);width:0%;transition:width .4s ease;border-radius:3px}
.prog-label{text-align:center;font-size:12px;font-weight:700;color:var(--text-muted);margin-bottom:24px;letter-spacing:.06em}

/* Input */
.input-area{max-width:480px;margin:0 auto 28px;padding:0 16px;display:flex;gap:8px}
.guess-input{flex:1;background:var(--surface);border:1.5px solid var(--border-bright);border-radius:10px;padding:13px 16px;color:var(--text);font-size:16px;font-family:'Barlow',sans-serif;outline:none;transition:border-color .15s}
.guess-input:focus{border-color:var(--gold)}
.guess-btn{padding:13px 20px;background:var(--gold);color:#04080f;border:none;border-radius:10px;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:900;letter-spacing:.06em;cursor:pointer;white-space:nowrap}
.guess-btn:hover{opacity:.9}

/* Toast */
.toast{text-align:center;height:22px;font-size:13px;font-weight:700;letter-spacing:.04em;margin-bottom:12px;transition:opacity .3s}
.toast.good{color:var(--green)}
.toast.bad{color:var(--red)}

/* Grid */
.players-grid{max-width:720px;margin:0 auto;padding:0 16px 60px;display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
@media(max-width:500px){.players-grid{grid-template-columns:repeat(2,1fr)}}

/* Cards */
.player-card{border-radius:12px;border:1.5px solid var(--border);background:var(--surface);padding:16px 12px;text-align:center;transition:all .3s;position:relative;min-height:90px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px}
.player-card.hidden{cursor:default}
.player-card.revealed{border-color:var(--card-color,var(--border-bright));background:rgba(0,0,0,.35)}
.player-card.revealed::before{content:'';position:absolute;inset:0;border-radius:10px;background:var(--card-color,transparent);opacity:.07;pointer-events:none}
.card-mystery{font-size:28px;margin-bottom:4px;filter:grayscale(1);opacity:.3}
.card-mystery-label{font-size:11px;color:#6b8abf;font-weight:700;letter-spacing:.1em;text-transform:uppercase}
.card-name{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:900;color:var(--text);line-height:1.1;margin-bottom:2px}
.card-count{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;color:var(--card-color,var(--gold))}
.card-count-label{font-size:10px;font-weight:700;color:var(--text-muted);letter-spacing:.1em;text-transform:uppercase}
.card-last{font-size:10px;color:#6b8abf;margin-top:2px}

/* Giveup */
.actions{text-align:center;margin:-12px 0 32px}
.btn-giveup{background:none;border:1.5px solid var(--border-bright);border-radius:8px;color:var(--text-muted);font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;padding:8px 20px;cursor:pointer}
.btn-giveup:hover{border-color:#3a6a9a;color:var(--text)}

/* Complete banner */
.complete-banner{max-width:480px;margin:0 auto 40px;padding:20px;background:rgba(34,197,94,.08);border:1.5px solid rgba(34,197,94,.35);border-radius:14px;text-align:center}
.complete-banner h2{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:900;color:var(--green);margin-bottom:4px}
.complete-banner p{font-size:14px;color:var(--text-muted)}
.timer-wrap{text-align:center;margin-bottom:14px}.timer{display:inline-flex;align-items:center;gap:6px;font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;letter-spacing:.08em;color:var(--text-muted);background:var(--surface);border:1.5px solid var(--border);border-radius:10px;padding:6px 18px;transition:color .3s,border-color .3s}.timer.warn{color:#f59e0b;border-color:#f59e0b}.timer.danger{color:var(--red);border-color:var(--red);animation:tick .5s infinite alternate}@keyframes tick{from{opacity:1}to{opacity:.6}}
</style>
</head>
<body>
<nav>
  <a href="index.html" style="text-decoration:none;display:block;flex-shrink:0" aria-label="SportsStack home">
    <img src="LOGO.jpeg" alt="SportsStack" width="48" height="48" style="display:block;border-radius:8px"/>
  </a>
  <div style="display:flex;align-items:center;gap:8px">
    <div id="ss-member-widget"></div>
  </div>
</nav>

<div class="site-header">
  <h1>F1 Calendar Circuits</h1>
  <p class="sub">Name all 24 circuits on the 2025 F1 calendar — type circuit, country or GP name — 24 circuits to find</p>
  <div class="prog-wrap"><div class="prog-bar" id="prog-bar"></div></div>
  <div class="prog-label" id="prog-label">0 / 24 revealed</div>
</div>

<div class="timer-wrap"><div class="timer" id="quiz-timer">⏱ 4:00</div></div>
<div class="input-area">
  <input class="guess-input" id="guess-input" type="text" placeholder="Type a player name..." autocomplete="off" autocorrect="off" spellcheck="false"/>
  <button class="guess-btn" onclick="submitGuess()">Guess</button>
</div>
<div class="toast" id="toast"></div>

<div class="actions">
  <button class="btn-giveup" id="btn-giveup" onclick="giveUp()">Give Up</button>
</div>

<div id="complete-banner" style="display:none" class="complete-banner">
  <h2>🏁 Complete!</h2>
  <p id="complete-msg"></p>
</div>

<div class="players-grid" id="grid"></div>

<script>const CIRCUITS = [
  {gp:"Australian GP",circuit:"Albert Park",loc:"Melbourne, Australia",accepted:["australian gp","albert park","melbourne","australia","australian"]},
  {gp:"Chinese GP",circuit:"Shanghai International",loc:"Shanghai, China",accepted:["chinese gp","shanghai international","shanghai","china","chinese"]},
  {gp:"Japanese GP",circuit:"Suzuka Circuit",loc:"Suzuka, Japan",accepted:["japanese gp","suzuka circuit","suzuka","japan","japanese"]},
  {gp:"Bahrain GP",circuit:"Bahrain International Circuit",loc:"Sakhir, Bahrain",accepted:["bahrain gp","bahrain international circuit","sakhir","bahrain"]},
  {gp:"Saudi Arabian GP",circuit:"Jeddah Corniche Circuit",loc:"Jeddah, Saudi Arabia",accepted:["saudi arabian gp","jeddah corniche circuit","jeddah","saudi","saudi arabia","saudi arabian"]},
  {gp:"Miami GP",circuit:"Miami International Autodrome",loc:"Miami, USA",accepted:["miami gp","miami international autodrome","miami"]},
  {gp:"Emilia Romagna GP",circuit:"Autodromo Enzo e Dino Ferrari",loc:"Imola, Italy",accepted:["emilia romagna gp","autodromo enzo e dino ferrari","imola","emilia romagna","emilia-romagna"]},
  {gp:"Monaco GP",circuit:"Circuit de Monaco",loc:"Monaco",accepted:["monaco gp","circuit de monaco","monaco","monte carlo"]},
  {gp:"Spanish GP",circuit:"Circuit de Barcelona-Catalunya",loc:"Barcelona, Spain",accepted:["spanish gp","circuit de barcelona-catalunya","barcelona","spain","spanish","catalunya"]},
  {gp:"Canadian GP",circuit:"Circuit Gilles Villeneuve",loc:"Montreal, Canada",accepted:["canadian gp","circuit gilles villeneuve","montreal","canada","canadian","gilles villeneuve"]},
  {gp:"Austrian GP",circuit:"Red Bull Ring",loc:"Spielberg, Austria",accepted:["austrian gp","red bull ring","spielberg","austria","austrian"]},
  {gp:"British GP",circuit:"Silverstone Circuit",loc:"Silverstone, UK",accepted:["british gp","silverstone circuit","silverstone","britain","british","great britain","uk"]},
  {gp:"Belgian GP",circuit:"Circuit de Spa-Francorchamps",loc:"Spa, Belgium",accepted:["belgian gp","circuit de spa-francorchamps","spa","belgium","belgian","spa-francorchamps"]},
  {gp:"Hungarian GP",circuit:"Hungaroring",loc:"Budapest, Hungary",accepted:["hungarian gp","hungaroring","budapest","hungary","hungarian"]},
  {gp:"Dutch GP",circuit:"Circuit Zandvoort",loc:"Zandvoort, Netherlands",accepted:["dutch gp","circuit zandvoort","zandvoort","netherlands","dutch","holland"]},
  {gp:"Italian GP",circuit:"Autodromo Nazionale Monza",loc:"Monza, Italy",accepted:["italian gp","autodromo nazionale monza","monza","italy","italian"]},
  {gp:"Azerbaijan GP",circuit:"Baku City Circuit",loc:"Baku, Azerbaijan",accepted:["azerbaijan gp","baku city circuit","baku","azerbaijan"]},
  {gp:"Singapore GP",circuit:"Marina Bay Street Circuit",loc:"Singapore",accepted:["singapore gp","marina bay street circuit","singapore","marina bay"]},
  {gp:"United States GP",circuit:"Circuit of the Americas",loc:"Austin, USA",accepted:["united states gp","circuit of the americas","austin","usa","united states","cota","america"]},
  {gp:"Mexico City GP",circuit:"Autodromo Hermanos Rodriguez",loc:"Mexico City, Mexico",accepted:["mexico city gp","autodromo hermanos rodriguez","mexico city","mexico","hermanos rodriguez"]},
  {gp:"São Paulo GP",circuit:"Autodromo Jose Carlos Pace",loc:"Interlagos, Brazil",accepted:["são paulo gp","autodromo jose carlos pace","interlagos","brazil","sao paulo","são paulo"]},
  {gp:"Las Vegas GP",circuit:"Las Vegas Strip Circuit",loc:"Las Vegas, USA",accepted:["las vegas gp","las vegas strip circuit","las vegas","vegas"]},
  {gp:"Qatar GP",circuit:"Lusail International Circuit",loc:"Lusail, Qatar",accepted:["qatar gp","lusail international circuit","lusail","qatar"]},
  {gp:"Abu Dhabi GP",circuit:"Yas Marina Circuit",loc:"Abu Dhabi, UAE",accepted:["abu dhabi gp","yas marina circuit","abu dhabi","yas marina","uae"]},
];

var found=new Set(),givenUp=false,startTime=Date.now(),toastTimer=null;
function levenshtein(a,b){var m=a.length,n=b.length,dp=[];for(var i=0;i<=m;i++){dp[i]=[i];}for(var j=0;j<=n;j++){dp[0][j]=j;}for(var i=1;i<=m;i++)for(var j=1;j<=n;j++){dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);}return dp[m][n];}
function norm(s){return s.toLowerCase().trim().replace(/[^a-z\s]/g,'');}
function findCircuit(input){var n=norm(input);if(!n)return null;for(var i=0;i<CIRCUITS.length;i++){if(found.has(i))continue;for(var j=0;j<CIRCUITS[i].accepted.length;j++){if(n===norm(CIRCUITS[i].accepted[j])||levenshtein(n,norm(CIRCUITS[i].accepted[j]))<=1)return i;}}return null;}
function buildGrid(){var g=document.getElementById('grid');g.innerHTML='';CIRCUITS.forEach(function(c,i){var card=document.createElement('div');card.className='player-card hidden';card.id='card-'+i;card.innerHTML='<div class="card-mystery">🏁</div><div class="card-mystery-label">Circuit '+(i+1)+' of '+CIRCUITS.length+'</div>';g.appendChild(card);});}
function revealCard(idx,missed){var c=CIRCUITS[idx];var card=document.getElementById('card-'+idx);card.className='player-card revealed'+(missed?' missed':'');card.style.setProperty('--card-color',missed?'#ef4444':'#f5c842');if(missed)card.style.borderColor='rgba(239,68,68,.4)';card.innerHTML='<div class="card-name">'+c.gp+'</div><div class="card-count-label">'+c.circuit+'</div><div class="card-last" style="font-size:11px;color:var(--text-muted)">'+c.loc+'</div>';}
function updateProgress(){var n=found.size;document.getElementById('prog-bar').style.width=(n/CIRCUITS.length*100)+'%';document.getElementById('prog-label').textContent=n+' / '+CIRCUITS.length+' revealed';if(n===CIRCUITS.length&&!givenUp){clearInterval(timerInterval);var secs=Math.round((Date.now()-startTime)/1000);document.getElementById('complete-banner').style.display='block';document.getElementById('complete-msg').textContent='All 24 circuits found in '+(Math.floor(secs/60)>0?Math.floor(secs/60)+'m ':'')+(secs%60)+'s!';document.getElementById('btn-giveup').style.display='none';document.getElementById('guess-input').disabled=true;if(typeof saveResult==='function')saveResult('f1-calendar-circuits','F1 Calendar Circuits',Math.round(n/CIRCUITS.length*50),50,true);}}
function showToast(msg,good){clearTimeout(toastTimer);var t=document.getElementById('toast');t.textContent=msg;t.className='toast '+(good?'good':'bad');t.style.opacity='1';toastTimer=setTimeout(function(){t.style.opacity='0';},1800);}
function submitGuess(){if(givenUp)return;var inp=document.getElementById('guess-input');var val=inp.value.trim();if(!val)return;var idx=findCircuit(val);if(idx!==null){found.add(idx);revealCard(idx,false);updateProgress();showToast('\u2713 '+CIRCUITS[idx].gp+'!',true);inp.value='';}else{showToast('No match \u2014 try again',false);inp.select();}}
function giveUp(){if(givenUp)return;givenUp=true;clearInterval(timerInterval);for(var i=0;i<CIRCUITS.length;i++){if(!found.has(i))revealCard(i,true);}document.getElementById('btn-giveup').style.display='none';document.getElementById('guess-input').disabled=true;showToast('Revealed \u2014 you got '+found.size+' / '+CIRCUITS.length,false);if(typeof saveResult==='function')saveResult('f1-calendar-circuits','F1 Calendar Circuits',Math.round(found.size/CIRCUITS.length*50),50,found.size===CIRCUITS.length);}
document.getElementById('guess-input').addEventListener('keydown',function(e){if(e.key==='Enter')submitGuess();});
var timerSeconds=240,timerInterval=null;
function startTimer(){clearInterval(timerInterval);timerSeconds=240;updateTimerDisplay();timerInterval=setInterval(function(){timerSeconds--;updateTimerDisplay();if(timerSeconds<=0){clearInterval(timerInterval);giveUp();}},1000);}
function updateTimerDisplay(){var el=document.getElementById('quiz-timer');if(!el)return;var m=Math.floor(timerSeconds/60),s=timerSeconds%60;el.textContent='⏱ '+m+':'+(s<10?'0':'')+s;el.className='timer'+(timerSeconds<=30?' danger':timerSeconds<=90?' warn':'');}
buildGrid();
startTimer();</script>
</body>
</html>
