<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#04080f;--surface:#080f1c;--surface2:#0d1829;--gold:#f5c842;--text:#e8f0fe;--muted:#6b8abf;--dim:#1e3355;--border:#0d2040;--bright:#1a3a6a}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh}
nav{background:rgba(4,8,15,.95);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:54px;position:sticky;top:0;z-index:10}
.nav-brand{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-style:italic;font-size:20px;text-transform:uppercase;color:var(--gold);text-decoration:none;line-height:.9}
.nav-right{display:flex;gap:8px;align-items:center}
.nav-btn{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;padding:6px 14px;border-radius:7px;text-decoration:none;border:1px solid var(--bright);color:var(--muted)}
.page{max-width:760px;margin:0 auto;padding:32px 16px 60px}
.page-title{font-family:'Barlow Condensed',sans-serif;font-size:clamp(28px,6vw,44px);font-weight:900;font-style:italic;text-transform:uppercase;color:var(--gold);margin-bottom:6px}
.page-sub{font-size:13px;color:var(--muted);margin-bottom:28px}
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:24px}
.tab{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;padding:10px 18px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.search-wrap{position:relative;margin-bottom:16px}
.search-input{width:100%;background:var(--surface2);border:1px solid var(--bright);border-radius:10px;padding:11px 40px 11px 14px;color:var(--text);font-family:'Barlow',sans-serif;font-size:14px;outline:none}
.search-input:focus{border-color:var(--gold)}
.lb-table{width:100%;border-collapse:collapse}
.lb-table th{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);padding:8px 12px;text-align:left;border-bottom:1px solid var(--border);background:var(--surface2)}
.lb-table td{padding:11px 12px;border-bottom:1px solid var(--border);font-size:14px;vertical-align:middle}
.lb-table tr:last-child td{border-bottom:none}
.lb-table tr:hover td{background:var(--surface2)}
.rank{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:900;color:var(--dim);width:32px}
.rank.top1{color:#ffd700;font-size:20px}
.rank.top2{color:#c0c0c0;font-size:18px}
.rank.top3{color:#cd7f32;font-size:17px}
.player{display:flex;align-items:center;gap:10px}
.player-av{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#f5c842,#e6a800);color:var(--bg);display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:12px;flex-shrink:0}
.player-name{font-weight:500;color:var(--text)}
.score-cell{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:900;color:var(--gold)}
.badge-cell{font-size:18px}
.empty{text-align:center;padding:48px;color:var(--muted);font-size:14px}
.quiz-select{width:100%;background:var(--surface2);border:1px solid var(--bright);border-radius:10px;padding:11px 14px;color:var(--text);font-family:'Barlow',sans-serif;font-size:14px;outline:none;margin-bottom:16px}
</style>
</head>
<body>
<nav>
  <a class="nav-brand" href="index.html">Sports<br>Stack</a>
  <div class="nav-right">
    <a class="nav-btn" href="profile.html">My Profile</a>
    <a class="nav-btn" href="index.html">Quizzes</a>
  </div>
</nav>
<div class="page">
  <div class="page-title">Leaderboard</div>
  <div class="page-sub">Top scores across the SportsStack community</div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('global')">Overall Rankings</div>
    <div class="tab" onclick="switchTab('quiz')">Quiz Scores</div>
  </div>

  <!-- Global leaderboard -->
  <div id="panel-global">
    <table class="lb-table">
      <thead><tr>
        <th>#</th><th>Player</th>
        <th class="score-cell">⭐ Points</th>
        <th>Quizzes</th>
      </tr></thead>
      <tbody id="global-body"><tr><td colspan="4" class="empty">Loading…</td></tr></tbody>
    </table>
  </div>

  <!-- Per-quiz leaderboard -->
  <div id="panel-quiz" style="display:none">
    <select class="quiz-select" id="quiz-select" onchange="loadQuizLb()">
      <option value="">Select a quiz…</option>
    </select>
    <table class="lb-table">
      <thead><tr>
        <th>#</th><th>Player</th>
        <th>Score</th>
        <th>Status</th>
      </tr></thead>
      <tbody id="quiz-body"><tr><td colspan="4" class="empty">Select a quiz to see scores</td></tr></tbody>
    </table>
  </div>
</div>

function switchTab(t) {
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',(i===0&&t==='global')||(i===1&&t==='quiz')));
  document.getElementById('panel-global').style.display = t==='global'?'block':'none';
  document.getElementById('panel-quiz').style.display   = t==='quiz'?'block':'none';
}

function rankIcon(i) {
  if(i===0) return '<span class="rank top1">🥇</span>';
  if(i===1) return '<span class="rank top2">🥈</span>';
  if(i===2) return '<span class="rank top3">🥉</span>';
  return `<span class="rank">${i+1}</span>`;
}

function av(name) {
  const init = (name||'?').split(' ').map(p=>p[0]).join('').slice(0,2).toUpperCase();
  return `<div class="player-av">${init}</div>`;
}

function fmtTime(secs) {
  if (!secs && secs !== 0) return '—';
  const m = Math.floor(secs / 60);
  const s = secs % 60;
  return m > 0 ? `${m}m ${s}s` : `${s}s`;
}

// Fetch all profiles once — avoids relying on foreign key join
async function getProfiles() {
  const {data, error} = await client.from('profiles').select('id, username');
  const map = {};
  (data || []).forEach(p => { map[p.id] = p.username || 'Unknown'; });
  return map;
}

// ── GLOBAL LEADERBOARD ─────────────────────────────────────────────────
async function loadGlobal() {
  var el = document.getElementById('global-body');
  el.innerHTML = '<tr><td colspan="4" class="empty">Loading…</td></tr>';
  try {
    var pRes = await client.from('profiles').select('id, username');
    if (pRes.error) throw new Error('profiles: ' + pRes.error.message);
    var profiles = pRes.data || [];
    if (!profiles.length) { el.innerHTML = '<tr><td colspan="4" class="empty">No members yet</td></tr>'; return; }

    var rRes = await client.from('quiz_results').select('user_id, score, total').eq('completed', true);
    var results = rRes.data || [];

    var pts = {};
    results.forEach(function(r) {
      var s = (r.total && r.score > r.total) ? r.total : (r.score || 0);
      if (!pts[r.user_id]) pts[r.user_id] = {points:0, quizzes:0};
      pts[r.user_id].points  += s;
      pts[r.user_id].quizzes += 1;
    });

    var members = profiles.map(function(p) {
      return {name: p.username || 'Member', points: pts[p.id] ? pts[p.id].points : 0, quizzes: pts[p.id] ? pts[p.id].quizzes : 0};
    });
    members.sort(function(a,b){ return b.points - a.points || a.name.localeCompare(b.name); });

    el.innerHTML = members.map(function(u,i) {
      return '<tr><td>'+rankIcon(i)+'</td><td><div class="player">'+av(u.name)+'<span class="player-name">'+u.name+'</span></div></td><td class="score-cell">'+u.points.toLocaleString()+'</td><td style="color:var(--muted);font-size:13px">'+(u.quizzes?u.quizzes+' quiz'+(u.quizzes!==1?'zes':''):'No quizzes yet')+'</td></tr>';
    }).join('');
  } catch(err) {
    el.innerHTML = '<tr><td colspan="4" class="empty" style="color:#ef4444">Error: ' + (err.message||String(err)) + '</td></tr>';
  }
}


// ── QUIZ SELECT ────────────────────────────────────────────────────────
function populateQuizSelect() {
  const sel = document.getElementById('quiz-select');
  ALL_QUIZ_LIST.forEach(q => {
    const opt = document.createElement('option');
    opt.value = q.slug;
    opt.textContent = q.name;
    sel.appendChild(opt);
  });
}

// ── INDIVIDUAL QUIZ LEADERBOARD // ── INDIVIDUAL QUIZ LEADERBOARD ────────────────────────────────────────
async function loadQuizLb() {
  const slug = document.getElementById('quiz-select').value;
  if (!slug) return;
  const el = document.getElementById('quiz-body');
  el.innerHTML = '<tr><td colspan="5" class="empty">Loading…</td></tr>';

  const [profileMap, {data, error}] = await Promise.all([
    getProfiles(),
    client.from('quiz_results')
      .select('user_id, score, total, time_seconds, completed')
      .eq('quiz_slug', slug)
      .eq('completed', true)
      .order('score',        {ascending: false})
      .order('time_seconds', {ascending: true})
      .limit(100)
  ]);

  if (error || !data || !data.length) {
    el.innerHTML = '<tr><td colspan="5" class="empty">No scores yet for this quiz</td></tr>';
    return;
  }

  // Check if top scores are tied (all perfect) — time is the differentiator
  const topScore = data[0] ? data[0].score : 0;
  const topTotal = data[0] ? data[0].total : 0;
  const timeTiebreaker = topScore === topTotal && data.filter(r => r.score === topTotal).length > 1;

  el.innerHTML = data.map((r,i) => {
    const name    = profileMap[r.user_id] || 'Member';
    const perfect = r.score === r.total;
    const pct     = r.total ? Math.round(r.score / r.total * 100) : 0;
    const badge   = perfect ? '\uD83E\uDD47 Perfect' : pct + '%';
    const timeStr = fmtTime(r.time_seconds);
    const timeCell = perfect
      ? `<td style="color:#f5c842;font-size:13px;font-weight:700">\u23F1 ${timeStr}${timeTiebreaker ? ' <span style=\"color:#6b8abf;font-size:11px;font-weight:400\">(tiebreaker)</span>' : ''}</td>`
      : `<td style="color:var(--muted);font-size:13px">${timeStr}</td>`;
    return `<tr>
      <td>${rankIcon(i)}</td>
      <td><div class="player">${av(name)}<span class="player-name">${name}</span></div></td>
      <td class="score-cell" style="${perfect ? 'color:#f5c842' : ''}">${r.score}/${r.total}</td>
      ${timeCell}
      <td class="badge-cell">${badge}</td>
    </tr>`;
  }).join('');
}

loadGlobal();
populateQuizSelect();
