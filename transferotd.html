*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#04080f;--sf:#080f1c;--sf2:#0d1829;--gold:#f5c842;--text:#e8f0fe;--mut:#6b8abf;--dim:#1e3355;--bd:#0d2040;--brt:#1a3a6a;--gb:rgba(34,197,94,.12);--gbd:rgba(34,197,94,.4);--rb:rgba(239,68,68,.08);--rbd:rgba(239,68,68,.3)}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif}
.page{max-width:560px;margin:0 auto;padding:24px 16px 80px}
.hdr{text-align:center;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--bd)}
.eye{font-size:11px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--mut);margin-bottom:5px}
.ttl{font-family:'Barlow Condensed',sans-serif;font-size:clamp(22px,5.5vw,34px);font-weight:900;text-transform:uppercase;color:var(--text)}
.ttl .hl{color:var(--gold)} .dl{font-size:12px;color:var(--dim);margin-top:3px}
.hints{display:flex;flex-direction:column;gap:7px;margin-bottom:18px}
.tile{display:flex;align-items:center;gap:12px;padding:11px 15px;background:var(--sf);border:1px solid var(--bd);border-radius:10px;transition:all .35s}
.tile.on{background:var(--sf2);border-color:var(--brt)}
.ticon{font-size:18px;width:26px;text-align:center;flex-shrink:0}
.tlbl{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);width:110px;flex-shrink:0}
.tile.on .tlbl{color:var(--mut)} .tval{font-family:'Barlow',sans-serif;font-size:15px;font-weight:400;color:var(--gold);letter-spacing:.01em;opacity:0;transition:opacity .5s .15s;flex:1}
.tile.on .tval{opacity:1} .tmask{display:flex;gap:5px} .tdot{width:6px;height:6px;border-radius:50%;background:var(--dim)}
.grows{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.grow{display:flex;align-items:center;gap:10px;padding:9px 14px;border-radius:8px;border:1px solid;animation:pop .18s ease}
.grow.ok{background:var(--gb);border-color:var(--gbd)} .grow.no{background:var(--rb);border-color:var(--rbd)}
.gico{font-size:14px;flex-shrink:0} .gnm{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:800;letter-spacing:.03em}
.grow.ok .gnm{color:#86efac} .grow.no .gnm{color:#fca5a5}
@keyframes pop{from{transform:translateX(-6px);opacity:0}to{transform:translateX(0);opacity:1}}
.pips{display:flex;justify-content:center;gap:7px;margin-bottom:14px}
.pip{width:10px;height:10px;border-radius:50%;background:var(--dim);transition:background .25s}
.pip.no{background:#ef4444} .pip.ok{background:#22c55e}
.iwrap{position:relative}
.ginput{width:100%;font-family:'Barlow Condensed',sans-serif;font-size:clamp(15px,4vw,20px);font-weight:700;padding:12px 16px;border:2px solid var(--brt);border-radius:12px;background:var(--sf2);color:var(--text);outline:none;text-align:center;transition:border-color .2s}
.ginput:focus{border-color:var(--gold)} .ginput:disabled{opacity:.38;cursor:not-allowed}
.sbox{position:absolute;top:100%;left:0;right:0;z-index:50;background:var(--sf);border:1px solid var(--brt);border-radius:10px;margin-top:4px;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.si{padding:10px 16px;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;color:var(--text);cursor:pointer;border-bottom:1px solid var(--bd)}
.si:last-child{border-bottom:none} .si:hover{background:var(--sf2);color:var(--gold)}
.rbox{border-radius:14px;padding:20px;text-align:center;margin-top:16px;border:1px solid}
.rbox.win{border-color:var(--gbd);background:var(--gb)} .rbox.lose{border-color:var(--rbd);background:var(--rb)}
.ricon{font-size:38px;margin-bottom:6px} .rtitle{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:900;text-transform:uppercase;margin-bottom:4px}
.rbox.win .rtitle{color:#86efac} .rbox.lose .rtitle{color:#fca5a5}
.rsub{font-size:13px;color:var(--mut);line-height:1.6;margin-bottom:14px} .rsub b{color:var(--text)}
.sbtn{padding:9px 22px;border-radius:50px;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;border:1.5px solid var(--brt);background:transparent;color:var(--text)}
.back{display:block;text-align:center;margin-top:18px;font-size:12px;color:var(--mut);text-decoration:none;letter-spacing:.06em;text-transform:uppercase}
.back:hover{color:var(--gold)}

function finish(won){
  over=true;document.getElementById('ginput').disabled=true;hideSugg();
  if(typeof saveResult==='function'){saveResult('transferotd','Deal of the Day',won?1:0,1,won);}
  if(!won){for(var i=0;i<5;i++)reveal(i);}
  var details='<b>'+PLAYER.n+'</b><br>'+PLAYER.f+' \u2192 '+PLAYER.t+'<br>'+PLAYER.na+' \u00b7 '+PLAYER.fe+' \u00b7 '+PLAYER.y;
  var prefix=won?'That was ':'Today\u2019s transfer was ';
  var icon=won?'\ud83c\udfc6':'\u274c';
  document.getElementById('rarea').innerHTML=
    '<div class="rbox '+(won?'win':'lose')+'">'
    +'<div class="ricon">'+icon+'</div>'
    +'<div class="rtitle">'+(won?'Got it!':'Unlucky!')+'</div>'
    +'<div class="rsub">'+prefix+details+'</div>'
    +'<button class="sbtn" onclick="shareResult('+(won?'true':'false')+')">Share result</button>'
    +'</div>';
}
function shareResult(won){
  var today=new Date().toLocaleDateString('en-AU'),pips='';
  for(var i=0;i<6;i++){var p=document.getElementById('p'+i);pips+=p.classList.contains('ok')?'\ud83d\udfe9':p.classList.contains('no')?'\ud83d\udfe5':'\u2b1c';}
  var txt='SportsStack \u2014 Deal of the Day \u00b7 '+today+'\n'+(won?'\u2705 '+guesses+'/6':'\u274c X/6')+'\n'+pips+'\nsportsstack.com.au/transferotd.html';
  if(navigator.share){navigator.share({text:txt}).catch(()=>{});}else if(navigator.clipboard)navigator.clipboard.writeText(txt).then(function(){var b=document.querySelector('.sbtn');if(b){b.textContent='Copied!';setTimeout(function(){b.textContent='Share result';},2000);}});
}
function doGuess(){
  if(over)return;var inp=document.getElementById('ginput'),val=inp.value.trim();if(!val)return;
  inp.value='';hideSugg();guesses++;var ok=isMatch(val);addRow(val,ok);
  if(ok){finish(true);return;}
  if(guesses-1<TILES.length)reveal(guesses-1);if(guesses>=MAX)finish(false);
}
function hideSugg(){var b=document.getElementById('sbox');b.style.display='none';b.innerHTML='';}
function buildSugg(val){
  if(over||val.length<2){hideSugg();return;}
  var nv=normStr(val),seen={},hits=[];
  for(var i=0;i<T.length;i++){
    var t=T[i];if(seen[t.n])continue;
    var nm=normStr(t.n);
    if(nm.indexOf(nv)===0||t.a.some(function(a){return normStr(a).indexOf(nv)===0;})||lev(nv,nm)<=2){seen[t.n]=1;hits.push(t);}
    if(hits.length>=6)break;
  }
  if(!hits.length){hideSugg();return;}
  var box=document.getElementById('sbox');
  box.innerHTML=hits.map(function(h){var s=h.n.replace(/&/g,'&amp;').replace(/"/g,'&quot;');return '<div class="si" data-n="'+s+'">'+s+'</div>';}).join('');
  box.style.display='block';
  box.querySelectorAll('.si').forEach(function(el){el.addEventListener('mousedown',function(e){e.preventDefault();document.getElementById('ginput').value=el.getAttribute('data-n').replace(/&amp;/g,'&').replace(/&quot;/g,'"');hideSugg();});});
}
document.getElementById('ginput').addEventListener('input',function(e){buildSugg(e.target.value.trim());});
document.getElementById('ginput').addEventListener('keydown',function(e){if(e.key==='Enter')doGuess();if(e.key==='Escape')hideSugg();});
document.addEventListener('click',function(e){if(!e.target.closest('#iwrap'))hideSugg();});

</script>
