<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link rel="icon" href="/favicon.ico" sizes="any"/>
<link rel="icon" href="/favicon.png" type="image/png" sizes="96x96"/>
<link rel="apple-touch-icon" href="/apple-touch-icon.png"/>
<meta property="og:title" content="Auth — SportsStack"/>
<meta property="og:image" content="https://sportsstack.com.au/LOGO.jpeg"/>
<meta property="og:url" content="https://sportsstack.com.au/auth.html"/>
<meta name="twitter:card" content="summary"/>
<meta name="twitter:image" content="https://sportsstack.com.au/LOGO.jpeg"/>
<title>Sign In – SportsStack</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,700;0,800;0,900;1,900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#04080f;--surface:#080f1c;--surface2:#0d1829;--gold:#f5c842;--text:#e8f0fe;--muted:#6b8abf;--dim:#1e3355;--border:#0d2040;--bright:#1a3a6a;--red:#ef4444;--green:#22c55e}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.logo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-style:italic;font-size:32px;text-transform:uppercase;color:var(--gold);text-decoration:none;margin-bottom:32px;display:block;text-align:center;line-height:.9}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:32px;width:100%;max-width:400px}
.tabs{display:flex;margin-bottom:28px;border-bottom:1px solid var(--border)}
.tab{flex:1;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;padding:10px;text-align:center;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;transition:all .15s}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.field{margin-bottom:16px}
.field label{display:block;font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.field input{width:100%;background:var(--surface2);border:1px solid var(--bright);border-radius:8px;padding:11px 14px;color:var(--text);font-family:'Barlow',sans-serif;font-size:15px;outline:none;transition:border-color .15s}
.field input:focus{border-color:var(--gold)}
.btn{width:100%;font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;padding:13px;border-radius:10px;cursor:pointer;border:none;transition:all .2s;margin-top:4px}
.btn-gold{background:var(--gold);color:var(--bg)}
.btn-gold:hover{background:#ffd700}
.btn-google{background:var(--surface2);color:var(--text);border:1px solid var(--bright);display:flex;align-items:center;justify-content:center;gap:10px;margin-top:12px}
.btn-google:hover{background:var(--border);border-color:var(--gold);color:var(--gold)}
.divider{display:flex;align-items:center;gap:12px;margin:16px 0;color:var(--dim);font-size:12px;letter-spacing:.08em;text-transform:uppercase}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.msg{font-size:13px;padding:10px 14px;border-radius:8px;margin-bottom:16px;display:none}
.msg.error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#fca5a5;display:block}
.msg.success{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);color:#86efac;display:block}
.back{margin-top:20px;text-align:center;font-size:13px;color:var(--muted)}
.back a{color:var(--gold);text-decoration:none}

.check-wrap{display:flex;align-items:flex-start;gap:10px;margin:4px 0 12px;cursor:pointer}
.check-wrap input[type=checkbox]{width:16px;height:16px;margin-top:2px;flex-shrink:0;accent-color:var(--gold);cursor:pointer}
.check-wrap span{font-size:13px;color:var(--muted);line-height:1.5}
.check-wrap a{color:var(--gold);text-decoration:none}
</style>
</head>
<body>
<a href="index.html" class="logo">Sports<br>Stack</a>
<div class="card">
  <div class="tabs">
    <div class="tab active" onclick="switchTab('signin')">Sign In</div>
    <div class="tab" onclick="switchTab('signup')">Create Account</div>
  </div>
  <div id="msg" class="msg"></div>

  <!-- Sign In -->
  <div id="panel-signin">
    <div class="field"><label>Email</label><input id="si-email" type="email" placeholder="you@example.com" autocomplete="email"/></div>
    <div class="field"><label>Password</label><input id="si-pass" type="password" placeholder="••••••••" autocomplete="current-password"/></div>
    <button class="btn btn-gold" onclick="signIn()">Sign In</button>
    <div class="divider">or</div>
    <button class="btn btn-google" onclick="signInGoogle()">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M23.745 12.27c0-.79-.07-1.54-.19-2.27h-11.3v4.51h6.47c-.29 1.48-1.14 2.73-2.4 3.58v3h3.86c2.26-2.09 3.56-5.17 3.56-8.82z"/><path fill="#34A853" d="M12.255 24c3.24 0 5.95-1.08 7.93-2.91l-3.86-3c-1.08.72-2.45 1.16-4.07 1.16-3.13 0-5.78-2.11-6.73-4.96h-3.98v3.09C3.515 21.3 7.615 24 12.255 24z"/><path fill="#FBBC05" d="M5.525 14.29c-.25-.72-.38-1.49-.38-2.29s.14-1.57.38-2.29V6.62h-3.98a11.86 11.86 0 000 10.76l3.98-3.09z"/><path fill="#EA4335" d="M12.255 4.75c1.77 0 3.35.61 4.6 1.8l3.42-3.42C18.205 1.19 15.495 0 12.255 0c-4.64 0-8.74 2.7-10.71 6.62l3.98 3.09c.95-2.85 3.6-4.96 6.73-4.96z"/></svg>
      Continue with Google
    </button>
  </div>

  <!-- Sign Up -->
  <div id="panel-signup" style="display:none">
    <div class="field"><label>Username</label><input id="su-user" type="text" placeholder="sportstackfan" autocomplete="username"/></div>
    <div class="field"><label>Email</label><input id="su-email" type="email" placeholder="you@example.com" autocomplete="email"/></div>
    <div class="field"><label>Password</label><input id="su-pass" type="password" placeholder="min 6 characters" autocomplete="new-password"/></div>
    <label class="check-wrap">
      <input type="checkbox" id="su-marketing">
      <span>I'd like to receive SportsStack updates, new quiz alerts and news by email. You can unsubscribe anytime. See our <a href="privacy.html" target="_blank">Privacy Policy</a>.</span>
    </label>
    <button class="btn btn-gold" onclick="signUp()">Create Account</button>
    <div class="divider">or</div>
    <button class="btn btn-google" onclick="signInGoogle()">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M23.745 12.27c0-.79-.07-1.54-.19-2.27h-11.3v4.51h6.47c-.29 1.48-1.14 2.73-2.4 3.58v3h3.86c2.26-2.09 3.56-5.17 3.56-8.82z"/><path fill="#34A853" d="M12.255 24c3.24 0 5.95-1.08 7.93-2.91l-3.86-3c-1.08.72-2.45 1.16-4.07 1.16-3.13 0-5.78-2.11-6.73-4.96h-3.98v3.09C3.515 21.3 7.615 24 12.255 24z"/><path fill="#FBBC05" d="M5.525 14.29c-.25-.72-.38-1.49-.38-2.29s.14-1.57.38-2.29V6.62h-3.98a11.86 11.86 0 000 10.76l3.98-3.09z"/><path fill="#EA4335" d="M12.255 4.75c1.77 0 3.35.61 4.6 1.8l3.42-3.42C18.205 1.19 15.495 0 12.255 0c-4.64 0-8.74 2.7-10.71 6.62l3.98 3.09c.95-2.85 3.6-4.96 6.73-4.96z"/></svg>
      Continue with Google
    </button>
  </div>
</div>
<div class="back"><a href="index.html">← Back to quizzes</a></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const client = supabase.createClient('https://syntfyfsyjiuowclarpf.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN5bnRmeWZzeWppdW93Y2xhcnBmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzODgwNzgsImV4cCI6MjA5NTk2NDA3OH0.jQVBQo7tnv1RBEnCdzZCIvx8vVjsaXWRfZ3VNm1__Ig');

// Redirect if already signed in
client.auth.getUser().then(({data:{user}}) => {
  if (user) location.href = 'profile.html';
});

function switchTab(t) {
  document.querySelectorAll('.tab').forEach((el,i) => el.classList.toggle('active', (i===0&&t==='signin')||(i===1&&t==='signup')));
  document.getElementById('panel-signin').style.display = t==='signin'?'block':'none';
  document.getElementById('panel-signup').style.display = t==='signup'?'block':'none';
  clearMsg();
}
function showMsg(txt,type){const el=document.getElementById('msg');el.textContent=txt;el.className='msg '+type;}
function clearMsg(){const el=document.getElementById('msg');el.className='msg';}

async function signIn() {
  const email=document.getElementById('si-email').value.trim();
  const pass=document.getElementById('si-pass').value;
  if(!email||!pass){showMsg('Please fill in all fields','error');return;}
  const {error} = await client.auth.signInWithPassword({email,password:pass});
  if(error){showMsg(error.message,'error');}
  else {
    location.href='profile.html';
  }
}

async function signUp() {
  const user=document.getElementById('su-user').value.trim();
  const email=document.getElementById('su-email').value.trim();
  const pass=document.getElementById('su-pass').value;
  if(!user||!email||!pass){showMsg('Please fill in all fields','error');return;}
  if(pass.length<6){showMsg('Password must be at least 6 characters','error');return;}
  const {data,error} = await client.auth.signUp({
    email, password:pass,
    options:{data:{full_name:user},emailRedirectTo:location.origin+'/profile.html'}
  });
  const marketing = document.getElementById('su-marketing').checked;
  if(error){showMsg(error.message,'error');}
  else {
    if(data.user) {
      await client.from('profiles').upsert({
        id: data.user.id,
        username: user,
        marketing_consent: marketing,
        consent_date: marketing ? new Date().toISOString() : null
      }, {onConflict:'id',ignoreDuplicates:false});
    }
    location.href='profile.html';
  }
}

async function signInGoogle() {
  await client.auth.signInWithOAuth({
    provider:'google',
    options:{redirectTo:location.origin+'/profile.html'}
  });
}

[document.getElementById('si-email'),document.getElementById('si-pass')].forEach(el=>
  el.addEventListener('keydown',e=>{if(e.key==='Enter')signIn();}));
</script>
</body>
</html>
