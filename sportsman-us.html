<style>
:root{
  --bg:#04080f;--surface:#080f1c;--surface2:#0d1829;--surface3:#122035;
  --blue:#2563eb;--blue-light:#3b82f6;
  --gold:#f5c842;
  --green:#22c55e;--green-bg:rgba(34,197,94,.09);--green-border:rgba(34,197,94,.45);
  --amber:#f59e0b;--amber-bg:rgba(245,158,11,.09);--amber-border:rgba(245,158,11,.42);
  --orange:#f97316;--orange-bg:rgba(249,115,22,.09);--orange-border:rgba(249,115,22,.42);
  --grey:#4b5563;--grey-bg:rgba(75,85,99,.1);--grey-border:rgba(75,85,99,.4);
  --red:#ef4444;
  --text:#e8f0fe;--text-muted:#6b8abf;--text-dim:#4a6890;
  --border:#0d2040;--border-bright:#1a3a6a;--radius:10px;--radius-lg:16px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif}
.page{max-width:720px;margin:0 auto;padding:20px 16px 48px}
.site-header{text-align:center;padding-bottom:16px;border-bottom:1px solid var(--border);margin-bottom:20px}
.game-name{font-family:'Barlow Condensed',sans-serif;font-size:clamp(24px,5vw,42px);font-weight:900;letter-spacing:.04em;text-transform:uppercase;line-height:1;color:var(--text)}
.game-name .hl{color:var(--gold)}
.game-sub{font-size:12px;color:var(--text-muted);letter-spacing:.08em;text-transform:uppercase;margin-top:4px}
.att-badge{display:block;text-align:center;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:5px 16px;border-radius:20px;background:var(--surface2);color:var(--text-muted);border:1px solid var(--border-bright);margin-bottom:14px;width:fit-content;margin-left:auto;margin-right:auto}
.legend{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:14px}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-muted)}
.dot{width:8px;height:8px;border-radius:50%}
.col-hdr{font-size:10px;font-weight:700;color:var(--text-muted);text-align:center;padding:2px 0;text-transform:uppercase;letter-spacing:.06em}
.tile{border-radius:var(--radius);padding:7px 4px;text-align:center;min-height:56px;display:flex;flex-direction:column;align-items:center;justify-content:center;border:1px solid var(--border-bright);background:var(--surface2);transition:background .25s,border-color .25s}
.tile .tv{font-size:11px;font-weight:600;line-height:1.3;color:var(--text)}
.tile .ti{font-size:10px;color:var(--text-muted);margin-top:2px;line-height:1.2}
.tile.g{background:var(--green-bg);border-color:var(--green-border)}.tile.g .tv{color:#86efac}.tile.g .ti{color:#4ade80}
.tile.a{background:var(--amber-bg);border-color:var(--amber-border)}.tile.a .tv{color:#fcd34d}.tile.a .ti{color:#fbbf24}
.tile.o{background:var(--orange-bg);border-color:var(--orange-border)}.tile.o .tv{color:#fdba74}.tile.o .ti{color:#fb923c}
.tile.gr{background:var(--grey-bg);border-color:var(--grey-border)}.tile.gr .tv{color:#9ca3af}.tile.gr .ti{color:#6b7280}
.tile.empty{background:var(--surface);border:1px dashed var(--border-bright)}
.input-area{margin-top:14px;display:flex;gap:8px;position:relative}
.input-area input{flex:1;font-size:15px;padding:11px 16px;border:1.5px solid var(--border-bright);border-radius:var(--radius);background:var(--surface2);color:var(--text);outline:none;font-family:'Barlow',sans-serif;transition:border-color .15s}
.input-area input:focus{border-color:var(--blue-light);box-shadow:0 0 0 3px rgba(59,130,246,.1)}
.input-area input::placeholder{color:#6b8abf}
.dropdown{position:absolute;top:100%;left:0;right:80px;background:var(--surface2);border:1.5px solid var(--border-bright);border-radius:var(--radius);z-index:99;max-height:260px;overflow-y:auto;margin-top:3px;box-shadow:0 8px 24px rgba(0,0,0,.45)}
.dd-item{padding:9px 13px;font-size:14px;color:var(--text);cursor:pointer;border-bottom:1px solid var(--border)}
.dd-item:last-child{border-bottom:none}
.dd-item:hover,.dd-item.hl{background:var(--surface3)}
.dd-meta{font-size:11px;color:var(--text-muted);margin-top:2px}
.btn{padding:11px 18px;border-radius:50px;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;border:none;background:var(--gold);color:var(--bg);white-space:nowrap;transition:all .2s;flex-shrink:0}
.btn:hover{background:#ffd700;transform:translateY(-1px)}
.btn:active{transform:translateY(0)}
.result-banner{border-radius:var(--radius-lg);padding:1.1rem 1.25rem;text-align:center;margin-top:14px;border:1px solid}
.result-banner.win{border-color:var(--green-border);background:var(--green-bg)}
.result-banner.lose{border-color:rgba(239,68,68,.35);background:rgba(239,68,68,.06)}
.rb-icon{font-size:32px;margin-bottom:6px}
.rb-title{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:900;letter-spacing:.04em;text-transform:uppercase;margin-bottom:6px}
.result-banner.win .rb-title{color:#86efac}
.result-banner.lose .rb-title{color:#fca5a5}
.rb-player{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;color:var(--gold);margin-bottom:4px}
.rb-sub{font-size:13px;color:var(--text-muted);margin-bottom:2px}
.share-btn{margin-top:10px;display:inline-block;padding:9px 22px;border-radius:50px;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;border:1.5px solid var(--border-bright);background:transparent;color:var(--text);transition:all .2s}
.share-btn:hover{background:rgba(255,255,255,.06)}
.msg{font-size:13px;color:#fca5a5;margin-top:6px;min-height:18px}
nav{position:sticky;top:0;z-index:1000;background:rgba(4,8,15,.95);backdrop-filter:blur(12px);border-bottom:1px solid rgba(13,32,64,.8);padding:0 16px;display:flex;align-items:center;height:52px;gap:10px}

const seen=new Set();
const PLAYERS=ALL_PLAYERS.filter(p=>{if(seen.has(p.name))return false;seen.add(p.name);return true;});

function getDayIndex(){
  const nfl=PLAYERS.filter(p=>p.sport==='NFL');
  const nba=PLAYERS.filter(p=>p.sport==='NBA');
  const mlb=PLAYERS.filter(p=>p.sport==='MLB');
  const rotation=[];
  const maxLen=Math.max(nfl.length,nba.length,mlb.length);
  for(let i=0;i<maxLen;i++){
    if(i<nfl.length)rotation.push(nfl[i]);
    if(i<nba.length)rotation.push(nba[i]);
    if(i<mlb.length)rotation.push(mlb[i]);
  }
  const epoch=new Date('2026-01-01');
  return rotation[Math.floor((new Date()-epoch)/86400000)%rotation.length];
}
const TARGET=getDayIndex();
const MAX=8;
let attempts=0,done=false,guesses=[],ddHighlight=-1,ddItems=[];

function normalise(s){
  return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9\s]/g,'').trim();
}
function findPlayer(val){
  const nv=normalise(val);
  return PLAYERS.find(p=>normalise(p.name)===nv||p.aliases.some(a=>normalise(a)===nv))
    ||PLAYERS.find(p=>normalise(p.name).includes(nv)||p.aliases.some(a=>normalise(a).includes(nv)));
}

function scoreDivision(g){
  const td=getDivision(TARGET.team),gd=getDivision(g.team);
  const tc=getConference(TARGET.team),gc=getConference(g.team);
  if(gd===td)return 'g';
  if(gc===tc&&gc!=='')return 'o';
  return 'gr';
}
function scoreGuess(g){
  const t=TARGET,diff=Math.abs(g.age-t.age);
  return{
    sport:g.sport===t.sport?'g':'gr',
    pos:  g.pos===t.pos?'g':'gr',
    div:  scoreDivision(g),
    team: g.team===t.team?'g':(getDivision(g.team)===getDivision(t.team)?'a':'gr'),
    age:  g.age===t.age?'g':diff<=2?'a':'gr',
  };
}
function ageArrow(g){return g.age===TARGET.age?'':g.age<TARGET.age?' ↑':' ↓';}

function renderRows(){
  const c=document.getElementById('rows');c.innerHTML='';
  for(let i=0;i<MAX;i++){
    const wrap=document.createElement('div');
    wrap.style.cssText='display:grid;grid-template-columns:28px repeat(5,1fr);gap:4px;margin-bottom:2px';
    const lbl=document.createElement('div');
    lbl.style.cssText='font-size:11px;color:var(--text-muted);text-align:right;padding-right:4px;display:flex;align-items:center;justify-content:flex-end;font-family:"Barlow Condensed",sans-serif;font-weight:700';
    lbl.textContent=i+1;wrap.appendChild(lbl);
    if(i<guesses.length){
      const g=guesses[i],s=scoreGuess(g),arrow=ageArrow(g);
      const div=getDivision(g.team)||g.sport;
      [{cat:'sport',val:g.sport,sub:''},{cat:'pos',val:g.pos,sub:''},
       {cat:'div',val:div,sub:getConference(g.team)||''},
       {cat:'team',val:g.team,sub:''},
       {cat:'age',val:g.age+(arrow||''),sub:''}].forEach(def=>{
        const tile=document.createElement('div');tile.className='tile '+s[def.cat];
        const tv=document.createElement('div');tv.className='tv';tv.textContent=def.val;tile.appendChild(tv);
        if(def.sub){const ti=document.createElement('div');ti.className='ti';ti.textContent=def.sub;tile.appendChild(ti);}
        wrap.appendChild(tile);
      });
      c.appendChild(wrap);
      const nr=document.createElement('div');
      nr.style.cssText='display:grid;grid-template-columns:28px 1fr;gap:4px;margin-bottom:6px';
      nr.innerHTML='<div></div><div style="font-size:11px;color:var(--text-muted);padding-left:2px;font-style:italic">'+g.name+'</div>';
      c.appendChild(nr);
    } else {
      for(let j=0;j<5;j++){const t=document.createElement('div');t.className='tile empty';wrap.appendChild(t);}
      c.appendChild(wrap);
    }
  }
}

function getFiltered(q){
  if(!q||q.length<2)return[];
  const nq=normalise(q);
  return PLAYERS.filter(p=>normalise(p.name).includes(nq)||p.aliases.some(a=>normalise(a).includes(nq))).slice(0,10);
}

const input=document.getElementById('guess-input'),dd=document.getElementById('dropdown');
function renderDD(items,hl=-1){
  ddItems=items;
  if(!items.length){dd.style.display='none';return;}
  dd.innerHTML='';
  items.forEach((p,i)=>{
    const item=document.createElement('div');
    item.className='dd-item'+(i===hl?' hl':'');
    item.innerHTML='<div>'+p.name+'</div><div class="dd-meta">'+p.sport+' · '+p.pos+' · '+p.team+'</div>';
    item.onmousedown=e=>{e.preventDefault();input.value=p.name;dd.style.display='none';ddHighlight=-1;input.focus();};
    dd.appendChild(item);
  });
  dd.style.display='block';
}
input.addEventListener('input',()=>{ddHighlight=-1;renderDD(getFiltered(input.value));});
input.addEventListener('keydown',e=>{
  if(e.key==='ArrowDown'){e.preventDefault();ddHighlight=Math.min(ddHighlight+1,ddItems.length-1);renderDD(ddItems,ddHighlight);}
  else if(e.key==='ArrowUp'){e.preventDefault();ddHighlight=Math.max(ddHighlight-1,0);renderDD(ddItems,ddHighlight);}
  else if(e.key==='Enter'){ddHighlight>=0&&ddItems[ddHighlight]?(input.value=ddItems[ddHighlight].name,dd.style.display='none',ddHighlight=-1):submitGuess();}
  else if(e.key==='Escape')dd.style.display='none';
});
document.addEventListener('click',e=>{if(!e.target.closest('.input-area'))dd.style.display='none';});

function submitGuess(){
  if(done)return;
  const val=input.value.trim();
  if(!val){document.getElementById('msg').textContent='Type a player name first.';return;}
  const player=findPlayer(val);
  if(!player){document.getElementById('msg').textContent='"'+val+'" not found — try a different spelling or pick from the dropdown.';return;}
  if(guesses.find(g=>g.name===player.name)){document.getElementById('msg').textContent='Already guessed '+player.name+'!';return;}
  document.getElementById('msg').textContent='';
  guesses.push(player);attempts++;
  renderRows();
  document.getElementById('att-badge').textContent=(MAX-attempts)+' attempt'+(MAX-attempts!==1?'s':'')+' remaining';
  input.value='';dd.style.display='none';
  if(player.name===TARGET.name){done=true;showResult(true);}
  else if(attempts>=MAX){done=true;showResult(false);}
}

function showResult(won){
  document.getElementById('input-area').style.display='none';
  document.getElementById('att-badge').style.display='none';
  const r=document.getElementById('result');
  const attWord=attempts===1?'1 attempt':attempts+' attempts';
  r.innerHTML='<div class="result-banner '+(won?'win':'lose')+'">'
    +'<div class="rb-icon">'+(won?'🎉':'😔')+'</div>'
    +'<div class="rb-title">'+(won?'Congratulations!':'Unlucky!')+'</div>'
    +'<div class="rb-player">'+TARGET.name+'</div>'
    +'<div class="rb-sub">'+TARGET.pos+' · '+TARGET.team+' · '+TARGET.sport+'</div>'
    +'<div class="rb-sub" style="margin-top:4px">'+(won?'Guessed correctly in '+attWord:'Better luck tomorrow!')+'</div>'
    +'<button class="share-btn" onclick="copyShare()">Share result</button></div>';
}

function copyShare(){
  const e={g:'🟩',a:'🟨',o:'🟧',gr:'⬜'};
  const cats=['sport','pos','div','team','age'];
  const today=new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
  const won=done&&guesses.length&&guesses[guesses.length-1].name===TARGET.name;
  let txt='The Sportsman: US — '+today+'\n'+(won?attempts:'X')+'/'+MAX+'\n\n';
  guesses.forEach(g=>{const s=scoreGuess(g);txt+=cats.map(c=>e[s[c]]).join('')+'\n';});
  const b=document.querySelector('.share-btn');
  const finish=()=>{b.textContent='Copied!';setTimeout(()=>b.textContent='Share result',2000);};
  if(navigator.clipboard&&window.isSecureContext){
    navigator.clipboard.writeText(txt).then(finish).catch(()=>fbCopy(txt,finish));
  } else { fbCopy(txt,finish); }
}
function fbCopy(txt,cb){
  const ta=document.createElement('textarea');ta.value=txt;
  ta.style.cssText='position:fixed;top:-9999px;left:-9999px';
  document.body.appendChild(ta);ta.focus();ta.select();
  try{document.execCommand('copy');if(cb)cb();}catch(e){}
  document.body.removeChild(ta);
}
renderRows();
</script>
