<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Women's World Cup Winners — SportsStack</title>
<link rel="icon" href="/favicon.ico"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,700;0,800;0,900;1,900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet"/>

<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-TL0NM71G5M');</script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#04080f;--surface:#080f1c;--border:#0d2040;--border-bright:#1a3a6a;--gold:#f5c842;--green:#22c55e;--text:#e8f0fe;--text-muted:#7a9ab8;--text-dim:#4a6890;--red:#ef4444}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh}
nav{position:sticky;top:0;z-index:1000;display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border);background:rgba(4,8,15,.95);backdrop-filter:blur(8px)}
.site-header{max-width:680px;margin:0 auto;padding:32px 16px 20px;text-align:center}
.site-header h1{font-family:'Barlow Condensed',sans-serif;font-size:clamp(28px,6vw,44px);font-weight:900;font-style:italic;color:var(--gold);margin-bottom:6px}
.site-header .sub{font-size:14px;color:var(--text-muted);margin-bottom:16px}
.prog-wrap{max-width:400px;margin:0 auto 6px;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.prog-bar{height:100%;background:var(--gold);width:0%;transition:width .4s ease;border-radius:3px}
.prog-label{text-align:center;font-size:12px;font-weight:700;color:var(--text-muted);margin-bottom:24px;letter-spacing:.06em}

/* Input */
.input-area{max-width:480px;margin:0 auto 28px;padding:0 16px;display:flex;gap:8px}
.guess-input{flex:1;background:var(--surface);border:1.5px solid var(--border-bright);border-radius:10px;padding:13px 16px;color:var(--text);font-size:16px;font-family:'Barlow',sans-serif;outline:none;transition:border-color .15s}
.guess-input:focus{border-color:var(--gold)}
.guess-btn{padding:13px 20px;background:var(--gold);color:#04080f;border:none;border-radius:10px;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:900;letter-spacing:.06em;cursor:pointer;white-space:nowrap}
.guess-btn:hover{opacity:.9}

/* Toast */
.toast{text-align:center;height:22px;font-size:13px;font-weight:700;letter-spacing:.04em;margin-bottom:12px;transition:opacity .3s}
.toast.good{color:var(--green)}
.toast.bad{color:var(--red)}

/* Grid */
.players-grid{max-width:720px;margin:0 auto;padding:0 16px 60px;display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
@media(max-width:500px){.players-grid{grid-template-columns:repeat(2,1fr)}}

/* Cards */
.player-card{border-radius:12px;border:1.5px solid var(--border);background:var(--surface);padding:16px 12px;text-align:center;transition:all .3s;position:relative;min-height:90px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px}
.player-card.hidden{cursor:default}
.player-card.revealed{border-color:var(--card-color,var(--border-bright));background:rgba(0,0,0,.35)}
.player-card.revealed::before{content:'';position:absolute;inset:0;border-radius:10px;background:var(--card-color,transparent);opacity:.07;pointer-events:none}
.card-mystery{font-size:28px;margin-bottom:4px;filter:grayscale(1);opacity:.3}
.card-mystery-label{font-size:11px;color:var(--text-dim);font-weight:700;letter-spacing:.1em;text-transform:uppercase}
.card-name{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:900;color:var(--text);line-height:1.1;margin-bottom:2px}
.card-count{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;color:var(--card-color,var(--gold))}
.card-count-label{font-size:10px;font-weight:700;color:var(--text-muted);letter-spacing:.1em;text-transform:uppercase}
.card-last{font-size:10px;color:var(--text-dim);margin-top:2px}

/* Giveup */
.actions{text-align:center;margin:-12px 0 32px}
.btn-giveup{background:none;border:1.5px solid var(--border-bright);border-radius:8px;color:var(--text-muted);font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;padding:8px 20px;cursor:pointer}
.btn-giveup:hover{border-color:#3a6a9a;color:var(--text)}

/* Complete banner */
.complete-banner{max-width:480px;margin:0 auto 40px;padding:20px;background:rgba(34,197,94,.08);border:1.5px solid rgba(34,197,94,.35);border-radius:14px;text-align:center}
.complete-banner h2{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:900;color:var(--green);margin-bottom:4px}
.complete-banner p{font-size:14px;color:var(--text-muted)}
.timer-wrap{text-align:center;margin-bottom:14px}.timer{display:inline-flex;align-items:center;gap:6px;font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;letter-spacing:.08em;color:var(--text-muted);background:var(--surface);border:1.5px solid var(--border);border-radius:10px;padding:6px 18px;transition:color .3s,border-color .3s}.timer.warn{color:#f59e0b;border-color:#f59e0b}.timer.danger{color:var(--red);border-color:var(--red);animation:tick .5s infinite alternate}@keyframes tick{from{opacity:1}to{opacity:.6}}
</style>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400;1,9..144,600&display=swap" rel="stylesheet"/>
<style id="ss-pro">
/* ── SportsStack Pro upgrade: scoreboard header, editorial hints, match-report modal ── */

/* Scoreboard header */
.site-header{border-bottom:2px solid #3EAD5F!important;padding-bottom:20px!important;text-align:left!important;position:relative}
.site-header:before{content:attr(data-sport);font:700 10px/1 'Sora','Barlow Condensed',sans-serif;letter-spacing:.22em;text-transform:uppercase;color:#3EAD5F;display:block;margin-bottom:8px}
.game-title{text-align:left!important;font-size:clamp(24px,5vw,40px)!important}
.game-subtitle{text-align:left!important;max-width:640px}

/* Stats bar → match scoreboard */
.stats-bar{border:none!important;border-top:1px solid var(--border-bright,#1a3a6a)!important;border-bottom:1px solid var(--border-bright,#1a3a6a)!important;border-radius:0!important;background:transparent!important;padding:12px 4px!important}
.stat-val{font-size:30px!important}
.stat-label{letter-spacing:.16em!important}

/* Hint card typography: Fraunces italic for the reveal-worthy content */
.card-year,.card-rating{font-family:'Fraunces',Georgia,serif!important;font-weight:600!important;font-style:italic!important;letter-spacing:-.02em!important}
.card-club,.card-nat{font-family:'Fraunces',Georgia,serif!important;font-style:italic!important;font-weight:400!important}
.card-name-found,.card-name-revealed{font-family:'Fraunces',Georgia,serif!important;font-style:italic!important;font-weight:600!important;letter-spacing:-.01em!important}
.team-card{border-radius:4px!important}
.team-card:before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:#3EAD5F;opacity:.5}

/* Result modal → match report */
.modal{border-radius:4px!important;border-top:3px solid #3EAD5F!important;text-align:left!important;padding:28px 26px!important}
.modal:before{content:"Full Time · SportsStack";font:700 9.5px/1 'Sora','Barlow Condensed',sans-serif;letter-spacing:.22em;text-transform:uppercase;color:#3EAD5F;display:block;margin-bottom:14px}
.modal-icon{display:none!important}
.modal-title{text-align:left!important;font-size:32px!important}
.modal-score{text-align:left!important;font-family:'Fraunces',Georgia,serif!important;font-style:italic!important;font-size:22px!important;font-weight:600!important}
.modal-msg{text-align:left!important}
.share-btn{width:100%;border-radius:4px!important;background:#3EAD5F!important;color:#04080f!important;border:none!important;font-weight:900!important}
.btn-replay{border-radius:4px!important}
</style>
</head>
<body>
<nav>
  <a href="index.html" style="text-decoration:none;display:block;flex-shrink:0" aria-label="SportsStack home">
    <img src="LOGO.jpeg" alt="SportsStack" width="48" height="48" style="display:block;border-radius:8px"/>
  </a>
  <div style="display:flex;align-items:center;gap:8px">
    <div id="ss-member-widget"></div>
  </div>
</nav>

<div class="site-header" data-sport="Football" style="--sport-accent:#3EAD5F">
  <h1>Women's World Cup Winners</h1>
  <p class="sub">Name every nation to win the Women's World Cup since 1991 — 5 winners</p>
  <div class="prog-wrap"><div class="prog-bar" id="prog-bar"></div></div>
  <div class="prog-label" id="prog-label">0 / 5 revealed</div>
</div>

<div class="timer-wrap"><div class="timer" id="quiz-timer">⏱ 4:00</div></div>
<div class="input-area">
  <input class="guess-input" id="guess-input" type="text" placeholder="Type a player name..." autocomplete="off" autocorrect="off" spellcheck="false"/>
  <button class="guess-btn" onclick="submitGuess()">Guess</button>
</div>
<div class="toast" id="toast"></div>

<div class="actions">
  <button class="btn-giveup" id="btn-giveup" onclick="giveUp()">Give Up</button>
</div>

<div id="complete-banner" style="display:none" class="complete-banner">
  <h2>⚽ Complete!</h2>
  <p id="complete-msg"></p>
</div>

<div class="players-grid" id="grid"></div>

<script>
const PLAYERS = [
  {name:"USA",color:"#f5c842",count:4,last:2019,scores:["1991","1999","2015","2019"],accepted:["usa","united states","united states of america","uswnt","america"]},
  {name:"Germany",color:"#60a5fa",count:2,last:2007,scores:["2003","2007"],accepted:["germany","deutschland"]},
  {name:"Spain",color:"#f97316",count:1,last:2023,scores:["2023"],accepted:["spain","espana","espana"]},
  {name:"Japan",color:"#ef4444",count:1,last:2011,scores:["2011"],accepted:["japan"]},
  {name:"Norway",color:"#22c55e",count:1,last:1995,scores:["1995"],accepted:["norway"]},
];

var revealed = new Set();
var givenUp = false;
var startTime = Date.now();
var toastTimer = null;

function levenshtein(a, b) {
  var m = a.length, n = b.length;
  var dp = [];
  for (var i = 0; i <= m; i++) { dp[i] = [i]; }
  for (var j = 0; j <= n; j++) { dp[0][j] = j; }
  for (var i = 1; i <= m; i++) {
    for (var j = 1; j <= n; j++) {
      dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1] :
        1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
    }
  }
  return dp[m][n];
}

function normalise(s) { return s.toLowerCase().trim().replace(/[^a-z\s]/g, ''); }

function findMatch(input) {
  var norm = normalise(input);
  if (!norm) return null;
  for (var i = 0; i < PLAYERS.length; i++) {
    var p = PLAYERS[i];
    if (revealed.has(i)) continue;
    for (var j = 0; j < p.accepted.length; j++) {
      var acc = normalise(p.accepted[j]);
      if (norm === acc || levenshtein(norm, acc) <= 1) return i;
    }
  }
  return null;
}

function buildGrid() {
  var grid = document.getElementById('grid');
  grid.innerHTML = '';
  PLAYERS.forEach(function(p, i) {
    var card = document.createElement('div');
    card.className = 'player-card hidden';
    card.id = 'card-' + i;
    card.innerHTML =
      '<div class="card-mystery">⚽</div>' +
      '<div class="card-mystery-label">Unrevealed</div>';
    grid.appendChild(card);
  });
}

function revealCard(idx, missed) {
  var p = PLAYERS[idx];
  var card = document.getElementById('card-' + idx);
  card.className = 'player-card revealed' + (missed ? ' missed' : '');
  card.style.setProperty('--card-color', p.color);
  if (missed) card.style.borderColor = 'rgba(239,68,68,.4)';
  card.innerHTML =
    '<div class="card-name">' + p.name + '</div>' +
    '<div class="card-count">'+(p.count>1?p.count+' titles':p.scores[0])+'</div>';
}

function updateProgress() {
  var n = revealed.size;
  var total = PLAYERS.length;
  var pct = n / total * 100;
  document.getElementById('prog-bar').style.width = pct + '%';
  document.getElementById('prog-label').textContent = n + ' / ' + total + ' revealed';
  if (n === total && !givenUp) {
    var secs = Math.round((Date.now() - startTime) / 1000);
    var mins = Math.floor(secs / 60);
    var s = secs % 60;
    document.getElementById('complete-banner').style.display = 'block';
    document.getElementById('complete-msg').textContent =
      'All 5 found in ' + (mins > 0 ? mins + 'm ' : '') + s + 's. Incredible!';
    document.getElementById('btn-giveup').style.display = 'none';
    document.getElementById('guess-input').disabled = true;
    if (typeof saveResult === 'function') saveResult('womens-world-cup','Women\'s World Cup Winners', 23, 23, true);
  }
}

function showToast(msg, good) {
  clearTimeout(toastTimer);
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + (good ? 'good' : 'bad');
  t.style.opacity = '1';
  toastTimer = setTimeout(function() { t.style.opacity = '0'; }, 1800);
}

function submitGuess() {
  if (givenUp) return;
  var input = document.getElementById('guess-input');
  var val = input.value.trim();
  if (!val) return;
  var idx = findMatch(val);
  if (idx !== null) {
    revealed.add(idx);
    revealCard(idx, false);
    updateProgress();
    showToast('✓ ' + PLAYERS[idx].name + '!', true);
    input.value = '';
  } else {
    showToast('No match — try again', false);
    input.select();
  }
}

function giveUp() {
  if (givenUp) return;
  givenUp = true;
  PLAYERS.forEach(function(p, i) {
    if (!revealed.has(i)) revealCard(i, true);
  });
  document.getElementById('btn-giveup').style.display = 'none';
  document.getElementById('guess-input').disabled = true;
  var n = revealed.size;
  showToast('Revealed — you got ' + n + ' / ' + PLAYERS.length, false);
  if (typeof saveResult === 'function') saveResult('womens-world-cup','Women\'s World Cup Winners', Math.round(n/PLAYERS.length*50), 50, n === PLAYERS.length);
}

document.getElementById('guess-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') submitGuess();
});

var timerSeconds=240,timerInterval=null;
function startTimer(){clearInterval(timerInterval);timerSeconds=240;updateTimerDisplay();timerInterval=setInterval(function(){timerSeconds--;updateTimerDisplay();if(timerSeconds<=0){clearInterval(timerInterval);giveUp();}},1000);}
function updateTimerDisplay(){var el=document.getElementById('quiz-timer');if(!el)return;var m=Math.floor(timerSeconds/60),s=timerSeconds%60;el.textContent='⏱ '+m+':'+(s<10?'0':'')+s;el.className='timer'+(timerSeconds<=30?' danger':timerSeconds<=90?' warn':'');}
buildGrid();
startTimer();
</script>
</body>
</html>
