<style>
:root{
  --bg:#04080f;--surface:#080f1c;--surface2:#0d1829;--surface3:#122035;
  --blue:#2563eb;--blue-light:#3b82f6;
  --gold:#f5c842;
  --green:#22c55e;--green-bg:rgba(34,197,94,.09);--green-border:rgba(34,197,94,.45);
  --red:#ef4444;--red-bg:rgba(239,68,68,.07);--red-border:rgba(239,68,68,.4);
  --text:#e8f0fe;--text-muted:#6b8abf;--text-dim:#1e3355;
  --border:#0d2040;--border-bright:#1a3a6a;
  --radius:10px;--radius-lg:16px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif}
.page{max-width:960px;margin:0 auto;padding:22px 14px 56px}
.site-header{text-align:center;padding-bottom:16px;border-bottom:1px solid var(--border);margin-bottom:18px}
.game-title{font-family:'Barlow Condensed',sans-serif;font-size:clamp(18px,4vw,34px);font-weight:900;letter-spacing:.04em;text-transform:uppercase;line-height:1.1}
.game-title .hl{color:var(--gold)}
.game-subtitle{font-size:12px;color:var(--text-muted);letter-spacing:.1em;text-transform:uppercase;margin-top:5px}
.stats-bar{display:flex;align-items:center;justify-content:space-between;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:11px 20px;margin-bottom:16px;gap:10px;flex-wrap:wrap}
.stat-item{text-align:center;flex:1;min-width:72px}
.stat-val{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:900;line-height:1;color:var(--gold)}
.stat-val.urgent{color:var(--red);animation:pulse .8s infinite}
.stat-val.green{color:var(--green)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.stat-label{font-size:10px;color:var(--text-muted);letter-spacing:.1em;text-transform:uppercase;margin-top:3px}
.stat-divider{width:1px;height:38px;background:var(--border-bright);flex-shrink:0}
.prog-wrap{height:4px;background:rgba(255,255,255,.06);border-radius:99px;margin-bottom:16px;overflow:hidden}
.prog-bar{height:100%;background:linear-gradient(90deg,var(--blue-light),var(--gold));border-radius:99px;transition:width .4s ease}
.input-wrap{position:relative;margin-bottom:16px}
.guess-input{width:100%;font-size:16px;padding:13px 18px;border:1.5px solid var(--border-bright);border-radius:var(--radius);background:var(--surface2);color:var(--text);outline:none;font-family:'Barlow',sans-serif;transition:border-color .15s}
.guess-input:focus{border-color:var(--blue-light);box-shadow:0 0 0 3px rgba(59,130,246,.1)}
.guess-input::placeholder{color:var(--text-dim)}
.guess-input:disabled{opacity:.4;cursor:not-allowed}
.suggestions{position:absolute;top:100%;left:0;right:0;background:var(--surface2);border:1px solid var(--gold);border-radius:var(--radius);z-index:99;margin-top:3px;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,.45)}
.suggestion-label{font-size:11px;color:var(--gold);padding:7px 14px 3px;letter-spacing:.08em;text-transform:uppercase;font-weight:700;border-bottom:1px solid var(--border)}
.suggestion-item{padding:10px 14px;font-size:14px;color:var(--text);cursor:pointer;display:flex;align-items:center;gap:10px;transition:background .12s}
.suggestion-item:hover{background:var(--surface3)}
.sug-badge{font-size:10px;color:var(--gold);background:rgba(245,200,66,.1);border:1px solid rgba(245,200,66,.25);border-radius:4px;padding:2px 7px;font-weight:700;flex-shrink:0}
.team-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:9px}
@media(max-width:640px){.team-grid{grid-template-columns:repeat(3,1fr);gap:7px}}
@media(max-width:400px){.team-grid{grid-template-columns:repeat(2,1fr);gap:6px}}
.team-card{aspect-ratio:1/1;border-radius:var(--radius);border:1.5px solid var(--border-bright);background:var(--surface2);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:8px 6px;transition:all .35s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden;cursor:default}
.team-card::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(59,130,246,.06),transparent 70%);pointer-events:none}
.card-year{font-family:'Barlow Condensed',sans-serif;font-size:clamp(20px,4vw,30px);font-weight:900;color:var(--text-dim);line-height:1;margin-bottom:5px}
.card-trophy{font-size:clamp(18px,3.5vw,24px);opacity:.18;margin-bottom:3px}
.card-dots{display:flex;gap:3px;justify-content:center;margin-top:4px}
.card-dot{width:5px;height:5px;border-radius:50%;background:var(--text-dim)}
.team-card.found{background:var(--green-bg);border-color:var(--green-border);box-shadow:0 0 16px rgba(34,197,94,.12)}
.team-card.found::before{background:radial-gradient(ellipse at 50% 0%,rgba(34,197,94,.08),transparent 70%)}
.card-year-found{font-family:'Barlow Condensed',sans-serif;font-size:clamp(9px,1.6vw,12px);font-weight:700;color:#4ade80;letter-spacing:.08em;margin-bottom:2px}
.card-name-found{font-family:'Barlow Condensed',sans-serif;font-size:clamp(10px,1.9vw,14px);font-weight:800;color:#86efac;letter-spacing:.03em;line-height:1.2;margin-bottom:2px}
.card-detail-found{font-size:clamp(7px,1.2vw,10px);color:#4ade80;letter-spacing:.05em;line-height:1.3}
.card-trophy-found{font-size:clamp(12px,2vw,16px);margin-bottom:3px}
.team-card.revealed{background:var(--red-bg);border-color:var(--red-border)}
.card-year-revealed{font-family:'Barlow Condensed',sans-serif;font-size:clamp(9px,1.6vw,12px);font-weight:700;color:rgba(239,68,68,.7);letter-spacing:.08em;margin-bottom:2px}
.card-name-revealed{font-family:'Barlow Condensed',sans-serif;font-size:clamp(10px,1.9vw,14px);font-weight:800;color:var(--red);letter-spacing:.03em;line-height:1.2;margin-bottom:2px}
.card-detail-revealed{font-size:clamp(7px,1.2vw,10px);color:rgba(239,68,68,.7);letter-spacing:.05em;line-height:1.3}
.modal-backdrop{position:fixed;inset:0;background:rgba(4,8,15,.85);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:999;opacity:0;pointer-events:none;transition:opacity .3s}
.modal-backdrop.show{opacity:1;pointer-events:all}
.modal{background:var(--surface2);border:1px solid var(--border-bright);border-radius:var(--radius-lg);padding:32px 28px;max-width:420px;width:90%;text-align:center}
.modal.win{border-color:var(--green-border);background:rgba(34,197,94,.05)}
.modal.lose{border-color:var(--red-border);background:var(--red-bg)}
.modal-icon{font-size:48px;margin-bottom:12px}
.modal-title{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:900;letter-spacing:.04em;text-transform:uppercase;margin-bottom:8px}
.modal.win .modal-title{color:#86efac}
.modal.lose .modal-title{color:#fca5a5}
.modal-score{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;color:var(--gold);margin-bottom:12px}
.modal-msg{font-size:15px;color:var(--text-muted);line-height:1.65;margin-bottom:20px}
.modal-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.modal-btn{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;padding:12px 28px;border-radius:50px;cursor:pointer;border:none;transition:all .2s}
.modal-btn.primary{background:var(--gold);color:var(--bg)}
.modal-btn.primary:hover{background:#ffd700;transform:translateY(-1px)}
.modal-btn.secondary{background:transparent;color:var(--text);border:1.5px solid var(--border-bright)}
.modal-btn.secondary:hover{background:rgba(255,255,255,.06)}

.hud{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.hud-pill{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:6px 16px;border-radius:20px;background:var(--surface2);border:1px solid var(--border-bright);color:var(--text-muted)}
.hud-pill span{color:var(--gold)}
.timer-pill.urgent span{color:var(--red)!important}
</style>
</head>
<body>
<nav>
  <a href="index.html" style="text-decoration:none;display:block;flex-shrink:0" aria-label="SportsStack home">
    <img src="logo.png" alt="SportsStack" width="48" height="48" style="display:block;border-radius:8px"/>
  </a>
  <div style="display:flex;align-items:center;gap:8px">
    <a href="leaderboard.html" class="btn-lb">Leaderboard</a>
    <div id="ss-member-widget"></div>
  </div>
</nav>
<div class="page">
  <header class="site-header">
    <div class="game-title">Champions League <span class="hl">Final Host Cities</span></div>
    <div class="game-subtitle">Name every city that has hosted a UCL final since 2000 · typing a city reveals all finals held there · 5 minutes</div>
  </header>

  <div class="stats-bar">
    <div class="stat-item">
      <div class="stat-val green" id="score">0</div>
      <div class="stat-label">Found</div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
      <div class="stat-val" id="remain-count">26</div>
      <div class="stat-label">Remaining</div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
      <div class="stat-val" id="timer-pill"><span id="timer">5:00</span></div>
      <div class="stat-label">Time Left</div>
    </div>
  </div>

  <div class="prog-wrap"><div class="prog-bar" id="prog-bar" style="width:0%"></div></div>

  <div class="input-wrap">
    <input id="guess-input" class="guess-input" type="text" placeholder="Type a city and press Enter…" autocomplete="off" spellcheck="false"/>
    <div id="sugg-box" class="suggestions" style="display:none"></div>
  </div>

  <div id="msg" style="text-align:center;font-size:13px;color:var(--gold);min-height:20px;margin-bottom:8px;font-family:'Barlow Condensed',sans-serif;letter-spacing:.06em;font-weight:700"></div>

  <button id="give-up-btn" onclick="giveUp()" style="display:block;margin:0 auto 16px;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;background:transparent;color:var(--text-muted);border:1px solid var(--border-bright);padding:8px 20px;border-radius:8px;cursor:pointer;">Give up &amp; reveal</button>

  <div class="team-grid" id="team-grid"></div>
</div>

<div class="modal-backdrop" id="modal-backdrop">
  <div class="modal" id="modal">
    <div class="modal-icon" id="modal-icon"></div>
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-score" id="modal-score"></div>
    <div class="modal-msg" id="modal-msg"></div>
    <div class="modal-btns">
      <button class="modal-btn primary" onclick="resetQuiz()">Play Again</button>
      <button class="modal-btn secondary" onclick="closeModal()">See Results</button>
    </div>
  </div>
</div>

<script>

const ENTRIES=[  {id:1,year:"2000",name:"Paris",accepted:["paris","stade de france"],detail:"Stade de France"},
  {id:2,year:"2001",name:"Milan",accepted:["milan","san siro","giuseppe meazza"],detail:"San Siro"},
  {id:3,year:"2002",name:"Glasgow",accepted:["glasgow","hampden","hampden park"],detail:"Hampden Park"},
  {id:4,year:"2003",name:"Manchester",accepted:["manchester","old trafford"],detail:"Old Trafford"},
  {id:5,year:"2004",name:"Gelsenkirchen",accepted:["gelsenkirchen","arena auf schalke","veltins"],detail:"Arena AufSchalke"},
  {id:6,year:"2005",name:"Istanbul",accepted:["istanbul","ataturk","ataturk olympic"],detail:"Ataturk Stadium"},
  {id:7,year:"2006",name:"Paris",accepted:["paris","stade de france"],detail:"Stade de France"},
  {id:8,year:"2007",name:"Athens",accepted:["athens","olympic athens"],detail:"Olympic Stadium"},
  {id:9,year:"2008",name:"Moscow",accepted:["moscow","luzhniki"],detail:"Luzhniki Stadium"},
  {id:10,year:"2009",name:"Rome",accepted:["rome","stadio olimpico","olimpico"],detail:"Stadio Olimpico"},
  {id:11,year:"2010",name:"Madrid",accepted:["madrid","bernabeu","santiago bernabeu"],detail:"Santiago Bernabeu"},
  {id:12,year:"2011",name:"London",accepted:["london","wembley"],detail:"Wembley Stadium"},
  {id:13,year:"2012",name:"Munich",accepted:["munich","allianz arena","allianz"],detail:"Allianz Arena"},
  {id:14,year:"2013",name:"London",accepted:["london","wembley"],detail:"Wembley Stadium"},
  {id:15,year:"2014",name:"Lisbon",accepted:["lisbon","da luz","estadio da luz"],detail:"Estadio da Luz"},
  {id:16,year:"2015",name:"Berlin",accepted:["berlin","olympiastadion"],detail:"Olympiastadion"},
  {id:17,year:"2016",name:"Milan",accepted:["milan","san siro","giuseppe meazza"],detail:"San Siro"},
  {id:18,year:"2017",name:"Cardiff",accepted:["cardiff","national stadium wales","millennium"],detail:"National Stadium Wales"},
  {id:19,year:"2018",name:"Kiev",accepted:["kiev","kyiv","olympiyskiy"],detail:"Olympic Stadium"},
  {id:20,year:"2019",name:"Madrid",accepted:["madrid","metropolitano","wanda metropolitano"],detail:"Wanda Metropolitano"},
  {id:21,year:"2020",name:"Lisbon",accepted:["lisbon","da luz","estadio da luz"],detail:"Estadio da Luz"},
  {id:22,year:"2021",name:"Porto",accepted:["porto","dragao","estadio do dragao"],detail:"Estadio do Dragao"},
  {id:23,year:"2022",name:"Paris",accepted:["paris","stade de france"],detail:"Stade de France"},
  {id:24,year:"2023",name:"Istanbul",accepted:["istanbul","ataturk","ataturk olympic"],detail:"Ataturk Stadium"},
  {id:25,year:"2024",name:"London",accepted:["london","wembley"],detail:"Wembley Stadium"},
  {id:26,year:"2025",name:"Munich",accepted:["munich","allianz arena","allianz"],detail:"Allianz Arena"}];
const TOTAL=ENTRIES.length, TOTAL_SECS=300;
let secsLeft=TOTAL_SECS, timerInterval=null, foundIds=new Set(), gameActive=false;

function norm(s){return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9\s]/g,'').trim();}
function lev(a,b){const m=a.length,n=b.length;if(!m)return n;if(!n)return m;const dp=Array.from({length:m+1},(_,i)=>Array.from({length:n+1},(_,j)=>j===0?i:i===0?j:0));for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);return dp[m][n];}

function revealCard(e){
  if(foundIds.has(e.id))return;
  foundIds.add(e.id);
  const card=document.getElementById('card-'+e.id);
  if(!card)return;
  card.className='team-card found';
  card.innerHTML=`<div class="card-trophy-found">🏆</div>
    <div class="card-year-found">${e.year}</div>
    <div class="card-name-found">${e.name}</div>
    <div class="card-detail-found">${e.detail}</div>`;
}

function fillAllMatching(acc){
  ENTRIES.forEach(e=>{
    if(e.accepted.some(a=>acc.includes(a)))revealCard(e);
  });
  updateHUD();
  if(foundIds.size===TOTAL)endGame(true);
}

function updateHUD(){
  document.getElementById('remain-count').textContent=TOTAL-foundIds.size;
  document.getElementById('score').textContent=foundIds.size;
  var pb=document.getElementById('prog-bar');if(pb)pb.style.width=(foundIds.size/TOTAL*100)+'%';

  var _tm=document.getElementById('timer');if(_tm){var _m=Math.floor(secsLeft/60),_s=secsLeft%60;_tm.textContent=_m+':'+(_s<10?'0':'')+_s;}
}

function hideSugg(){document.getElementById('sugg-box').style.display='none';document.getElementById('sugg-box').innerHTML='';}

function tryGuess(val){
  if(!gameActive||!val.trim())return;
  const nv=norm(val);
  for(const e of ENTRIES){
    if(e.accepted.some(a=>norm(a)===nv)){
      fillAllMatching(e.accepted);
      document.getElementById('guess-input').value='';
      hideSugg();
      return;
    }
  }
  // fuzzy suggestions
  const seen=new Set(),fm=[];
  for(const e of ENTRIES){
    if(foundIds.has(e.id)||seen.has(e.name))continue;
    if(e.accepted.some(a=>{const na=norm(a);return nv.length>=3&&(na.startsWith(nv)||lev(nv,na)<=2);})){
      fm.push(e);seen.add(e.name);
    }
    if(fm.length>=3)break;
  }
  const box=document.getElementById('sugg-box');
  if(fm.length){
    box.innerHTML=fm.map(m=>`<div class="sugg-item" data-acc='${JSON.stringify(m.accepted)}'>→ ${m.name}</div>`).join('');
    box.style.display='block';
    box.querySelectorAll('.sugg-item').forEach(el=>el.addEventListener('mousedown',ev=>{
      ev.preventDefault();
      fillAllMatching(JSON.parse(el.dataset.acc));
      document.getElementById('guess-input').value='';
      hideSugg();
    }));
  }else hideSugg();
}

function startTimer(){
  gameActive=true;
  timerInterval=setInterval(()=>{
    secsLeft--;
    const m=Math.floor(secsLeft/60),s=secsLeft%60;
    document.getElementById('timer').textContent=m+':'+String(s).padStart(2,'0');
    if(secsLeft<=30)document.getElementById('timer').parentElement.classList.add('urgent');
    if(secsLeft<=0){clearInterval(timerInterval);endGame(false);}
  },1000);
}

function giveUp(){
  clearInterval(timerInterval);gameActive=false;hideSugg();
  ENTRIES.forEach(e=>{
    if(!foundIds.has(e.id)){
      const card=document.getElementById('card-'+e.id);
      if(card){
        card.className='team-card revealed';
        card.innerHTML=`<div class="card-trophy" style="opacity:.22">🏆</div>
          <div class="card-year-revealed">${e.year}</div>
          <div class="card-name-revealed">${e.name}</div>
          <div class="card-detail-revealed">${e.detail}</div>`;
      }
    }
  });
  endGame(false,true);
}

function endGame(won,gaveUp=false){
  gameActive=false;clearInterval(timerInterval);hideSugg();
  document.getElementById('give-up-btn').style.display='none';
  if(!won&&!gaveUp)ENTRIES.forEach(e=>{
    if(!foundIds.has(e.id)){
      const card=document.getElementById('card-'+e.id);
      if(card){
        card.className='team-card revealed';
        card.innerHTML=`<div class="card-trophy" style="opacity:.22">🏆</div>
          <div class="card-year-revealed">${e.year}</div>
          <div class="card-name-revealed">${e.name}</div>
          <div class="card-detail-revealed">${e.detail}</div>`;
      }
    }
  });
  const w='🏆',l='⏱';
  document.getElementById('result').innerHTML=`<div class="result-banner ${won?'win':'lose'}">
    <div class="rb-icon">${won?w:l}</div>
    <div class="rb-title">${won?'Perfect!':(gaveUp?'Better Luck Next Time':'Time\'s Up!')}</div>
    <div class="rb-sub">${foundIds.size} / ${TOTAL} correct</div>
    <button class="share-btn" onclick="copyResult()">Share result</button>
  </div>`;
}

function copyResult(){
  const txt='SportsStack — Champions League Final Host Cities Since 2000\n'+foundIds.size+'/'+TOTAL+'\nsportsstack.com.au';
  navigator.share?(navigator.share({text:txt}).catch(()=>{}),undefined):navigator.clipboard&&navigator.clipboard.writeText(txt).then(()=>{
    const b=document.querySelector('.share-btn');b.textContent='Copied!';
    setTimeout(()=>b.textContent='Share result',2000);
  });
}

const inp=document.getElementById('guess-input');
inp.addEventListener('input',ev=>{if(gameActive)tryGuess(ev.target.value);});
inp.addEventListener('keydown',ev=>{if(ev.key==='Enter')tryGuess(ev.target.value);if(ev.key==='Escape')hideSugg();});
document.addEventListener('click',ev=>{if(!ev.target.closest('.input-wrap'))hideSugg();});
gameActive=true;startTimer();

</script>
<script src="sportstack-member.js?v=4"></script>
