<style>

.guess-input:focus{border-color:var(--blue-light);box-shadow:0 0 0 3px rgba(59,130,246,.1)}

<script>
// All-time franchise TD leaders (rushing + receiving TDs scored; passing TDs thrown not counted).
// Sorted alphabetically by franchise. TD counts from Pro Football Reference.
// accepted[]: last name ✓ | full name ✓ | iconic first names & nicknames ✓
const PLAYERS = [
  {
    id:1,  team:"Arizona Cardinals",      name:"Larry Fitzgerald",        tds:122,
    accepted:["fitzgerald","larry fitzgerald"]
  },
  {
    id:2,  team:"Atlanta Falcons",         name:"Roddy White",             tds:63,

  },
  {
    id:3,  team:"Baltimore Ravens",        name:"Jamal Lewis",             tds:57,
    accepted:["lewis","jamal lewis"]
  },
  {
    id:4,  team:"Buffalo Bills",           name:"Thurman Thomas",          tds:88,

    // "Thurman" is quite distinctive in NFL context
  },
  {
    id:5,  team:"Carolina Panthers",       name:"Steve Smith Sr.",         tds:67,
    accepted:["smith","steve smith","steve smith sr","steve smith sr.","smitty"]
    // "Smitty" was his nickname; "Steve Smith" accepted (Sr. not required)
  },
  {

    // "Sweetness" is his iconic nickname

    // Prolific goal-line back in the early 80s; "Pete" not iconic enough alone
  },
  {
    id:8,  team:"Cleveland Browns",        name:"Jim Brown",               tds:126,
    accepted:["brown","jim brown"]
    // "Jim" too generic alongside other NFL Jims
  },
  {
    id:9,  team:"Dallas Cowboys",          name:"Emmitt Smith",            tds:164,
    accepted:["smith","emmitt smith","emmitt"]
    // "Emmitt" is distinctive and iconic
  },
  {
    id:10, team:"Denver Broncos",          name:"Rod Smith",               tds:68,
    accepted:["smith","rod smith","rodsmith"]
    // Long-time Broncos WR; "Rod" not iconic enough alone
  },
  {
    id:11, team:"Detroit Lions",           name:"Barry Sanders",           tds:109,
    accepted:["sanders","barry sanders","barry"]
    // "Barry" is strongly associated with Sanders in NFL context
  },
  {
    id:12, team:"Green Bay Packers",       name:"Don Hutson",              tds:105,
    accepted:["hutson","don hutson"]
    // Greatest receiver of his era; "Don" too generic
  },
  {
    id:13, team:"Houston Texans",          name:"Andre Johnson",           tds:64,
    accepted:["johnson","andre johnson","dre"]
    // "Dre" was his nickname
  },
  {
    id:14, team:"Indianapolis Colts",      name:"Marvin Harrison",         tds:128,
    accepted:["harrison","marvin harrison","marvin"]
    // "Marvin" distinctive in NFL WR context
  },
  {
    id:15, team:"Jacksonville Jaguars",    name:"Maurice Jones-Drew",      tds:68,
    accepted:["jones-drew","jones drew","maurice jones-drew","maurice jones drew","mjd","maurice"]
    // MJD is his famous initialism; "Maurice" quite distinctive
  },
  {
    id:16, team:"Kansas City Chiefs",      name:"Priest Holmes",           tds:83,
    accepted:["holmes","priest holmes","priest"]
    // "Priest" is highly distinctive
  },
  {
    id:17, team:"Las Vegas Raiders",       name:"Tim Brown",               tds:99,
    accepted:["brown","tim brown","mr. raider","mr raider"]
    // "Tim Brown" is the correct answer; last name shared with Jim Brown (Browns)
  },
  {
    id:18, team:"Los Angeles Chargers",    name:"LaDainian Tomlinson",     tds:145,
    accepted:["tomlinson","ladainian tomlinson","lt","ldt"]
    // LT is one of the most iconic nicknames in NFL history
  },
  {
    id:19, team:"Los Angeles Rams",        name:"Marshall Faulk",          tds:136,
    accepted:["faulk","marshall faulk"]
  },
  {
    id:20, team:"Miami Dolphins",          name:"Mark Clayton",            tds:82,
    accepted:["clayton","mark clayton"]
    // Long-time Dolphins WR; "Mark" too generic
  },
  {
    id:21, team:"Minnesota Vikings",       name:"Cris Carter",             tds:110,
    accepted:["carter","cris carter","cris"]
    // "Cris" spelling is distinctive (not Chris); accepted either way
  },
  {
    id:22, team:"New England Patriots",    name:"Rob Gronkowski",          tds:80,
    accepted:["gronkowski","rob gronkowski","gronk"]
    // "Gronk" is one of the most recognised NFL nicknames
  },
  {
    id:23, team:"New Orleans Saints",      name:"Alvin Kamara",            tds:102,
    accepted:["kamara","alvin kamara","ak","ak41"]
    // "AK" is his nickname; Kamara surpassed Colston's 72 around 2023
  },
  {
    id:24, team:"New York Giants",         name:"Tiki Barber",             tds:79,
    accepted:["barber","tiki barber","tiki"]
    // "Tiki" is highly distinctive
  },
  {
    id:25, team:"New York Jets",           name:"Don Maynard",             tds:88,
    accepted:["maynard","don maynard"]
    // Original AFL/Jets legend; "Don" too generic
  },

  },

    id:27, team:"Pittsburgh Steelers",     name:"Franco Harris",           tds:100,
    accepted:["harris","franco harris","franco"]
    // "Franco" is highly distinctive and iconic
  },
  {
    id:28, team:"San Francisco 49ers",     name:"Jerry Rice",              tds:187,
    accepted:["rice","jerry rice","jerry"]
    // "Jerry" strongly associated with Rice in NFL GOAT context
  },
  {
    id:29, team:"Seattle Seahawks",        name:"Steve Largent",           tds:101,
    accepted:["largent","steve largent"]
    // Seahawks legend; "Steve" too generic
  },
  {
    id:30, team:"Tampa Bay Buccaneers",    name:"Mike Evans",              tds:100,
    accepted:["evans","mike evans","mike"]
    // Evans reached 100 TDs for TB around 2024-25; "Mike" accepted as distinctive for Bucs fans
  },
  {
    id:31, team:"Tennessee Titans",        name:"Earl Campbell",           tds:81,
    accepted:["campbell","earl campbell","earl","the tyler rose","tyler rose"]
    // "Earl" is distinctive in Titans/Oilers context; "Tyler Rose" was his nickname
  },
  {
    id:32, team:"Washington Commanders",   name:"John Riggins",            tds:104,
    accepted:["riggins","john riggins","the diesel","diesel"]
    // "The Diesel" was his famous nickname
  },
];

const TOTAL = PLAYERS.length;
const TOTAL_SECS = 300; // 5 minutes for 32 teams
let secsLeft = TOTAL_SECS, timer = null, found = new Set(), gameActive = false;

function norm(s){
  return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9\s]/g,'').trim();
}
function levenshtein(a, b){
  const m=a.length, n=b.length;
  const dp=Array.from({length:m+1},(_,i)=>Array.from({length:n+1},(_,j)=>i===0?j:j===0?i:0));
  for(let i=1;i<=m;i++) for(let j=1;j<=n;j++)
    dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[m][n];
}
function isExactMatch(val, p){
  const nv = norm(val);
  return p.accepted.map(norm).some(a => a === nv);
}
function getFuzzySuggestions(val){
  if(val.length < 2) return [];
  const nv = norm(val);
  const results = [];
  for(const p of PLAYERS){
    if(found.has(p.id)) continue;
    const minDist = Math.min(...p.accepted.map(a => levenshtein(nv, norm(a))));
    if(minDist >= 1 && minDist <= 2) results.push({p, dist: minDist});
  }
  return results.sort((a,b) => a.dist - b.dist).slice(0,1).map(r => r.p);
}

function fmt(n){ return n.toLocaleString(); }

function cardInner(p, state){
  if(state==='found'){
    return `<div class="card-team-found">${p.team}</div>
      <div class="card-name-found">${p.name}</div>
      <div class="card-tds-found">${fmt(p.tds)}</div>
      <div class="card-tds-label">franchise TDs</div>`;
  }
  if(state==='revealed'){
    return `<div class="card-team-revealed">${p.team}</div>
      <div class="card-name-revealed">${p.name}</div>
      <div class="card-tds-revealed">${fmt(p.tds)}</div>
      <div class="card-tds-label-rev">franchise TDs</div>`;
  }
  return `<div class="card-team">${p.team}</div>
    <div class="card-tds-hidden">${fmt(p.tds)} TDs</div>
    <div class="card-dots"><span class="card-dot"></span><span class="card-dot"></span><span class="card-dot"></span></div>`;
}

function renderGrid(){
  const grid = document.getElementById('team-grid');
  grid.innerHTML = '';
  for(const p of PLAYERS){
    const isFound = found.has(p.id);
    const card = document.createElement('div');
    card.className = 'team-card' + (isFound ? ' found' : '');
    card.id = 'card-' + p.id;
    card.innerHTML = cardInner(p, isFound ? 'found' : 'hidden');
    grid.appendChild(card);
  }
}
function revealCard(p){
  const card = document.getElementById('card-' + p.id);
  if(!card) return;
  card.className = 'team-card found';
  card.innerHTML = cardInner(p, 'found');
}
function revealAllMissed(){
  for(const p of PLAYERS){
    if(!found.has(p.id)){
      const card = document.getElementById('card-' + p.id);
      if(!card) continue;
      card.className = 'team-card revealed';
      card.innerHTML = cardInner(p, 'revealed');
    }
  }
}

function updateHUD(){
  document.getElementById('found-count').textContent = found.size;
  document.getElementById('remain-count').textContent = TOTAL - found.size;
  document.getElementById('prog-bar').style.width = (found.size / TOTAL * 100) + '%';
  const m = Math.floor(secsLeft/60), s = secsLeft % 60;
  const el = document.getElementById('timer-display');
  el.textContent = m + ':' + String(s).padStart(2,'0');
  el.className = 'stat-val' + (secsLeft <= 30 ? ' urgent' : '');
}

function hideSuggestions(){ document.getElementById('suggestions').style.display = 'none'; }
function showSuggestions(matches){
  const box = document.getElementById('suggestions');
  if(!matches.length){ hideSuggestions(); return; }
  box.innerHTML = '<div class="suggestion-label">Did you mean…</div>';
  matches.forEach(p => {
    const item = document.createElement('div');
    item.className = 'suggestion-item';
    item.innerHTML = `<span>${p.name}</span><span class="sug-badge">${p.team}</span>`;
    item.onmousedown = ev => { ev.preventDefault(); acceptSuggestion(p); };
    box.appendChild(item);
  });
  box.style.display = 'block';
}
function acceptSuggestion(p){
  hideSuggestions();
  document.getElementById('guess-input').value = '';
  if(!found.has(p.id) && gameActive){ found.add(p.id); revealCard(p); updateHUD(); checkWin(); }
}

function startTimer(){
  clearInterval(timer);
  timer = setInterval(() => { secsLeft--; updateHUD(); if(secsLeft <= 0){ clearInterval(timer); timeUp(); } }, 1000);
}

function giveUp(){
  if(!gameActive)return;
  if(typeof timerInterval!=="undefined")clearInterval(timerInterval);if(typeof timer!=="undefined")clearInterval(timer);
  const btn=document.getElementById('give-up-btn');
  if(btn)btn.style.display='none';
  timeUp();
}
function timeUp(){
  gameActive = false;
  document.getElementById('guess-input').disabled = true;
  hideSuggestions(); revealAllMissed(); showModal(false);
}
function checkWin(){
  if(found.size === TOTAL){ clearInterval(timer); gameActive = false; document.getElementById('guess-input').disabled = true; showModal(true); }
}
function showModal(won){
  const elapsed = TOTAL_SECS - secsLeft;
  const mins = Math.floor(elapsed/60), secs = elapsed % 60;
  const timeStr = mins > 0 ? mins+' minute'+(mins!==1?'s':'')+' and '+secs+' second'+(secs!==1?'s':'') : secs+' second'+(secs!==1?'s':'');
  const modal = document.getElementById('modal');
  modal.className = 'modal ' + (won ? 'win' : 'lose');
  document.getElementById('modal-icon').textContent = won ? '🎉' : '⏰';
  document.getElementById('modal-title').textContent = won ? 'Quiz Complete!' : "Time's Up!";
  document.getElementById('modal-score').textContent = found.size + ' / ' + TOTAL + ' found';
  document.getElementById('modal-msg').innerHTML = won
    ? 'Congratulations — you completed the quiz in <strong>'+timeStr+'</strong>!<br>You named the all-time TD leader for all 32 NFL franchises!'
    : 'Better luck next time!<br>You found <strong>'+found.size+'</strong> of '+TOTAL+' franchises. Missing answers are shown in <span style="color:var(--red)">red</span>.';
  document.getElementById('modal-backdrop').classList.add('show');
}
function closeModal(){ document.getElementById('modal-backdrop').classList.remove('show'); }
function resetQuiz(){
  closeModal(); clearInterval(timer);
  found.clear(); secsLeft = TOTAL_SECS; gameActive = true;
  document.getElementById('guess-input').disabled = false;
  document.getElementById('guess-input').value = '';
  hideSuggestions(); renderGrid(); updateHUD(); startTimer();
  document.getElementById('guess-input').focus();
}

const inputEl = document.getElementById('guess-input');
inputEl.addEventListener('keydown', e => {
  if(e.key === 'Enter'){
    const val = inputEl.value.trim(); if(!val || !gameActive) return;
    hideSuggestions();
    let matched = null;
    for(const p of PLAYERS){ if(!found.has(p.id) && isExactMatch(val, p)){ matched = p; break; } }
    if(matched){ found.add(matched.id); revealCard(matched); inputEl.value = ''; updateHUD(); checkWin(); }
    else{
      const sugs = getFuzzySuggestions(val);
      if(sugs.length) showSuggestions(sugs);
      else{ inputEl.style.borderColor='var(--red)'; setTimeout(()=>inputEl.style.borderColor='',600); }
    }
  } else if(e.key === 'Escape') hideSuggestions();
});
inputEl.addEventListener('input', () => { hideSuggestions(); });
document.addEventListener('click', e => { if(!e.target.closest('.input-wrap')) hideSuggestions(); });

renderGrid(); updateHUD(); gameActive = true; startTimer();
</script>
